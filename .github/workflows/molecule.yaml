---
name: Molecule Test
on:
  merge_group:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    # Runs every Sunday at 4 AM (see https://crontab.guru)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      ROLE:
        description: 'Role to test (e.g. "elk", "ad", "vulns_acls")'
        required: false
        default: ''
        type: string

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}

env:
  ANSIBLE_FORCE_COLOR: "1"
  COLLECTION_NAMESPACE: dreadnode
  COLLECTION_NAME: goad
  COLLECTION_PATH: ansible_collections/dreadnode/goad
  REQUIREMENTS_FILE: .hooks/requirements.txt
  PY_COLORS: "1"
  PYTHON_VERSION: "3.14.3"
  ROLE: ${{ github.event.inputs.ROLE }}
  ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      max_parallel: ${{ steps.generate-matrix.outputs.max_parallel }}
    steps:
      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}
          fetch-depth: 0

      - name: Check event type
        id: check-event
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ github.event_name }}" == "merge_group" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && -z "${{ env.ROLE }}" ]]; then
            echo "test_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_all=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed files
        id: filter
        if: steps.check-event.outputs.test_all == 'false'
        working-directory: ${{ env.COLLECTION_PATH }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="origin/main"
            HEAD="HEAD"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE"..."$HEAD")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          ROLES=$(echo "$CHANGED_FILES" | grep '^ansible/roles/' | cut -d'/' -f3 | sort -u | tr '\n' ' ')
          echo "roles=$ROLES" >> "$GITHUB_OUTPUT"
          echo "Changed roles: $ROLES"

      - name: Generate test matrix
        id: generate-matrix
        working-directory: ${{ env.COLLECTION_PATH }}
        run: |
          if [[ "${{ steps.check-event.outputs.test_all }}" == "true" ]]; then
            # Build matrix from all roles with molecule configs
            MATRIX_JSON="["
            FIRST=true
            for mol_dir in ansible/roles/*/molecule; do
              role=$(basename "$(dirname "$mol_dir")")
              if [[ "$FIRST" == "true" ]]; then
                FIRST=false
              else
                MATRIX_JSON+=","
              fi
              MATRIX_JSON+="{\"name\":\"${role}\",\"path\":\"ansible/roles/${role}\"}"
            done
            MATRIX_JSON+="]"
          else
            ROLES="${{ steps.filter.outputs.roles }}"
            MATRIX_JSON="["
            FIRST=true
            if [[ -n "$ROLES" ]]; then
              for role in $ROLES; do
                if [[ -d "ansible/roles/${role}/molecule" ]]; then
                  if [[ "$FIRST" == "true" ]]; then
                    FIRST=false
                  else
                    MATRIX_JSON+=","
                  fi
                  MATRIX_JSON+="{\"name\":\"${role}\",\"path\":\"ansible/roles/${role}\"}"
                fi
              done
            fi
            MATRIX_JSON+="]"
          fi

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix to test: $MATRIX_JSON"

          MATRIX_COUNT=$(echo "$MATRIX_JSON" | jq '. | length')
          MAX_PARALLEL=$(( (MATRIX_COUNT * 60) / 100 ))
          [[ $MAX_PARALLEL -lt 4 ]] && MAX_PARALLEL=4
          [[ $MAX_PARALLEL -gt 12 ]] && MAX_PARALLEL=12

          echo "max_parallel=$MAX_PARALLEL" >> "$GITHUB_OUTPUT"
          echo "Calculated max-parallel: $MAX_PARALLEL (based on $MATRIX_COUNT tests)"

  validate-inputs:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.ROLE != '' }}
    steps:
      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}

      - name: Validate inputs
        run: |
          if [[ -n "${{ env.ROLE }}" ]]; then
            if [[ ! -d "${{ env.COLLECTION_PATH }}/ansible/roles/${{ env.ROLE }}" ]]; then
              echo "::error::Role '${{ env.ROLE }}' not found in ansible/roles/"
              exit 1
            fi
            if [[ ! -d "${{ env.COLLECTION_PATH }}/ansible/roles/${{ env.ROLE }}/molecule" ]]; then
              echo "::error::Role '${{ env.ROLE }}' has no molecule config"
              exit 1
            fi
          fi

  role_test:
    needs: validate-inputs
    if: ${{ github.event.inputs.ROLE != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}'

      - name: Cache Ansible collections
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-${{ hashFiles('**/requirements.yml') }}

      - name: Install dependencies
        run: |
          python3 -m pip install -r "${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}"

      - name: Install galaxy dependencies
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Build and install collection locally
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install ${{ env.COLLECTION_NAMESPACE }}-${{ env.COLLECTION_NAME }}-*.tar.gz -p ~/.ansible/collections --force --pre

      - name: Run molecule test
        working-directory: ${{ env.COLLECTION_PATH }}/ansible/roles/${{ env.ROLE }}
        env:
          ANSIBLE_CONFIG: ${{ env.COLLECTION_PATH }}/ansible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ env.COLLECTION_PATH }}/ansible/roles
          MOLECULE_NO_LOG: "false"
        run: |
          set -e
          molecule --version
          molecule list
          if ! MOLECULE_DEBUG=1 molecule test; then
            echo "::error::Molecule test failed for role ${{ env.ROLE }}"
            docker ps -a 2>/dev/null || true
            exit 1
          fi

  full_test:
    needs: detect-changes
    if: ${{ github.event.inputs.ROLE == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.detect-changes.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}'

      - name: Cache Ansible collections
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-${{ hashFiles('**/requirements.yml') }}

      - name: Install dependencies
        run: |
          python3 -m pip install -r "${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}"

      - name: Install galaxy dependencies
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Build and install collection locally
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install ${{ env.COLLECTION_NAMESPACE }}-${{ env.COLLECTION_NAME }}-*.tar.gz -p ~/.ansible/collections --force --pre

      - name: Run molecule test
        working-directory: ${{ env.COLLECTION_PATH }}/${{ matrix.path }}
        env:
          ANSIBLE_CONFIG: ${{ env.COLLECTION_PATH }}/ansible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ env.COLLECTION_PATH }}/ansible/roles
          MOLECULE_NO_LOG: "false"
        run: |
          set -e
          molecule --version
          molecule list
          if ! MOLECULE_DEBUG=1 molecule test; then
            echo "::error::Molecule test failed for ${{ matrix.name }}"
            docker ps -a 2>/dev/null || true
            exit 1
          fi
