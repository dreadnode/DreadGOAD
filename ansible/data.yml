---
- name: Read data files
  hosts: domain:extensions
  gather_facts: true
  tasks:
    - name: Load JSON config as a variable
      ansible.builtin.include_vars:
        file: "{{ data_path }}/{{ env }}-config.json"
      run_once: true

    - name: Save the JSON data to a variable as a fact
      ansible.builtin.set_fact:
        lab: "{{ lab }}"
        cacheable: true
      run_once: true

    - name: Get all network information
      ansible.windows.win_powershell:
        script: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = 'SilentlyContinue'

          try {
            # Get primary adapter
            $primaryAdapter = Get-NetAdapter | Where-Object {$_.Status -eq "Up"} | Select-Object -First 1
            $allAdapters = Get-NetAdapter | Where-Object {$_.Status -eq "Up"}

            # Get primary IP address
            $ipAddresses = Get-NetIPAddress -AddressFamily IPv4 |
              Where-Object {
                $_.IPAddress -notmatch '^127\.' -and
                $_.IPAddress -notmatch '^169\.254\.' -and
                $_.InterfaceAlias -ne 'Loopback Pseudo-Interface 1'
              }

            # Prefer the IP on the primary adapter
            $primaryIP = $ipAddresses | Where-Object { $_.InterfaceAlias -eq $primaryAdapter.Name } | Select-Object -First 1
            if (-not $primaryIP) {
              $primaryIP = $ipAddresses | Select-Object -First 1
            }

            # Build result object
            $result = @{
              domain_adapter = if ($primaryAdapter) { $primaryAdapter.Name } else { "Ethernet" }
              adapter_count = $allAdapters.Count
              nat_adapter = if ($allAdapters.Count -gt 1) {
                ($allAdapters | Select-Object -Skip 1 -First 1).Name
              } else {
                if ($primaryAdapter) { $primaryAdapter.Name } else { "Ethernet" }
              }
              primary_ip = if ($primaryIP) { $primaryIP.IPAddress } else { "" }
            }

            # Output as simple format for easy parsing
            Write-Output "DOMAIN_ADAPTER:$($result.domain_adapter)"
            Write-Output "NAT_ADAPTER:$($result.nat_adapter)"
            Write-Output "ADAPTER_COUNT:$($result.adapter_count)"
            Write-Output "PRIMARY_IP:$($result.primary_ip)"
            $Ansible.Changed = $false
          } catch {
            # Fallback values
            Write-Output "DOMAIN_ADAPTER:Ethernet"
            Write-Output "NAT_ADAPTER:Ethernet"
            Write-Output "ADAPTER_COUNT:1"
            Write-Output "PRIMARY_IP:"
            $Ansible.Changed = $false
          }
      register: network_info
      ignore_errors: true

    - name: Set all network facts
      ansible.builtin.set_fact:
        domain_adapter: "{{ network_info.output | select('match', '^DOMAIN_ADAPTER:') | first | regex_replace('^DOMAIN_ADAPTER:', '') | default('Ethernet') }}"
        nat_adapter: "{{ network_info.output | select('match', '^NAT_ADAPTER:') | first | regex_replace('^NAT_ADAPTER:', '') | default('Ethernet') }}"
        number_of_interfaces: "{{ network_info.output | select('match', '^ADAPTER_COUNT:') | first | regex_replace('^ADAPTER_COUNT:', '') | default('1') }}"
        two_adapters: "{{ (network_info.output | select('match', '^ADAPTER_COUNT:') | first | regex_replace('^ADAPTER_COUNT:', '') | default('1') | int) > 1 }}"
        host_ipv4: "{{ network_info.output | select('match', '^PRIMARY_IP:') | first | regex_replace('^PRIMARY_IP:', '') | default(ansible_default_ipv4.address | default('')) }}"
        cacheable: true
      when:
        - network_info is defined
        - network_info.output is defined

    - name: Set fallback network facts
      ansible.builtin.set_fact:
        domain_adapter: "{{ domain_adapter | default('Ethernet') }}"
        nat_adapter: "{{ nat_adapter | default(domain_adapter | default('Ethernet')) }}"
        number_of_interfaces: "{{ number_of_interfaces | default('1') }}"
        two_adapters: "{{ two_adapters | default(false) }}"
        host_ipv4: "{{ host_ipv4 | default(ansible_default_ipv4.address | default('')) }}"
        cacheable: true
      when: domain_adapter is not defined

    - name: Store IP as host fact for DCs
      ansible.builtin.set_fact:
        dc_ipv4: "{{ host_ipv4 }}"
        cacheable: true
      when:
        - host_ipv4 is defined
        - host_ipv4 != ''
        - inventory_hostname in groups['dc']

    - name: Show host network configuration
      ansible.builtin.debug:
        msg:
          - "hostname: {{ inventory_hostname }}"
          - "instance_id: {{ ansible_host }}"
          - "resolved_ip: {{ host_ipv4 | default('NOT RESOLVED') }}"
          - "domain interface: {{ domain_adapter }}"
          - "number_of_interfaces: {{ number_of_interfaces }}"
          - "two_adapters: {{ two_adapters }}"
          - "nat interface: {{ nat_adapter }}"
        verbosity: 1  # Only shows with -v flag

# Create mappings on all hosts
- name: Create global mappings
  hosts: all
  gather_facts: false
  tasks:
    - name: Build all mappings and distribute to all hosts
      ansible.builtin.set_fact:
        dc_hostname_to_ip: >-
          {%- set mapping = {} -%}
          {%- for host in groups['dc'] -%}
            {%- if hostvars[host]['dc_ipv4'] is defined and hostvars[host]['dc_ipv4'] != '' -%}
              {%- set _ = mapping.update({host: hostvars[host]['dc_ipv4']}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ mapping }}
        instance_to_ip: >-
          {%- set mapping = {} -%}
          {%- for host in groups['all'] -%}
            {%- if hostvars[host]['host_ipv4'] is defined and hostvars[host]['ansible_host'] is defined and hostvars[host]['host_ipv4'] != '' -%}
              {%- set _ = mapping.update({hostvars[host]['ansible_host']: hostvars[host]['host_ipv4']}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ mapping }}
        cacheable: true
      run_once: true
      delegate_facts: true
      delegate_to: "{{ item }}"
      loop: "{{ groups['all'] }}"

    - name: Debug the mappings
      ansible.builtin.debug:
        msg:
          - "DC Hostname to IP mapping: {{ dc_hostname_to_ip | default({}) }}"
          - "Instance to IP mapping: {{ instance_to_ip | default({}) }}"
        verbosity: 2
      run_once: true
