---
- name: Read data files
  hosts: domain:extensions
  gather_facts: true
  serial: 5
  tasks:
    - name: Load JSON config as a variable
      ansible.builtin.include_vars:
        file: "{{ data_path }}/{{ env }}-config.json"
      run_once: true

    - name: Save the JSON data to a variable as a fact
      ansible.builtin.set_fact:
        lab: "{{ lab }}"
        cacheable: true
      run_once: true

    - name: Load AWS instance_to_ip mapping from file for SSM connections
      ansible.builtin.include_vars:
        file: /tmp/aws_instance_mapping.json
        name: aws_mapping
      run_once: true
      when: ansible_connection == 'aws_ssm'
      ignore_errors: true

    - name: Set instance_to_ip mapping for all hosts
      ansible.builtin.set_fact:
        instance_to_ip: "{{ aws_mapping.instance_to_ip | default({}) }}"
        cacheable: true
      run_once: true
      delegate_facts: true
      delegate_to: "{{ item }}"
      loop: "{{ groups['all'] }}"
      when:
        - ansible_connection == 'aws_ssm'
        - aws_mapping is defined

    - name: Set host_ipv4 from AWS instance mapping for SSM connections
      ansible.builtin.set_fact:
        host_ipv4: "{{ instance_to_ip[ansible_host] | default('') }}"
        cacheable: true
      when:
        - ansible_connection == 'aws_ssm'
        - instance_to_ip is defined
        - ansible_host in instance_to_ip

    - name: Check if network facts are already cached
      ansible.builtin.set_fact:
        skip_network_detection: "{{ host_ipv4 is defined and host_ipv4 != '' }}"
      
    - name: Get all network information
      ansible.windows.win_powershell:
        script: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = 'Stop'
          
          # Set a timeout for the entire script
          $timeout = New-TimeSpan -Seconds 30
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          
          try {
            $primaryAdapter = $null
            $adapters = @()
            
            try {
              $adapters = @(Get-NetAdapter -ErrorAction Stop | Where-Object {$_.Status -eq "Up"})
              $primaryAdapter = $adapters | Select-Object -First 1
            } catch {
              # Fallback to WMI if Get-NetAdapter fails
              $adapters = @(Get-WmiObject Win32_NetworkAdapter | Where-Object {$_.NetEnabled -eq $true})
              if ($adapters.Count -gt 0) {
                $primaryAdapter = @{Name = $adapters[0].NetConnectionID}
              }
            }
            
            # Get IP quickly using WMI
            $primaryIP = ""
            try {
              $networkConfigs = Get-WmiObject Win32_NetworkAdapterConfiguration | Where-Object {$_.IPEnabled -eq $true -and $_.IPAddress[0] -notmatch '^127\.' -and $_.IPAddress[0] -notmatch '^169\.254\.'}
              if ($networkConfigs) {
                $primaryIP = $networkConfigs[0].IPAddress[0]
              }
            } catch {
              $primaryIP = ""
            }
            
            Write-Output "DOMAIN_ADAPTER:$(if ($primaryAdapter) { $primaryAdapter.Name } else { 'Ethernet' })"
            Write-Output "NAT_ADAPTER:$(if ($adapters.Count -gt 1) { $adapters[1].Name } else { if ($primaryAdapter) { $primaryAdapter.Name } else { 'Ethernet' } })"
            Write-Output "ADAPTER_COUNT:$($adapters.Count)"
            Write-Output "PRIMARY_IP:$primaryIP"
            $Ansible.Changed = $false
          } catch {
            # Quick fallback
            Write-Output "DOMAIN_ADAPTER:Ethernet"
            Write-Output "NAT_ADAPTER:Ethernet"  
            Write-Output "ADAPTER_COUNT:1"
            Write-Output "PRIMARY_IP:"
            $Ansible.Changed = $false
          }
      async: 60  # Maximum 60 seconds
      poll: 5    # Check every 5 second
      register: network_info
      ignore_errors: true
      when: not skip_network_detection | default(false)

    - name: Set all network facts
      ansible.builtin.set_fact:
        domain_adapter: "{{ network_info.output | select('match', '^DOMAIN_ADAPTER:') | first | regex_replace('^DOMAIN_ADAPTER:', '') | default('Ethernet') }}"
        nat_adapter: "{{ network_info.output | select('match', '^NAT_ADAPTER:') | first | regex_replace('^NAT_ADAPTER:', '') | default('Ethernet') }}"
        number_of_interfaces: "{{ network_info.output | select('match', '^ADAPTER_COUNT:') | first | regex_replace('^ADAPTER_COUNT:', '') | default('1') }}"
        two_adapters: "{{ (network_info.output | select('match', '^ADAPTER_COUNT:') | first | regex_replace('^ADAPTER_COUNT:', '') | default('1') | int) > 1 }}"
        host_ipv4: "{{ network_info.output | select('match', '^PRIMARY_IP:') | first | regex_replace('^PRIMARY_IP:', '') | default(ansible_default_ipv4.address | default('')) }}"
        cacheable: true
      when:
        - network_info is defined
        - network_info.output is defined
        - not skip_network_detection | default(false)

    - name: Set fallback network facts
      ansible.builtin.set_fact:
        domain_adapter: "{{ domain_adapter | default('Ethernet') }}"
        nat_adapter: "{{ nat_adapter | default(domain_adapter | default('Ethernet')) }}"
        number_of_interfaces: "{{ number_of_interfaces | default('1') }}"
        two_adapters: "{{ two_adapters | default(false) }}"
        host_ipv4: "{{ host_ipv4 | default(ansible_default_ipv4.address | default('')) }}"
        cacheable: true
      when: domain_adapter is not defined

    - name: Store IP as host fact for DCs
      ansible.builtin.set_fact:
        dc_ipv4: "{{ host_ipv4 }}"
        cacheable: true
      when:
        - host_ipv4 is defined
        - host_ipv4 != ''
        - inventory_hostname in groups['dc']

    - name: Show host network configuration
      ansible.builtin.debug:
        msg:
          - "hostname: {{ inventory_hostname }}"
          - "instance_id: {{ ansible_host }}"
          - "resolved_ip: {{ host_ipv4 | default('NOT RESOLVED') }}"
          - "domain interface: {{ domain_adapter }}"
          - "number_of_interfaces: {{ number_of_interfaces }}"
          - "two_adapters: {{ two_adapters }}"
          - "nat interface: {{ nat_adapter }}"
        verbosity: 1  # Only shows with -v flag

# Create mappings on all hosts
- name: Create global mappings
  hosts: all
  gather_facts: false
  serial: 10
  tasks:
    - name: Build all mappings and distribute to all hosts
      ansible.builtin.set_fact:
        dc_hostname_to_ip: >-
          {%- set mapping = {} -%}
          {%- for host in groups['dc'] -%}
            {%- if hostvars[host]['dc_ipv4'] is defined and hostvars[host]['dc_ipv4'] != '' -%}
              {%- set _ = mapping.update({host: hostvars[host]['dc_ipv4']}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ mapping }}
        instance_to_ip: >-
          {%- set mapping = {} -%}
          {%- for host in groups['all'] -%}
            {%- if hostvars[host]['host_ipv4'] is defined and hostvars[host]['ansible_host'] is defined and hostvars[host]['host_ipv4'] != '' -%}
              {%- set _ = mapping.update({hostvars[host]['ansible_host']: hostvars[host]['host_ipv4']}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ mapping }}
        cacheable: true
      run_once: true
      delegate_facts: true
      delegate_to: "{{ item }}"
      loop: "{{ groups['all'] }}"
      throttle: 5

    - name: Debug the mappings
      ansible.builtin.debug:
        msg:
          - "DC Hostname to IP mapping: {{ dc_hostname_to_ip | default({}) }}"
          - "Instance to IP mapping: {{ instance_to_ip | default({}) }}"
        verbosity: 2
      run_once: true