[defaults]
# IMPORTANT: This project requires ansible-core <2.19 for AWS SSM Windows support.
# ansible-core >=2.19 changed pipelining behavior which breaks the SSM connection
# plugin for Windows hosts. See requirements.txt for details.

# Core settings
host_key_checking = False
forks = 3
retry_files_enabled = False
deprecation_warnings = False
no_log = False

# Collection and role paths
roles_path = ~/.ansible/roles:./roles
collections_path = ~/.ansible/collections

# Remote temp directory for Windows SSM connections
remote_tmp = C:\\Windows\\Temp

# Display settings
stdout_callback = default
callback_result_format = yaml
callback_format_pretty = True
show_per_host_start = True
display_skipped_hosts = False
display_ok_hosts = True
display_failed_stderr = True

# Performance and profiling callbacks
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer

# Error handling
any_errors_fatal = False

# Timeouts
timeout = 600
command_timeout = 600

# Fact caching configuration
# Note: fact_caching_connection is set via ANSIBLE_CACHE_PLUGIN_CONNECTION env var in Taskfile
gathering = smart
fact_caching = jsonfile
fact_caching_timeout = 86400

# Diff output
always_show_diff = False
diff_add = green
diff_remove = red
diff_lines = 3

# Filter out specific Python loggers from the log file (empty = no filtering)
log_filter =

[persistent_connection]
command_timeout = 600
connect_timeout = 120

[connection]
connect_timeout = 120
connect_retry_timeout = 120

[aws_ssm]
timeout = 600
# Increase timeout for S3 transfers (AnsiballZ module files)
# This helps with large module transfers or slow S3 connections
ssm_timeout = 240

[callback_profile_tasks]
# Shows execution time for each task
task_output_limit = 20
sort_order = descending
