---
# Load datas
- import_playbook: data.yml
  tags: 'data'
# set AD trusts ==================================================================================================

- name: Trusts configuration prepare
  hosts: trust
  roles:
  - { role: 'settings/disable_nat_adapter' , tags: 'disable_nat_adapter'}
  - { role: 'dns_conditional_forwarder', tags: 'dns_conditional_forwarder' }
  vars:
    domain: "{{ lab.hosts[dict_key].domain }}"
    remote_forest: "{{ lab.domains[domain].trust }}"
    zone_name: "{{ remote_forest }}"
    remote_dc: "{{ lab.domains[remote_forest].dc }}"
    master_server: "{{ hostvars[remote_dc].ansible_host }}"
    replication: "forest"

- name: Add DNS records for remote domain controllers
  hosts: trust
  tasks:
    - name: Add A records for remote domain controllers
      ansible.windows.win_powershell:
        script: |
          try {
            # Get remote DC information
            $remoteDC = "{{ remote_dc }}"
            $remoteIPAddress = "{{ hostvars[remote_dc].ansible_host }}"
            $remoteDomainName = "{{ remote_forest }}"
            $hostDomain = "{{ domain }}"
            
            Write-Output "Creating DNS records for $remoteDC.$remoteDomainName with IP $remoteIPAddress"
            
            # Add DNS A record for standalone DC
            try {
              $existingRecord = Get-DnsServerResourceRecord -Name $remoteDC -ZoneName "." -ErrorAction SilentlyContinue
              if(-not $existingRecord) {
                Add-DnsServerResourceRecordA -Name $remoteDC -ZoneName "." -IPv4Address $remoteIPAddress -TimeToLive 01:00:00
                Write-Output "Added A record for $remoteDC"
              } else {
                Write-Output "A record for $remoteDC already exists"
              }
            } catch {
              Write-Output "Failed to add standalone record: $_"
            }
            
            # Create the zone for remote domain if it doesn't exist
            $zoneExists = Get-DnsServerZone -Name $remoteDomainName -ErrorAction SilentlyContinue
            if(-not $zoneExists) {
              Add-DnsServerPrimaryZone -Name $remoteDomainName -ReplicationScope "Forest" -DynamicUpdate "Secure"
              Write-Output "Created primary zone for $remoteDomainName"
            }
            
            # Add DNS A record for DC in the domain zone
            try {
              $existingDomainRecord = Get-DnsServerResourceRecord -Name $remoteDC -ZoneName $remoteDomainName -ErrorAction SilentlyContinue
              if(-not $existingDomainRecord) {
                Add-DnsServerResourceRecordA -Name $remoteDC -ZoneName $remoteDomainName -IPv4Address $remoteIPAddress -TimeToLive 01:00:00
                Write-Output "Added A record for $remoteDC.$remoteDomainName"
              } else {
                Write-Output "A record for $remoteDC.$remoteDomainName already exists"
              }
            } catch {
              Write-Output "Failed to add domain record: $_"
            }
            
            # Add conditional forwarder if not already set up
            try {
              $forwarderExists = Get-DnsServerZone -Name $remoteDomainName -ErrorAction SilentlyContinue | 
                                  Where-Object {$_.ZoneType -eq "Forwarder"}
              if(-not $forwarderExists) {
                Add-DnsServerConditionalForwarderZone -Name $remoteDomainName -MasterServers $remoteIPAddress -ReplicationScope "Forest"
                Write-Output "Added conditional forwarder for $remoteDomainName"
              }
            } catch {
              Write-Output "Failed to add conditional forwarder: $_"
            }
            
            # Flush DNS cache to ensure changes take effect
            Clear-DnsClientCache
            Write-Output "Cleared DNS cache"
          } catch {
            Write-Error "Error creating DNS records: $_"
          }
      register: dns_records_result
      vars:
        remote_dc: "{{ lab.domains[lab.hosts[dict_key].domain].trust | default('') | ternary(lab.domains[lab.domains[lab.hosts[dict_key].domain].trust].dc, '') }}"
        remote_forest: "{{ lab.domains[lab.hosts[dict_key].domain].trust | default('') }}"
        domain: "{{ lab.hosts[dict_key].domain }}"

- name: Trusts configuration
  hosts: trust
  serial: 1 # add one trust at a time to avoid issues
  roles:
  - { role: 'trusts', tags: 'trust' }
  vars:
    domain: "{{ lab.hosts[dict_key].domain }}"
    domain_username: "{{ domain }}\\{{ admin_user }}"
    domain_password: "{{ lab.domains[domain].domain_password }}"
    remote_forest: "{{ lab.domains[domain].trust }}"
    remote_admin: "Administrator@{{ remote_forest }}"
    remote_admin_password: "{{ lab.domains[remote_forest].domain_password }}"
    zone_name: "{{ remote_forest }}"
    remote_dc: "{{ lab.domains[remote_forest].dc }}"
    master_server: "{{ hostvars[remote_dc].ansible_host }}"

- name: Trusts configuration end
  hosts: trust
  roles:
  - { role: 'settings/enable_nat_adapter', tags: 'enable_nat_adapter'}

- name: Adjust DNS conditional forwarded configuration
  hosts: trust
  roles:
  - { role: 'dc_dns_conditional_forwarder', tags: 'dns_conditional_forwarder' }
  vars:
    dict_key: "{{ inventory_hostname }}"
    domain: "{{ lab.hosts[dict_key].domain }}"
    replication: "forest"
    domain_username: "{{ domain }}\\{{ admin_user }}"
    domain_password: "{{ lab.domains[domain].domain_password }}"
    parent_domain: "{{ '.'.join(domain.split('.')[1:]) | default('') }}"
    trust: "{{ lab.domains[domain].trust | default('') }}"
    lab: "{{ lab }}"
    domains: "{{ lab.domains.keys() | list }}"
