---
# Load data
- name: Import Data
  ansible.builtin.import_playbook: data.yml
  tags: data

# set AD data ==================================================================================================
- name: Servers AD configuration
  hosts: server
  roles:
    - { role: 'member_server', tags: 'server'}
  vars:
    member_domain: "{{ lab.hosts[dict_key].domain }}"
    domain_username: "{{ admin_user }}@{{ member_domain }}"
    domain_password: "{{ lab.domains[member_domain].domain_password }}"
    domain_dc: "{{ lab.domains[member_domain].dc }}"
    instance_to_ip: "{{ hostvars[groups['dc'][0]]['instance_to_ip'] | default({}) }}"
    dns_server_ip: "{{ hostvars[domain_dc]['dc_ipv4'] | default(instance_to_ip[hostvars[domain_dc]['ansible_host']] | default(hostvars[domain_dc].ansible_host)) }}"
    dc_hostname_to_ip: "{{ hostvars[groups['dc'][0]]['dc_hostname_to_ip'] | default({}) }}"

- name: Workstations AD configuration
  hosts: workstation
  roles:
    - { role: 'commonwkstn', tags: 'workstation'}
  vars:
    member_domain: "{{ lab.hosts[dict_key].domain }}"
    domain_username: "{{ admin_user }}@{{ member_domain }}"
    domain_password: "{{ lab.domains[member_domain].domain_password }}"
    domain_dc: "{{ lab.domains[member_domain].dc }}"
    instance_to_ip: "{{ hostvars[groups['dc'][0]]['instance_to_ip'] | default({}) }}"
    dns_server_ip: "{{ hostvars[domain_dc]['dc_ipv4'] | default(instance_to_ip[hostvars[domain_dc]['ansible_host']] | default(hostvars[domain_dc].ansible_host)) }}"
    dc_hostname_to_ip: "{{ hostvars[groups['dc'][0]]['dc_hostname_to_ip'] | default({}) }}"
