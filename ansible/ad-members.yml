---
# Load data
- ansible.builtin.import_playbook: data.yml
  tags: data

# Get DNS IP addresses for each domain controller
- name: Get DC IPv4 addresses
  hosts: dc
  gather_facts: false
  tasks:
    - name: Get IPv4 address for DC
      ansible.windows.win_powershell:
        script: |
          try {
            $ipAddress = (Get-NetIPAddress -AddressFamily IPv4 | 
              Where-Object {$_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.254\.'} | 
              Select-Object -First 1).IPAddress
            
            if($ipAddress) {
              # Explicitly set the output property that Ansible will capture
              $host.UI.WriteLine($ipAddress)
              $Ansible.Changed = $false
            } else {
              throw "No valid IPv4 address found"
            }
          } catch {
            Write-Error "Error getting IPv4 address: $_"
            $Ansible.Changed = $false
          }
      register: dc_ipv4_raw

    - name: Set DC IP address as fact
      ansible.builtin.set_fact:
        dc_ipv4: "{{ dc_ipv4_raw.host_out | default('') | trim }}"
        cacheable: true
      when: dc_ipv4_raw is defined and dc_ipv4_raw.host_out is defined

# set AD datas ==================================================================================================
- name: Servers AD configuration
  hosts: server
  roles:
    - { role: 'member_server', tags: 'server'}
  vars:
    member_domain: "{{ lab.hosts[dict_key].domain }}"
    domain_username: "{{ admin_user }}@{{ member_domain }}"
    domain_password: "{{ lab.domains[member_domain].domain_password }}"
    dns_server_ip: "{{ hostvars[groups['dc'][0]].dc_ipv4 }}"

- name: Workstations AD configuration
  hosts: workstation
  roles:
    - { role: 'commonwkstn', tags: 'workstation'}
  vars:
    member_domain: "{{ lab.hosts[dict_key].domain }}"
    domain_username: "{{ admin_user }}@{{ member_domain }}"
    domain_password: "{{ lab.domains[member_domain].domain_password }}"