---
- name: Disable the registration of the network adapter in DNS
  ansible.windows.win_powershell:
    script: |
      $adapterName = "{{ nat_adapter }}"
      try {
        $adapter = Get-NetAdapter -Name $adapterName -ErrorAction SilentlyContinue
        if ($adapter) {
          Set-DNSClient -InterfaceIndex $adapter.ifIndex -RegisterThisConnectionsAddress $False
          $Ansible.Changed = $true
        } else {
          Write-Output "Adapter '$adapterName' not found, trying to find a suitable adapter"
          $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -First 1
          if ($adapter) {
            Set-DNSClient -InterfaceIndex $adapter.ifIndex -RegisterThisConnectionsAddress $False
            $Ansible.Changed = $true
          } else {
            Write-Error "No suitable network adapter found"
            $Ansible.Changed = $false
          }
        }
      } catch {
        Write-Error "Error setting DNS client registration: $_"
        $Ansible.Changed = $false
      }
  when: two_adapters
  ignore_errors: true

- name: Set configure dns to {{ dns_domain }}
  ansible.windows.win_powershell:
    script: |
      # Find the network adapter
      $adapter = Get-NetAdapter | Where-Object { $_.Name -like "*Ethernet*" -and $_.Status -eq "Up" } | Select-Object -First 1
      if ($adapter) {
        Write-Output "Setting DNS on adapter: $($adapter.Name)"
        Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ServerAddresses "{{ dns_server_forwarder }}"
        $Ansible.Changed = $true
      } else {
        Write-Error "No suitable network adapter found"
        $Ansible.Changed = $false
      }
  ignore_errors: true

- name: Install windows features - AD Domain Services
  ansible.windows.win_feature:
    name: AD-Domain-Services
    state: present
    include_management_tools: yes
  register: features

- name: Install windows features - RSAT-ADDS
  ansible.windows.win_feature:
    name: RSAT-ADDS
    state: present
    include_management_tools: yes
  register: features

# DNSCHANGE
