---
- name: Disable the registration of the {{ nat_adapter }} interface (NAT address) in DNS
  ansible.windows.win_shell: Get-NetAdapter {{ nat_adapter }} | Set-DNSClient -RegisterThisConnectionsAddress $False
  when: two_adapters

- name: Set configure dns to {{ parent_domain }}
  ansible.windows.win_dns_client:
    adapter_names: "{{ domain_adapter }}"
    ipv4_addresses:
      - "{{ hostvars[remote_dc]['dc_ipv4'] | default(instance_to_ip[hostvars[remote_dc]['ansible_host']] if hostvars[remote_dc]['ansible_host'] in instance_to_ip else hostvars[remote_dc].ansible_host) }}"
    log_path: C:\dns_log.txt

- name: Install windows features - AD Domain Services
  ansible.windows.win_feature:
    name: AD-Domain-Services
    state: present
    include_management_tools: yes
  register: features

- name: Install windows features - RSAT-ADDS
  ansible.windows.win_feature:
    name: RSAT-ADDS
    state: present
    include_management_tools: yes
  register: features

# DNSCHANGE
# - name: "disable interface {{nat_adapter}} before join domain"
#   win_shell: netsh interface set interface "{{nat_adapter}}" disable

- name: Add child domain to parent domain
  microsoft.ad.domain_child:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ parent_domain_user }}"
    domain_admin_password: "{{ parent_domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    database_path: C:\Windows\NTDS
    sysvol_path: C:\Windows\SYSVOL
    log_path: C:\Windows\Logs
    reboot: true
  register: child_result
  failed_when:
    - child_result is failed
    - '"already exists" not in child_result.msg | default("")'

- name: Configure DNS listener addresses
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        dnscmd . /resetlistenaddresses {{ host_ipv4 | default(instance_to_ip[hostvars[dict_key]['ansible_host']] | default(hostvars[dict_key].ansible_host)) }}
        Write-Output "DNS listener addresses configured successfully"
      } catch {
        $Ansible.Failed = $true
        Write-Error "Failed to configure DNS listener addresses: $_"
      }
  register: dns_listener
  when: two_adapters

- name: Enable TLS 1.2 permanently via registry
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: SchUseStrongCrypto
    data: 1
    type: dword
  loop:
    - { path: 'HKLM:\SOFTWARE\Microsoft\.NetFramework\v4.0.30319' }
    - { path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\.NetFramework\v4.0.30319' }

- name: Check if xDnsServer exists
  ansible.windows.win_shell: |
    if (Get-Module -ListAvailable -Name xDnsServer) {
      exit 0
    } else {
      exit 1
    }
  register: xdnsserver_check
  failed_when: false
  changed_when: false

- name: Install xDnsServer only if needed
  community.windows.win_psmodule:
    name: xDnsServer
    state: present
  when: xdnsserver_check.rc != 0

- name: Configure DNS Forwarders
  ansible.windows.win_dsc:
    resource_name: xDnsServerForwarder
    IsSingleInstance: "yes"
    UseRootHint: false
    IPAddresses:
      - "{{ dns_server_forwarder }}"

- name: Check if ActiveDirectoryDSC exists
  ansible.windows.win_shell: |
    if (Get-Module -ListAvailable -Name ActiveDirectoryDSC) {
      exit 0
    } else {
      exit 1
    }
  register: activedirectorydsc_check
  failed_when: false
  changed_when: false

- name: Install ActiveDirectoryDSC only if needed
  community.windows.win_psmodule:
    name: ActiveDirectoryDSC
    state: present
  when: activedirectorydsc_check.rc != 0

# issue 156
- name: Enable the Active Directory Web Services
  ansible.windows.win_service:
    name: adws
    start_mode: auto
    state: started

- name: Check if SSM Agent is installed
  ansible.windows.win_service:
    name: AmazonSSMAgent
  register: ssm_service_check
  failed_when: false

- name: Fix SSM Agent after domain controller promotion
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"

      try {
        Write-Output "Restarting SSM Agent to recreate ssm-user as domain account..."

        # Restart SSM Agent to trigger recreation of ssm-user
        Restart-Service -Name AmazonSSMAgent -Force

        # Wait for service to fully restart
        Start-Sleep -Seconds 10

        # Verify SSM Agent is running
        $ssmService = Get-Service -Name AmazonSSMAgent
        if ($ssmService.Status -ne 'Running') {
          throw "SSM Agent failed to start after restart"
        }

        Write-Output "SSM Agent restarted successfully"
        $Ansible.Changed = $true
      } catch {
        # Don't fail the playbook if SSM restart fails - it will be handled by retry logic
        Write-Output "Warning: Failed to restart SSM Agent: $_"
        $Ansible.Changed = $false
      }
  register: ssm_restart
  when: ssm_service_check.exists | default(false)
  changed_when: ssm_restart.output | regex_search('SSM Agent restarted successfully')

- name: Wait for SSM Agent to stabilize after domain promotion
  ansible.builtin.pause:
    seconds: 30
  when:
    - ssm_service_check.exists | default(false)
    - ssm_restart.changed
