- name: Enable the interface for DNS client requests
  ansible.windows.win_powershell:
    script: |
      try {
        $ipAddress = "{{ hostvars[dict_key].ansible_host }}"
        # Check if $ipAddress is a valid IP address
        [System.Net.IPAddress]::TryParse($ipAddress, [ref]$null)
        
        # If it's not a valid IP, try to get the actual IP
        if (-not [System.Net.IPAddress]::TryParse($ipAddress, [ref]$null)) {
          # Get the first available IP address
          $ipAddress = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.InterfaceAlias -like "*Ethernet*" } | Select-Object -First 1).IPAddress
        }
        
        if ($ipAddress) {
          dnscmd . /resetlistenaddresses $ipAddress
          $Ansible.Changed = $true
        } else {
          Write-Error "Could not determine a valid IP address"
          $Ansible.Changed = $false
        }
      } catch {
        Write-Error "Error setting DNS listen addresses: $_"
        $Ansible.Changed = $false
      }
  when: two_adapters
  ignore_errors: true

- name: Make sure DNS Server role is installed
  ansible.windows.win_feature:
    name: DNS
    state: present
    include_management_tools: yes
  register: dns_feature

- name: Configure DNS Forwarders with PowerShell
  ansible.windows.win_powershell:
    script: |
      # Ensure the DNS Server module is available
      Import-Module DnsServer -ErrorAction SilentlyContinue
      
      if (Get-Command Set-DnsServerForwarder -ErrorAction SilentlyContinue) {
        # Configure the forwarders
        try {
          Set-DnsServerForwarder -IPAddress "{{ dns_server_forwarder }}" -UseRootHint $false
          $Ansible.Changed = $true
        } catch {
          Write-Error "Failed to set DNS forwarders: $_"
          $Ansible.Changed = $false
        }
      } else {
        # DNS Server module not available, install it
        try {
          Install-WindowsFeature -Name DNS-Server-Full-Role, RSAT-DNS-Server -IncludeAllSubFeature
          Start-Sleep -Seconds 10
          Import-Module DnsServer
          Set-DnsServerForwarder -IPAddress "{{ dns_server_forwarder }}" -UseRootHint $false
          $Ansible.Changed = $true
        } catch {
          Write-Error "Failed to install DNS Server role and configure forwarders: $_"
          $Ansible.Changed = $false
        }
      }
  ignore_errors: true
  when: dns_server_forwarder is defined

# add external dns forwarder
- name: Configure DNS Forwarders
  ansible.windows.win_dsc:
    resource_name: xDnsServerForwarder
    IsSingleInstance: "yes"
    UseRootHint: false
    IPAddresses:
      - "{{dns_server_forwarder}}"

- name: Install XactiveDirectory
  community.windows.win_psmodule:
    name: ActiveDirectoryDSC
    state: present

# issue 156
- name: Enable the Active directory web services if not enabled
  ansible.windows.win_shell: Set-Service -Name adws -StartupType Automatic
