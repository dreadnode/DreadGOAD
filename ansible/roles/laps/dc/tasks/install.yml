---
- name: Create Laps OU if not exist
  win_dsc:
    resource_name: ADOrganizationalUnit
    name: "{{ laps_path.split(',')[0].split('=')[1] }}"
    path:  "{{ ','.join(laps_path.split(',')[1:]) }}"

- name: Create temporary directory for downloads
  ansible.windows.win_file:
    path: C:\Temp\ansible
    state: directory

- name: Download LAPS Package
  ansible.windows.win_get_url:
    url: https://download.microsoft.com/download/C/7/A/C7AAD914-A8A6-4904-88A1-29E657445D03/LAPS.x64.msi
    dest: C:\Temp\ansible\LAPS.x64.msi
    force: no
  register: download_result
  retries: 3
  delay: 5
  until: download_result is success

- name: Install LAPS Package on Servers
  ansible.windows.win_package:
    arguments: "ADDLOCAL=Management.PS,Management.ADMX ALLUSERS=1 /qn"
    path: C:\Temp\ansible\LAPS.x64.msi
    state: present
    creates_path: "%ProgramFiles%\\LAPS"
  register: pri_laps_install
  retries: 2
  delay: 10
  until: pri_laps_install is success

- name: Reboot After Installing LAPS on Servers
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 100
  when: pri_laps_install.reboot_required

- name: Update AD Schema using AdmPwd.PS module with elevated privileges
  ansible.windows.win_powershell:
    script: |
      # First verify module is installed
      if (-not (Get-Module -ListAvailable -Name AdmPwd.PS)) {
        Write-Output "AdmPwd.PS module not found, cannot proceed with schema update."
        return $false
      }

      # Import module and update schema with elevated privileges
      try {
        # Create a credential for a user with schema admin rights
        $adminUser = "{{ domain_admin_user }}"
        $adminPassword = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
        $adminCred = New-Object System.Management.Automation.PSCredential($adminUser, $adminPassword)
        
        # Run schema update in elevated context
        $scriptBlock = {
          Import-Module AdmPwd.PS -ErrorAction Stop
          Update-AdmPwdADSchema
          
          # Verify the schema update succeeded
          $schemaPath = (Get-ADRootDSE).SchemaNamingContext
          $pwdAttr = Get-ADObject -SearchBase $schemaPath -Filter {lDAPDisplayName -eq "ms-Mcs-AdmPwd"} -Properties * -ErrorAction SilentlyContinue
          
          if ($pwdAttr) {
            Write-Output "Schema attribute ms-Mcs-AdmPwd found, schema update confirmed."
            return $true
          } else {
            Write-Error "Schema attribute ms-Mcs-AdmPwd not found, schema update failed."
            return $false
          }
        }
        
        # Execute with credentials
        $result = Invoke-Command -ScriptBlock $scriptBlock -Credential $adminCred -ComputerName localhost
        
        if ($result -eq $true) {
          Write-Output "Schema update completed successfully."
          return $true
        } else {
          Write-Error "Schema update failed."
          return $false
        }
      } catch {
        Write-Error "Error updating schema: $_"
        return $false
      }
    error_action: continue
  register: schema_update
  vars:
    domain_admin_user: "{{ domain }}\\{{ admin_user }}"
    domain_admin_password: "{{ lab.domains[domain].domain_password }}"
  failed_when: schema_update.output[0] == false

- name: Apply DACL to OU Containers
  ansible.windows.win_shell: |
    $LapsOU = "{{ laps_path }}"
    $ComputerGUID = [GUID]"{{ computer_class_guid }}" 
    
    # Get the schema attribute GUIDs
    $schemaPath = (Get-ADRootDSE).SchemaNamingContext
    $pwdAttr = Get-ADObject -SearchBase $schemaPath -Filter {lDAPDisplayName -eq "ms-Mcs-AdmPwd"} -Properties *
    $expAttr = Get-ADObject -SearchBase $schemaPath -Filter {lDAPDisplayName -eq "ms-Mcs-AdmPwdExpirationTime"} -Properties *
    
    # Get the attribute GUIDs
    $pwdGuid = [GUID]$pwdAttr.SchemaIDGUID
    $expGuid = [GUID]$expAttr.SchemaIDGUID
    
    # Get the OU object
    $OU = Get-ADObject -Identity $LapsOU
    $acl = Get-ACL -Path "AD:$($OU.DistinguishedName)"
    
    # Create the ACE for password expiration
    $ace1 = New-Object System.DirectoryServices.ActiveDirectoryAccessRule(
        [System.Security.Principal.SecurityIdentifier]"S-1-5-10", # SELF SID
        [System.DirectoryServices.ActiveDirectoryRights]"ReadProperty, WriteProperty",
        [System.Security.AccessControl.AccessControlType]"Allow",
        $expGuid,
        [DirectoryServices.ActiveDirectorySecurityInheritance]"Descendents",
        $ComputerGUID
    )
    
    # Create the ACE for password
    $ace2 = New-Object System.DirectoryServices.ActiveDirectoryAccessRule(
        [System.Security.Principal.SecurityIdentifier]"S-1-5-10", # SELF SID
        [System.DirectoryServices.ActiveDirectoryRights]"WriteProperty",
        [System.Security.AccessControl.AccessControlType]"Allow",
        $pwdGuid,
        [DirectoryServices.ActiveDirectorySecurityInheritance]"Descendents",
        $ComputerGUID
    )
    
    # Add the ACEs to the ACL
    $acl.AddAccessRule($ace1)
    $acl.AddAccessRule($ace2)
    
    # Set the modified ACL
    Set-ACL -Path "AD:$($OU.DistinguishedName)" -AclObject $acl
    
    Write-Output "DACL applied successfully to $LapsOU"
  become: true
  become_method: runas
  become_user: SYSTEM

- name: Create LAPS GPO
  win_gpo:
    name: "{{ opt_laps_gpo_name }}"
    description: Setup by Ansible for LAPS
    state: present
  register: pri_laps_gpo

- name: Add LAPS extension to GPO
  win_ad_object:
    name: "{{ pri_laps_gpo.path }}"
    attributes:
      # [Registry:Admin Tool][AdmPwd:Admin Tool]
      gPCMachineExtensionNames: "[{35378EAC-683F-11D2-A89A-00C04FBBCFA2}{D02B1F72-3407-48AE-BA88-E8213C6761F1}]\
        [{D76B9641-3288-4F75-942D-087DE603E3EA}{D02B1F72-3407-48AE-BA88-E8213C6761F1}]"

- name: Configure Password Policy Settings on GPO
  win_gpo_reg:
    gpo: "{{ opt_laps_gpo_name }}"
    name: "{{ item.name }}"
    path: 'HKLM\Software\Policies\Microsoft Services\AdmPwd'
    state: present
    type: dword
    value: "{{ item.value }}"
  with_items:
  - name: PasswordComplexity
    value: 4
  - name: PasswordLength
    value: 14
  - name: PasswordAgeDays
    value: 30

- name: Configure Expiration Protection on GPO
  win_gpo_reg:
    gpo: "{{ opt_laps_gpo_name }}"
    name: PwdExpirationProtectionEnabled
    path: 'HKLM\Software\Policies\Microsoft Services\AdmPwd'
    state: present
    type: dword
    value: 1

- name: Remove Configuration for Expiration Protection on GPO
  win_gpo_reg:
    gpo: "{{ opt_laps_gpo_name }}"
    name: PwdExpirationProtectionEnabled
    path: 'HKLM\Software\Policies\Microsoft Services\AdmPwd'
    state: absent

- name: Configure Custom Admin Username Policy on GPO
  win_gpo_reg:
    gpo: "{{ opt_laps_gpo_name }}"
    name: AdminAccountName
    path: 'HKLM\Software\Policies\Microsoft Services\AdmPwd'
    state: present
    type: string

- name: Enable the GPO
  win_gpo_reg:
    gpo: "{{ opt_laps_gpo_name }}"
    name: AdmPwdEnabled
    path: 'HKLM\Software\Policies\Microsoft Services\AdmPwd'
    state: present
    type: dword
    value: 1

- name: Create Comment File for GPO
  ansible.windows.win_copy:
    src: ../files/comment.cmtx
    dest: C:\Windows\SYSVOL\domain\Policies\{{ '{' }}{{ pri_laps_gpo.id }}{{ '}' }}\Machine\comment.cmtx

- name: Ensure GPO is Linked
  win_gpo_link:
    name: "{{ opt_laps_gpo_name }}"
    target: "{{laps_path}}"
    state: present
    enforced: True
    enabled: True