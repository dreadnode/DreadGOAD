# Code adapted from ludus adcs module : https://github.com/badsectorlabs/ludus_adcs/blob/main/files/esc7.ps1
# RUN me on DC
- name: Ensure NuGet provider is installed
  ansible.windows.win_shell: |
    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
    if (-not (Get-PackageProvider -Name NuGet -ListAvailable -ErrorAction SilentlyContinue)) {
      Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
    }

- name: Install module PSPKI
  ansible.windows.win_powershell:
    script: |
      [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      Install-Module PSPKI -Force -ErrorAction Stop
      if (-not (Get-Module -ListAvailable -Name PSPKI)) {
        throw "PSPKI module installation failed"
      }
    error_action: stop

- name: ADD ManageCA rights
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $caManagerUser
      )
      Import-Module -Name PSPKI -ErrorAction Stop
      $caHostname = Get-CertificationAuthority | Select-Object -ExpandProperty ComputerName
      $acl = Get-CertificationAuthority "$caHostname" | Get-CertificationAuthorityAcl

      # Skip the grant (and the CA service restart it triggers) when the
      # identity already holds ManageCa. Use the Rights enum's string form so
      # we don't depend on the [PKI.CertificateServices.CertificationAuthorityRights]
      # type literal being resolvable — Import-Module PSPKI doesn't reliably
      # surface that type to the runas session until first use of a PSPKI cmdlet.
      $alreadyGranted = @($acl.Access | Where-Object {
          $_.AccessType -eq 'Allow' -and
          ($_.Rights.ToString() -split ',\s*' -contains 'ManageCa') -and
          ($_.IdentityReference.ToString() -ieq $caManagerUser)
      }).Count -gt 0

      if ($alreadyGranted) {
          $Ansible.Changed = $false
      } else {
          $acl |
              Add-CertificationAuthorityAcl -Identity "$caManagerUser" -AccessType "Allow" -AccessMask "ManageCa" |
              Set-CertificationAuthorityAcl -RestartCA
          $Ansible.Changed = $true
      }
    error_action: stop
    parameters:
      caManagerUser: "{{ item.value.ca_manager }}"
  vars:
    ansible_become: true
    ansible_become_method: runas
    domain_name: "{{ domain }}"
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
  with_dict: "{{ vulns_vars }}"
