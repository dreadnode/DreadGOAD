# 0	Disabled. LDAP channel binding tokens (CBT) are not required.
# 1	Enabled (optional). CBT is validated if present, but not required.
# 2	Strict enforcement. Clients must support channel binding; otherwise binds fail.
- name: Disable LDAPS Channel Binding (LdapEnforceChannelBindings = 0)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters
    name: LdapEnforceChannelBindings
    type: dword
    data: 0
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
