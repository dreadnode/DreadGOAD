- name: Debug managed_by results
  ansible.builtin.debug:
    msg: 
      - "Domainlocal groups managed_by failures: {{ domainlocal_managed_by_result.results | selectattr('failed', 'defined') | selectattr('failed') | list | length }}"
      - "Universal groups managed_by failures: {{ universal_managed_by_result.results | selectattr('failed', 'defined') | selectattr('failed') | list | length }}"
      - "Global groups managed_by failures: {{ global_managed_by_result.results | selectattr('failed', 'defined') | selectattr('failed') | list | length }}"
  when: domainlocal_managed_by_result is defined or universal_managed_by_result is defined or global_managed_by_result is defined