---
- name: Ensure Administrator is part of Domain Admins
  ansible.windows.win_powershell:
    script: |
      $domainAdmin = "{{ admin_user }}"
      $domainName = "{{ lab.hosts[dict_key].domain }}"
      $domainNetbios = "{{ lab.hosts[dict_key].domain.split('.')[0] }}"
      
      try {
          # Try the built-in AD cmdlet first
          Add-ADGroupMember -Identity "Domain Admins" -Members $domainAdmin -ErrorAction Stop
          Write-Output "Successfully added $domainAdmin to Domain Admins using Add-ADGroupMember"
          $Ansible.Changed = $true
      } catch {
          Write-Output "Standard AD cmdlet failed: $_"
          
          # If the cmdlet fails, try the traditional NET GROUP command
          try {
              $result = & net group "Domain Admins" "$domainNetbios\$domainAdmin" /add 2>&1
              if ($LASTEXITCODE -eq 0) {
                  Write-Output "Successfully added $domainAdmin to Domain Admins using net group command"
                  $Ansible.Changed = $true
              } else {
                  throw "net group command failed with exit code $LASTEXITCODE"
              }
          } catch {
              Write-Error "Failed to add $domainAdmin to Domain Admins: $_"
              $Ansible.Changed = $false
          }
      }
  register: admin_group_result
  
- name: organisation units
  import_tasks: ou.yml

- name: groups
  import_tasks: groups.yml

- name: users
  import_tasks: users.yml

# Managed BY
- name: Assign managed_by domainlocal groups
  microsoft.ad.group:
    name: "{{ item.key }}"
    managed_by: "{{ item.value.managed_by }}"
  with_dict: "{{ ad_groups['domainlocal'] }}"
  when: ad_groups['domainlocal'] is defined and item.value.managed_by is defined

- name: Assign managed_by universal groups
  microsoft.ad.group:
    name: "{{ item.key }}"
    managed_by: "{{ item.value.managed_by }}"
  with_dict: "{{ ad_groups['universal'] }}"
  when: ad_groups['universal'] is defined and item.value.managed_by is defined

- name: Assign managed_by global groups
  microsoft.ad.group:
    name: "{{ item.key }}"
    managed_by: "{{ item.value.managed_by }}"
  with_dict: "{{ ad_groups['global'] }}"
  when: ad_groups['global'] is defined and item.value.managed_by is defined

# Add members
- name: Add members to the Universal group, preserving existing membership
  microsoft.ad.group:
    name: "{{ item.key }}"
    members: "{{ item.value.members }}"
    state: present
  with_dict: "{{ ad_groups['universal'] }}"
  when: ad_groups['universal'] is defined and item.value.members is defined

- name: Add members to the Global group, preserving existing membership
  microsoft.ad.group:
    name: "{{ item.key }}"
    members: "{{ item.value.members }}"
    state: present
  with_dict: "{{ ad_groups['global'] }}"
  when: ad_groups['global'] is defined and item.value.members is defined

- name: Add members to the Domainlocal group, preserving existing membership
  microsoft.ad.group:
    name: "{{ item.key }}"
    members: "{{ item.value.members }}"
    state: present
  with_dict: "{{ ad_groups['domainlocal'] }}"
  when: ad_groups['domainlocal'] is defined and item.value.members is defined