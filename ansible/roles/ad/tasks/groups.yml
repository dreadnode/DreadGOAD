---
# https://clintboessen.blogspot.com/2010/04/group-scopes.html
# https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2003/cc755692(v=ws.10)
- name: Create Universal Groups
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]$GroupName,
          [String]$GroupScope = "Universal",
          [String]$Path
      )
      try {
          try {
              $groupExists = Get-ADGroup -Filter {Name -eq $GroupName} -ErrorAction SilentlyContinue
          } catch {
              $groupExists = $null
          }
          if ($groupExists) {
              Write-Output "Group $GroupName already exists, skipping creation"
              $Ansible.Changed = $false
          } else {
              $params = @{
                  Name = $GroupName
                  GroupScope = $GroupScope
                  GroupCategory = "Security"
              }
              if (-not [String]::IsNullOrEmpty($Path)) {
                  $params["Path"] = $Path
              }
              New-ADGroup @params
              Write-Output "Group $GroupName created successfully"
              $Ansible.Changed = $true
          }
      } catch {
          Write-Error "Failed to create group $GroupName - $_"
          $Ansible.Changed = $false
          exit 1
      }
    parameters:
      GroupName: "{{ item.key }}"
      GroupScope: "Universal"
      Path: "{{ item.value.path | default('') }}"
  loop: "{{ ad_groups['universal'] | dict2items }}"
  loop_control:
    label: "Creating universal group: {{ item.key }}"
  when: ad_groups['universal'] is defined
  register: universal_group_result
  retries: 3
  delay: 10
  until: universal_group_result is not failed
  async: 120
  poll: 0

- name: Wait for Universal group creation to complete
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: universal_group_status
  until: universal_group_status.finished
  retries: 30
  delay: 5
  loop: "{{ universal_group_result.results }}"
  loop_control:
    label: "Waiting for universal group: {{ item.item.key }}"
  when: universal_group_result is not skipped and item.ansible_job_id is defined
  failed_when: universal_group_status.finished and universal_group_status.failed

