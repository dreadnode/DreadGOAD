- name: Create DomainLocal Groups
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]$GroupName,
          [String]$GroupScope = "DomainLocal",
          [String]$Path
      )

      # First check if AD Web Services are running
      try {
          # Try to get domain info to check connectivity
          $domainInfo = Get-ADDomain -ErrorAction SilentlyContinue
          Write-Output "AD Web Services are available, domain is $($domainInfo.DNSRoot)"
      } catch {
          # Check if the service is running
          $adws = Get-Service -Name ADWS -ErrorAction SilentlyContinue
          if (-not $adws -or $adws.Status -ne 'Running') {
              Start-Service -Name ADWS -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 10
              try {
                  $domainInfo = Get-ADDomain -ErrorAction Stop
                  Write-Output "AD Web Services are now available, domain is $($domainInfo.DNSRoot)"
              } catch {
                  Write-Error ("Active Directory Web Services still not available - " + $_.Exception.Message)
                  exit 1
              }
          } else {
              Write-Error ("Unable to connect to Active Directory - " + $_.Exception.Message)
              exit 1
          }
      }

      try {
          # Check if group exists
          try {
              $groupExists = Get-ADGroup -Filter {Name -eq $GroupName} -ErrorAction SilentlyContinue
          } catch {
              # Error in Get-ADGroup, possibly domain connectivity issues
              Write-Error ("Failed to query AD for group $GroupName - " + $_.Exception.Message)
              exit 1
          }

          if ($groupExists) {
              Write-Output "Group $GroupName already exists, skipping creation"
              $Ansible.Changed = $false
          } else {
              $params = @{
                  Name = $GroupName
                  GroupScope = $GroupScope
                  GroupCategory = "Security"
              }
              if (-not [String]::IsNullOrEmpty($Path)) {
                  $params["Path"] = $Path
              }

              New-ADGroup @params
              Write-Output "Group $GroupName created successfully"
              $Ansible.Changed = $true
          }
      } catch {
          Write-Error ("Failed to create group $GroupName - " + $_.Exception.Message)
          $Ansible.Changed = $false
          exit 1
      }
    parameters:
      GroupName: "{{ item.key }}"
      GroupScope: "DomainLocal"
      Path: "{{ item.value.path | default('') }}"
  loop: "{{ ad_groups['domainlocal'] | dict2items }}"
  loop_control:
    label: "Creating domainlocal group: {{ item.key }}"
  when: ad_groups['domainlocal'] is defined
  register: domainlocal_group_result
  retries: 3
  delay: 10
  until: domainlocal_group_result is not failed
  async: 120
  poll: 0

- name: Wait for DomainLocal group creation to complete
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: domainlocal_group_status
  until: domainlocal_group_status.finished
  retries: 30
  delay: 5
  loop: "{{ domainlocal_group_result.results }}"
  loop_control:
    label: "Waiting for domainlocal group: {{ item.item.key }}"
  when: domainlocal_group_result is not skipped and item.ansible_job_id is defined
  failed_when: domainlocal_group_status.finished and domainlocal_group_status.failed
