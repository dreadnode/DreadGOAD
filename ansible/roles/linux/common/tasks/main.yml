######################################
# Update and upgrade
######################################
- name: update and upgrade apt
  apt:
    upgrade: true
    update_cache: true
    cache_valid_time: 86400 #One day

######################################
# Generic tools
######################################
- name: Install useful system tools
  apt: name={{ item }} state=present
  with_items:
    - vim
    - htop
    - git
    - openssl
    - tmux
    - curl
    - tar
    - nano
    - rsync

