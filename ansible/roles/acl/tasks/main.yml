---
# acl : $for, $to, $right, $inheritance
## acl values :
# AccessSystemSecurity
# CreateChild
# Delete
# DeleteChild
# DeleteTree
# ExtendedRight
# GenericAll
# GenericExecute
# GenericRead
# GenericWrite
# ListChildren
# ListObject
# ReadControl
# ReadProperty
# Self
# Synchronize
# WriteDacl
# WriteOwner
# WriteProperty

## extend rights
# "00299570-246d-11d0-a768-00aa006e0529" {$right = "User-Force-Change-Password"}
# "45ec5156-db7e-47bb-b53f-dbeb2d03c40"  {$right = "Reanimate-Tombstones"}
# "bf9679c0-0de6-11d0-a285-00aa003049e2" {$right = "Self-Membership"}
# "ba33815a-4f93-4c76-87f3-57574bff8109" {$right = "Manage-SID-History"}
# "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2" {$right = "DS-Replication-Get-Changes-All"}

# acl extended values allowed :
# Ext-User-Force-Change-Password', 'Ext-Self-Self-Membership', 'Ext-Write-Self-Membership'
# ACL abuse scenarios
# https://sensepost.com/blog/2020/ace-to-rce/
# https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/abusing-active-directory-acls-aces
# https://adsecurity.org/?p=3658
# https://docs.microsoft.com/en-us/previous-versions/tn-archive/ff405676(v=msdn.10)

- name: Set ACL for AD objects
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $for,
          [String]
          $to,
          [String]
          $right,
          [String]
          $inheritance
      )

      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = 'Stop'

      try {
        # Import module once at the beginning
        if (-not (Get-Module -Name ActiveDirectory -ErrorAction SilentlyContinue)) {
          Import-Module ActiveDirectory -ErrorAction Stop
        }

        # Define valid ACL values as hash tables for faster lookup
        $aclValues = @{
          'AccessSystemSecurity' = $true
          'CreateChild' = $true
          'Delete' = $true
          'DeleteChild' = $true
          'DeleteTree' = $true
          'ExtendedRight' = $true
          'GenericAll' = $true
          'GenericExecute' = $true
          'GenericRead' = $true
          'GenericWrite' = $true
          'ListChildren' = $true
          'ListObject' = $true
          'ReadControl' = $true
          'ReadProperty' = $true
          'Self' = $true
          'Synchronize' = $true
          'WriteDacl' = $true
          'WriteOwner' = $true
          'WriteProperty' = $true
        }

        $aclExtendedValueRightGUID = @{
          "Ext-User-Force-Change-Password" = @("ExtendedRight","00299570-246d-11d0-a768-00aa006e0529")
          "Ext-Write-Self-Membership" = @("WriteProperty","bf9679c0-0de6-11d0-a285-00aa003049e2")
          "Ext-Self-Self-Membership" = @("Self","bf9679c0-0de6-11d0-a285-00aa003049e2")
          "Ext-ManageCA" = @("ExtendedRight","18e470eb-9b98-47c5-896e-146c5c77100d")
          "Ext-Write-SPN" = @("WriteProperty","f3a64788-5306-11d1-a9c5-0000f80367c1")
        }

        # Get the SID for the principal
        if ($for.StartsWith("NT AUTHORITY")) {
          $forSID = New-Object System.Security.Principal.NTAccount "$for"
        } else {
          $forObj = Get-ADObject -Filter "SamAccountName -eq '$for'" -Properties objectSID -ErrorAction SilentlyContinue
          # Fallback for gMSA/computer accounts whose trailing $ may be
          # stripped during parameter serialisation over SSM.  Try the
          # type-specific cmdlets which resolve by CN (no $ needed).
          if (-not $forObj -and $for.EndsWith('$')) {
            $baseName = $for.TrimEnd('$')
            $forObj = Get-ADServiceAccount -Identity $baseName -Properties objectSID -ErrorAction SilentlyContinue
            if (-not $forObj) {
              $forObj = Get-ADComputer -Identity $baseName -Properties objectSID -ErrorAction SilentlyContinue
            }
          }
          # If $ was stripped before reaching us, $for won't end with $
          # but the AD object's SamAccountName does — try appending it.
          if (-not $forObj) {
            $withDollar = $for + '$'
            $forObj = Get-ADObject -Filter "SamAccountName -eq '$withDollar'" -Properties objectSID -ErrorAction SilentlyContinue
            # Get-ADObject -Filter can choke on trailing $ in filter strings;
            # fall back to type-specific cmdlets that use -Identity instead.
            if (-not $forObj) {
              $forObj = Get-ADServiceAccount -Identity $for -Properties objectSID -ErrorAction SilentlyContinue
            }
            if (-not $forObj) {
              $forObj = Get-ADComputer -Identity $for -Properties objectSID -ErrorAction SilentlyContinue
            }
          }
          if (-not $forObj) {
            throw "Cannot find object with SamAccountName: $for"
          }
          $forSID = New-Object System.Security.Principal.SecurityIdentifier $forObj.objectSID
        }

        # Resolve target object and get ACL
        $objOU = $null

        # Check if $to contains server specification
        $extra_args = @{}
        if ($to -match "\\\\") {
          $parts = $to.Split("\\\\", 2)
          $extra_args.Server = $parts[0]
          $to = $parts[1]
        }

        # Try to get object as DN first, then as SamAccountName
        try {
          # Test if it's already a DN
          if ($to -match "^(CN|OU|DC)=") {
            $objOU = $to
            $objAcl = Get-Acl -Path "AD:\$objOU" -ErrorAction Stop
          } else {
            # Get object by SamAccountName
            $toObj = Get-ADObject -Filter "SamAccountName -eq '$to'" -Properties DistinguishedName @extra_args -ErrorAction Stop
            if (-not $toObj) {
              throw "Cannot find object with SamAccountName: $to"
            }
            $objOU = $toObj.DistinguishedName
            $objAcl = Get-Acl -Path "AD:\$objOU" -ErrorAction Stop
          }
        } catch {
          throw "Failed to get ACL for object: $_"
        }

        $type = [System.Security.AccessControl.AccessControlType]::Allow
        # CORRECT - Using cast syntax for variable
        $inheritanceType = [System.DirectoryServices.ActiveDirectorySecurityInheritance] $inheritance

        $Ansible.Changed = $false

        # Create the appropriate ACE based on right type
        $ace = $null
        if ($aclValues.ContainsKey($right)) {
          # Standard access right - CORRECT cast syntax
          $adRight = [System.DirectoryServices.ActiveDirectoryRights] $right
          $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule $forSID,$adRight,$type,$inheritanceType
        } elseif ($aclExtendedValueRightGUID.ContainsKey($right)) {
          # Extended access right - CORRECT cast syntax
          $extendedRightInfo = $aclExtendedValueRightGUID[$right]
          $adRight = [System.DirectoryServices.ActiveDirectoryRights] $extendedRightInfo[0]
          $extendedRightGUID = [guid]$extendedRightInfo[1]
          $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule $forSID,$adRight,$type,$extendedRightGUID,$inheritanceType
        } else {
          # Unknown right type
          $Ansible.Result = @{
            status = "skipped"
            message = "Unknown right type: $right"
          }
          $Ansible.Changed = $false
          return
        }

        # Apply the ACE if created
        if ($ace) {
          $objAcl.AddAccessRule($ace)
          Set-Acl -AclObject $objAcl -Path "AD:\$objOU" -ErrorAction Stop
          $Ansible.Changed = $true
          $Ansible.Result = @{
            status = "success"
            message = "ACL set successfully for $objOU"
            for = $for
            to = $objOU
            right = $right
          }
        }
      } catch {
        $Ansible.Failed = $true
        $Ansible.Result = @{
          status = "error"
          message = $_.Exception.Message
          for = $for
          to = $to
          right = $right
        }
      }
    parameters:
      for: "{{ item.value.for }}"
      to: "{{ item.value.to }}"
      right: "{{ item.value.right }}"
      inheritance: "{{ item.value.inheritance }}"
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
  loop: "{{ ad_acls | dict2items }}"
  loop_control:
    label: "{{ item.key }}: {{ item.value.for }} -> {{ item.value.to }}"
