---
# acl : $for, $to, $right, $inheritance
## acl values :
# AccessSystemSecurity
# CreateChild
# Delete
# DeleteChild
# DeleteTree
# ExtendedRight
# GenericAll
# GenericExecute
# GenericRead
# GenericWrite
# ListChildren
# ListObject
# ReadControl
# ReadProperty
# Self
# Synchronize
# WriteDacl
# WriteOwner
# WriteProperty

## extend rights
# "00299570-246d-11d0-a768-00aa006e0529" {$right = "User-Force-Change-Password"}
# "45ec5156-db7e-47bb-b53f-dbeb2d03c40"  {$right = "Reanimate-Tombstones"}
# "bf9679c0-0de6-11d0-a285-00aa003049e2" {$right = "Self-Membership"}
# "ba33815a-4f93-4c76-87f3-57574bff8109" {$right = "Manage-SID-History"}
# "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2" {$right = "DS-Replication-Get-Changes-All"}

# acl extended values allowed :
# Ext-User-Force-Change-Password', 'Ext-Self-Self-Membership', 'Ext-Write-Self-Membership'
# ACL abuse scenarios
# https://sensepost.com/blog/2020/ace-to-rce/
# https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/abusing-active-directory-acls-aces
# https://adsecurity.org/?p=3658
# https://docs.microsoft.com/en-us/previous-versions/tn-archive/ff405676(v=msdn.10)

- name: Set ACL for AD objects
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $for,
          [String]
          $to,
          [String]
          $right,
          [String]
          $inheritance
      )

      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = 'Stop'

      try {
        # Import module once at the beginning
        if (-not (Get-Module -Name ActiveDirectory -ErrorAction SilentlyContinue)) {
          Import-Module ActiveDirectory -ErrorAction Stop
        }

        function Get-EscapedLDAPValue {
          param (
            [Parameter(Mandatory = $true)]
            [string]$Value
          )

          $escaped = $Value.Replace('\', '\5c').Replace('*', '\2a').Replace('(', '\28').Replace(')', '\29')
          if ($escaped.StartsWith('#')) {
            $escaped = '\23' + $escaped.Substring(1)
          }
          return $escaped.Replace(([string][char]0), '\00')
        }

        function Resolve-ADPrincipal {
          param (
            [Parameter(Mandatory = $true)]
            [string]$Identity
          )

          if ($Identity.StartsWith("NT AUTHORITY")) {
            return New-Object System.Security.Principal.NTAccount $Identity
          }

          $candidates = [System.Collections.Generic.List[string]]::new()
          $candidates.Add($Identity)

          if ($Identity.EndsWith('$')) {
            $trimmed = $Identity.TrimEnd('$')
            if ($trimmed -and -not $candidates.Contains($trimmed)) {
              $candidates.Add($trimmed)
            }
          } else {
            $withDollar = $Identity + '$'
            if (-not $candidates.Contains($withDollar)) {
              $candidates.Add($withDollar)
            }
          }

          foreach ($candidate in $candidates) {
            $escaped = Get-EscapedLDAPValue -Value $candidate
            $principal = Get-ADObject -LDAPFilter "(sAMAccountName=$escaped)" -Properties objectSID -ErrorAction SilentlyContinue
            if ($principal -and $principal.objectSID) {
              return New-Object System.Security.Principal.SecurityIdentifier $principal.objectSID
            }
          }

          foreach ($candidate in $candidates) {
            $serviceAccount = Get-ADServiceAccount -Identity $candidate -Properties objectSID -ErrorAction SilentlyContinue
            if ($serviceAccount -and $serviceAccount.objectSID) {
              return New-Object System.Security.Principal.SecurityIdentifier $serviceAccount.objectSID
            }

            $computer = Get-ADComputer -Identity $candidate -Properties objectSID -ErrorAction SilentlyContinue
            if ($computer -and $computer.objectSID) {
              return New-Object System.Security.Principal.SecurityIdentifier $computer.objectSID
            }

            $objectByName = Get-ADObject -Filter "Name -eq '$candidate'" -Properties objectSID -ErrorAction SilentlyContinue
            if ($objectByName -and $objectByName.objectSID) {
              return New-Object System.Security.Principal.SecurityIdentifier $objectByName.objectSID
            }
          }

          throw "Cannot find principal: $Identity"
        }

        function Resolve-ADTarget {
          param (
            [Parameter(Mandatory = $true)]
            [string]$Identity,

            [hashtable]$ExtraArgs = @{}
          )

          if ($Identity -match "^(CN|OU|DC)=") {
            return $Identity
          }

          $escaped = Get-EscapedLDAPValue -Value $Identity
          $targetObj = Get-ADObject -LDAPFilter "(sAMAccountName=$escaped)" -Properties DistinguishedName @ExtraArgs -ErrorAction SilentlyContinue
          if ($targetObj -and $targetObj.DistinguishedName) {
            return $targetObj.DistinguishedName
          }

          $targetObj = Get-ADObject -Filter "Name -eq '$Identity'" -Properties DistinguishedName @ExtraArgs -ErrorAction SilentlyContinue
          if ($targetObj -and $targetObj.DistinguishedName) {
            return $targetObj.DistinguishedName
          }

          throw "Cannot find object with identity: $Identity"
        }

        # Define valid ACL values as hash tables for faster lookup
        $aclValues = @{
          'AccessSystemSecurity' = $true
          'CreateChild' = $true
          'Delete' = $true
          'DeleteChild' = $true
          'DeleteTree' = $true
          'ExtendedRight' = $true
          'GenericAll' = $true
          'GenericExecute' = $true
          'GenericRead' = $true
          'GenericWrite' = $true
          'ListChildren' = $true
          'ListObject' = $true
          'ReadControl' = $true
          'ReadProperty' = $true
          'Self' = $true
          'Synchronize' = $true
          'WriteDacl' = $true
          'WriteOwner' = $true
          'WriteProperty' = $true
        }

        $aclExtendedValueRightGUID = @{
          "Ext-User-Force-Change-Password" = @("ExtendedRight","00299570-246d-11d0-a768-00aa006e0529")
          "Ext-Write-Self-Membership" = @("WriteProperty","bf9679c0-0de6-11d0-a285-00aa003049e2")
          "Ext-Self-Self-Membership" = @("Self","bf9679c0-0de6-11d0-a285-00aa003049e2")
          "Ext-ManageCA" = @("ExtendedRight","18e470eb-9b98-47c5-896e-146c5c77100d")
          "Ext-Write-SPN" = @("WriteProperty","f3a64788-5306-11d1-a9c5-0000f80367c1")
        }

        # Retry principal resolution to handle AD replication lag
        # (e.g. gMSA accounts created moments before by the gmsa role).
        # Cloud environments with cross-domain replication can take 2+ minutes.
        $forSID = $null
        $resolveMaxAttempts = 12
        for ($resolveAttempt = 1; $resolveAttempt -le $resolveMaxAttempts; $resolveAttempt++) {
          try {
            $forSID = Resolve-ADPrincipal -Identity $for
            break
          } catch {
            if ($resolveAttempt -eq $resolveMaxAttempts) { throw }
            Start-Sleep -Seconds 10
          }
        }

        # Resolve target object and get ACL
        $objOU = $null

        # Check if $to contains server specification
        $extra_args = @{}
        if ($to -match "\\") {
          $parts = $to.Split("\", 2)
          $extra_args.Server = $parts[0]
          $to = $parts[1]
        }

        # Retry target resolution to handle AD replication lag
        # (e.g. users created moments before by the ad-data role).
        # Cloud environments with cross-domain replication can take 2+ minutes.
        $targetMaxAttempts = 12
        for ($targetAttempt = 1; $targetAttempt -le $targetMaxAttempts; $targetAttempt++) {
          try {
            $objOU = Resolve-ADTarget -Identity $to -ExtraArgs $extra_args
            break
          } catch {
            if ($targetAttempt -eq $targetMaxAttempts) { throw }
            Start-Sleep -Seconds 10
          }
        }

        $type = [System.Security.AccessControl.AccessControlType]::Allow
        # CORRECT - Using cast syntax for variable
        $inheritanceType = [System.DirectoryServices.ActiveDirectorySecurityInheritance] $inheritance

        $Ansible.Changed = $false

        # Create the appropriate ACE based on right type
        $ace = $null
        if ($aclValues.ContainsKey($right)) {
          # Standard access right - CORRECT cast syntax
          $adRight = [System.DirectoryServices.ActiveDirectoryRights] $right
          $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule $forSID,$adRight,$type,$inheritanceType
        } elseif ($aclExtendedValueRightGUID.ContainsKey($right)) {
          # Extended access right - CORRECT cast syntax
          $extendedRightInfo = $aclExtendedValueRightGUID[$right]
          $adRight = [System.DirectoryServices.ActiveDirectoryRights] $extendedRightInfo[0]
          $extendedRightGUID = [guid]$extendedRightInfo[1]
          $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule $forSID,$adRight,$type,$extendedRightGUID,$inheritanceType
        } else {
          # Unknown right type
          $Ansible.Result = @{
            status = "skipped"
            message = "Unknown right type: $right"
          }
          $Ansible.Changed = $false
          return
        }

        # Apply the ACE via the AD: PSDrive (Get-Acl/Set-Acl) which uses
        # AD Web Services.  ADSI DirectoryEntry + CommitChanges() silently
        # fails to persist ACEs under Ansible's runas become context.
        if ($ace) {
          $adPath = "AD:\$objOU"
          $acl = Get-Acl -Path $adPath
          $acl.AddAccessRule($ace)
          Set-Acl -Path $adPath -AclObject $acl

          # Verify the ACE was persisted by comparing SIDs.
          # Always resolve $forSID to a SID string for reliable comparison
          # (NTAccount identities like NT AUTHORITY\ANONYMOUS LOGON must be
          # translated to their SID first).
          $verifyAcl = Get-Acl -Path $adPath
          if ($forSID -is [System.Security.Principal.SecurityIdentifier]) {
            $sidValue = $forSID.Value
          } else {
            try { $sidValue = $forSID.Translate([System.Security.Principal.SecurityIdentifier]).Value }
            catch { $sidValue = $forSID.ToString() }
          }
          $verified = $false
          foreach ($entry in $verifyAcl.Access) {
            try {
              $entrySid = $entry.IdentityReference
              if ($entrySid -is [System.Security.Principal.SecurityIdentifier]) {
                if ($entrySid.Value -eq $sidValue) { $verified = $true; break }
              } else {
                $translated = $entrySid.Translate([System.Security.Principal.SecurityIdentifier])
                if ($translated.Value -eq $sidValue) { $verified = $true; break }
              }
            } catch { continue }
          }

          if (-not $verified) {
            throw "ACL for $for on $objOU was written but not persisted — verify AD permissions for the become user"
          }

          # If the target is protected by SDProp, also apply the ACE to the
          # AdminSDHolder template object.  SDProp resets the DACL on
          # protected objects every ~60 minutes to match AdminSDHolder,
          # stripping any ACEs we add directly.
          #
          # We check both adminCount=1 (already flagged by a previous
          # SDProp cycle) AND transitive membership in protected groups
          # (handles the case where groups were just created and SDProp
          # hasn't run yet to set adminCount).
          $needsAdminSDHolder = $false
          $targetADObj = Get-ADObject -LDAPFilter "(distinguishedName=$objOU)" -Properties adminCount -ErrorAction SilentlyContinue
          if ($targetADObj) {
            if ($targetADObj.adminCount -eq 1) {
              $needsAdminSDHolder = $true
            } else {
              $pgNames = @(
                'Domain Admins','Enterprise Admins','Schema Admins',
                'Administrators','Account Operators','Server Operators',
                'Print Operators','Backup Operators','Replicator',
                'Key Admins','Enterprise Key Admins'
              )
              $pgFilter = '(|' + (($pgNames | ForEach-Object { "(sAMAccountName=$_)" }) -join '') + ')'
              $memberFilter = "(&$pgFilter(member:1.2.840.113556.1.4.1941:=$objOU))"
              $protectedMatch = Get-ADObject -LDAPFilter $memberFilter -ErrorAction SilentlyContinue
              if ($protectedMatch) {
                $needsAdminSDHolder = $true
              }
            }
          }

          if ($needsAdminSDHolder) {
            $domainDN = (($objOU -split ',') | Where-Object { $_ -match '^DC=' }) -join ','
            $sdHolderDN = "CN=AdminSDHolder,CN=System,$domainDN"
            $sdAcl = Get-Acl -Path "AD:\$sdHolderDN"
            $sdAcl.AddAccessRule($ace)
            Set-Acl -Path "AD:\$sdHolderDN" -AclObject $sdAcl
          }

          $Ansible.Changed = $true
          $Ansible.Result = @{
            status = "success"
            message = "ACL set successfully for $objOU"
            for = $for
            to = $objOU
            right = $right
          }
        }
      } catch {
        $Ansible.Failed = $true
        $Ansible.Result = @{
          status = "error"
          message = $_.Exception.Message
          for = $for
          to = $to
          right = $right
        }
      }
    parameters:
      for: "{{ item.value.for }}"
      to: "{{ item.value.to }}"
      right: "{{ item.value.right }}"
      inheritance: "{{ item.value.inheritance }}"
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
  loop: "{{ ad_acls | dict2items }}"
  loop_control:
    label: "{{ item.key }}: {{ item.value.for }} -> {{ item.value.to }}"
