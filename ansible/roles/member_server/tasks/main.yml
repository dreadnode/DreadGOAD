---
- name: Prioritize the domain interface as the default for routing
  ansible.windows.win_shell:
    Set-NetIPInterface -InterfaceAlias "{{ domain_adapter }}" -InterfaceMetric 10
  when: two_adapters | default(false) | bool

- name: Set configure DNS to domain controller
  ansible.windows.win_dns_client:
    adapter_names: "{{ domain_adapter }}"
    ipv4_addresses:
      - "{{ hostvars[dns_domain]['dc_ipv4'] | default(instance_to_ip[hostvars[dns_domain]['ansible_host']] if hostvars[dns_domain]['ansible_host'] in instance_to_ip else hostvars[dns_domain].ansible_host) }}"
    log_path: C:\dns_log.txt

- name: Verify File Server Role is installed
  ansible.windows.win_feature:
    name: File-Services, FS-FileServer
    state: present
    include_management_tools: True

- name: Add member server
  microsoft.ad.membership:
    dns_domain_name: "{{ member_domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    state: domain
  register: domain_state
  async: 1800
  poll: 60
  failed_when: false

- name: Reboot if needed
  ansible.windows.win_reboot:
    reboot_timeout: 1500
    post_reboot_delay: 100
  when: domain_state is changed and (domain_state.reboot_required | default(false))
