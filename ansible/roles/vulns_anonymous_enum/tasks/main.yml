---
# Enable anonymous/null session enumeration
# This allows unauthenticated users to enumerate users, groups, and shares
# Reference: https://learn.microsoft.com/en-us/troubleshoot/windows-server/networking/anonymous-access-restrictions-are-enabled

# Set RestrictAnonymous to 0 to allow anonymous enumeration
# Values:
#   0 = None. Rely on default permissions (allows anonymous enumeration)
#   1 = Do not allow enumeration of SAM accounts and shares
#   2 = No access without explicit anonymous permissions (blocks null sessions)
- name: Enable anonymous enumeration (RestrictAnonymous = 0)
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Lsa
    name: RestrictAnonymous
    data: 0x0
    type: dword

# Also set RestrictAnonymousSAM to 0 for SAM account enumeration
- name: Enable anonymous SAM enumeration (RestrictAnonymousSAM = 0)
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Lsa
    name: RestrictAnonymousSAM
    data: 0x0
    type: dword

# Set EveryoneIncludesAnonymous to 1 for broader anonymous access
- name: Enable EveryoneIncludesAnonymous
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Lsa
    name: EveryoneIncludesAnonymous
    data: 0x1
    type: dword

# Enable anonymous SID/name translation via security policy
# This is CRITICAL for rpcclient enumeration, RID cycling, and LDAP anonymous queries
# Reference: https://learn.microsoft.com/en-us/windows/security/threat-protection/security-policy-settings/network-access-allow-anonymous-sidname-translation
- name: Create minimal security policy template with LSAAnonymousNameLookup
  ansible.windows.win_shell: |
    $lines = @(
      '[Unicode]',
      'Unicode=yes',
      '[Version]',
      'signature="$CHICAGO$"',
      'Revision=1',
      '[System Access]',
      'LSAAnonymousNameLookup = 1'
    )
    Set-Content -Path C:\temp-anon-policy.inf -Value ($lines -join "`r`n") -Encoding ASCII
  tags: lsa_policy

- name: Apply LSAAnonymousNameLookup security policy
  ansible.windows.win_shell: |
    secedit /configure /db C:\Windows\Temp\secedit-anon.sdb /cfg C:\temp-anon-policy.inf /areas SECURITYPOLICY /log C:\Windows\Temp\secedit-anon.log /quiet
  register: secedit_result
  # Note: This will fail on Domain Controllers because LSAAnonymousNameLookup is controlled by Group Policy
  # The GPO update task below will handle the DC case
  failed_when: false
  tags: lsa_policy

- name: Read secedit log for LSAAnonymousNameLookup apply
  ansible.windows.win_shell: |
    if (Test-Path C:\Windows\Temp\secedit-anon.log) {
      Get-Content C:\Windows\Temp\secedit-anon.log -Tail 200
    } else {
      Write-Output "secedit log not found"
    }
  register: secedit_log
  changed_when: false
  failed_when: false

- name: Read scesrv.log tail for LSAAnonymousNameLookup apply
  ansible.windows.win_shell: |
    if (Test-Path C:\Windows\Security\Logs\scesrv.log) {
      Get-Content C:\Windows\Security\Logs\scesrv.log -Tail 200
    } else {
      Write-Output "scesrv log not found"
    }
  register: scesrv_log
  changed_when: false
  failed_when: false
  tags: lsa_policy

- name: Remove temporary policy file
  ansible.windows.win_file:
    path: C:\temp-anon-policy.inf
    state: absent
  tags: lsa_policy

- name: Verify LSAAnonymousNameLookup is enabled
  ansible.windows.win_shell: |
    secedit /export /cfg C:\temp-verify.inf
    $result = Get-Content C:\temp-verify.inf | Select-String 'LSAAnonymousNameLookup'
    Remove-Item C:\temp-verify.inf -Force
    Write-Output $result
  args:
    executable: powershell.exe
  register: verify_result
  changed_when: false
  tags: lsa_policy

- name: Update Default Domain Controllers Policy if local policy did not apply
  ansible.windows.win_shell: |
    # Get the domain DNS name
    $domain = (Get-ADDomain).DNSRoot

    # Construct the SYSVOL path to the Default Domain Controllers Policy GptTmpl.inf
    # {6AC1786C-016F-11D2-945F-00C04fB984F9} is the GUID for Default Domain Controllers Policy
    $secEdit = "C:\Windows\SYSVOL\sysvol\$domain\Policies\{6AC1786C-016F-11D2-945F-00C04fB984F9}\MACHINE\Microsoft\Windows NT\SecEdit\GptTmpl.inf"

    Write-Output "GPO template path: $secEdit"

    if (Test-Path $secEdit) {
      $lines = [System.Collections.Generic.List[string]](Get-Content -Path $secEdit -Encoding Unicode)
    } else {
      Write-Output "WARNING: GptTmpl.inf not found, creating new template"
      $lines = [System.Collections.Generic.List[string]]@(
        "[Unicode]",
        "Unicode=yes",
        "[Version]",
        "signature=`"`$CHICAGO`$`"",
        "Revision=1"
      )
    }

    $sectionIndex = $lines.FindIndex({ param($l) $l -match '^\[System Access\]$' })
    if ($sectionIndex -lt 0) {
      $lines.Add("")
      $lines.Add("[System Access]")
      $sectionIndex = $lines.Count - 1
    }

    $found = $false
    for ($i = 0; $i -lt $lines.Count; $i++) {
      if ($lines[$i] -match '^\s*LSAAnonymousNameLookup\s*=') {
        $lines[$i] = "LSAAnonymousNameLookup = 1"
        $found = $true
        break
      }
    }
    if (-not $found) {
      $lines.Insert($sectionIndex + 1, "LSAAnonymousNameLookup = 1")
    }

    Set-Content -Path $secEdit -Value $lines -Encoding Unicode

    # Increment GPO version to force clients to process the update
    $gptIniPath = "C:\Windows\SYSVOL\sysvol\$domain\Policies\{6AC1786C-016F-11D2-945F-00C04fB984F9}\GPT.INI"
    if (Test-Path $gptIniPath) {
      $gptIni = Get-Content $gptIniPath
      $versionLine = $gptIni | Where-Object { $_ -match '^Version=' }
      if ($versionLine) {
        $version = [int]($versionLine -replace 'Version=', '')
        $newVersion = $version + 1
        $gptIni = $gptIni -replace '^Version=.*', "Version=$newVersion"
        Set-Content -Path $gptIniPath -Value $gptIni
        Write-Output "Incremented GPO version to $newVersion"
      }
    }

    Write-Output "Forcing Group Policy update..."
    gpupdate /target:computer /force | Out-Null
    Start-Sleep -Seconds 5
    secedit /refreshpolicy machine_policy /enforce | Out-Null
    Start-Sleep -Seconds 5
  register: gpo_fix
  failed_when: false
  when: verify_result.stdout is not search('LSAAnonymousNameLookup\\s*=\\s*1')
  tags: lsa_policy

- name: Verify LSAAnonymousNameLookup after GPO update
  ansible.windows.win_shell: |
    secedit /export /cfg C:\temp-verify.inf
    $result = Get-Content C:\temp-verify.inf | Select-String 'LSAAnonymousNameLookup'
    Remove-Item C:\temp-verify.inf -Force
    Write-Output $result
  args:
    executable: powershell.exe
  register: verify_result_after_gpo
  changed_when: false
  when: verify_result.stdout is not search('LSAAnonymousNameLookup\\s*=\\s*1')
  tags: lsa_policy

- name: Fail if LSAAnonymousNameLookup not applied
  ansible.builtin.fail:
    msg: "LSAAnonymousNameLookup was not applied: {{ verify_result.stdout | default('') }} | after GPO: {{ verify_result_after_gpo.stdout | default('') }} | secedit log: {{ secedit_log.stdout | default('') }} | scesrv log: {{ scesrv_log.stdout | default('') }}"
  when: verify_result.stdout is not search('LSAAnonymousNameLookup\\s*=\\s*1') and (verify_result_after_gpo is not defined or verify_result_after_gpo.stdout is not search('LSAAnonymousNameLookup\\s*=\\s*1'))
  tags: lsa_policy

- name: Display LSAAnonymousNameLookup verification
  ansible.builtin.debug:
    msg: "LSAAnonymousNameLookup status: {{ verify_result.stdout_lines }}"
  tags: lsa_policy
