---
- name: Force a DNS on the adapter {{ nat_adapter }}
  ansible.windows.win_dns_client:
    adapter_names: "{{ nat_adapter }}"
    dns_servers:
      - "{{ dns_server }}"
      - "{{ dns_server_forwarder }}"
  when: force_dns_server | bool

- name: Set a proxy for specific protocols
  ansible.windows.win_inet_proxy:
    proxy:
      http: "{{ ad_http_proxy }}"
      https: "{{ ad_https_proxy }}"
    bypass: ["<local>", "*.local", "169.254.169.254"]
  when: enable_http_proxy | bool

- name: Configure IE to use a specific proxy per protocol
  ansible.windows.win_inet_proxy:
    proxy:
      http: "{{ ad_http_proxy }}"
      https: "{{ ad_https_proxy }}"
    bypass: ["<local>", "*.local", "169.254.169.254"]
  when: enable_http_proxy | bool

- name: Upgrade module PowerShellGet to fix accept license issue
  ansible.windows.win_shell: |
    $ProgressPreference = 'SilentlyContinue'
    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
    Install-PackageProvider -Name NuGet -Force
    Install-Module PowerShellGet -Force

- name: Check all required modules
  ansible.windows.win_shell: |
    $ProgressPreference = 'SilentlyContinue'
    $modules = @('ComputerManagementDsc', 'ActiveDirectoryDSC', 'xNetworking')
    $missing = @()

    foreach ($module in $modules) {
      if (-not (Get-Module -ListAvailable -Name $module)) {
        $missing += $module
      }
    }

    if ($missing.Count -gt 0) {
      Write-Output ($missing -join ',')
      exit 1
    } else {
      Write-Output "ALL_INSTALLED"
      exit 0
    }
  register: module_check
  failed_when: false
  changed_when: false

- name: Install all missing modules in parallel
  community.windows.win_psmodule:
    name: "{{ item | trim }}"
    state: present
    accept_license: true
    skip_publisher_check: true
  environment:
    LOCALAPPDATA: 'C:\Windows\system32\config\systemprofile\AppData\Local'
  loop: "{{ module_check.stdout_lines[0].split(',') if module_check.stdout_lines else [] }}"
  loop_control:
    label: "Installing module: {{ item | trim }}"
  when:
    - module_check.rc != 0
    - item | trim != ''
    - item | trim != 'ALL_INSTALLED'
  register: module_install
  async: 300
  poll: 0
  vars:
    ansible_win_async_startup_timeout: 30

- name: Wait for module installations to complete
  ansible.builtin.async_status:
    jid: "{{ async_result_item.ansible_job_id }}"
  loop: "{{ module_install.results }}"
  loop_control:
    loop_var: "async_result_item"
    label: "Waiting for module: {{ async_result_item.item | default('unknown') | trim }}"
  register: async_poll_results
  until: async_poll_results.finished
  retries: 60
  delay: 5
  when:
    - module_install is not skipped
    - async_result_item.ansible_job_id is defined
  failed_when: async_poll_results.finished and async_poll_results.failed

- name: Windows | Enable Remote Desktop
  ansible.windows.win_dsc:
    resource_name: RemoteDesktopAdmin
    IsSingleInstance: 'Yes'
    Ensure: present
    UserAuthentication: Secure

- name: Firewall | Allow RDP through Firewall
  ansible.windows.win_dsc:
    resource_name: xFirewall
    Name: "Administrator access for RDP (TCP-In)"
    Ensure: present
    Enabled: True
    Profile: "Domain"
    Direction: "Inbound"
    Localport: "3389"
    Protocol: "TCP"
    Description: "Opens the listener port for RDP"

- name: Add a network static route
  ansible.windows.win_route:
    destination: "{{ route_network }}"
    gateway: "{{ route_gateway }}"
    metric: 1
    state: present
  when: add_route | bool
