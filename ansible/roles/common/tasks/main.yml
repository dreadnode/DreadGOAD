---
- name: Force a DNS on the adapter {{ nat_adapter }}
  ansible.windows.win_dns_client:
    adapter_names: "{{ nat_adapter }}"
    dns_servers:
      - "{{ dns_server }}"
      - "{{ dns_server_forwarder }}"
  when: force_dns_server | bool

- name: Set a proxy for specific protocols
  ansible.windows.win_inet_proxy:
    proxy:
      http: "{{ ad_http_proxy }}"
      https: "{{ ad_https_proxy }}"
    bypass: ["<local>", "*.local", "169.254.169.254"]
  when: enable_http_proxy | bool

- name: Configure IE to use a specific proxy per protocol
  ansible.windows.win_inet_proxy:
    proxy:
      http: "{{ ad_http_proxy }}"
      https: "{{ ad_https_proxy }}"
    bypass: ["<local>", "*.local", "169.254.169.254"]
  when: enable_http_proxy | bool

- name: Install DSC modules (skip on prebaked AMIs)
  when: not ((goad_prebaked | default({})).dsc_modules | default(false))
  block:
    - name: Upgrade module PowerShellGet to fix accept license issue
      ansible.windows.win_shell: |
        $ProgressPreference = 'SilentlyContinue'
        $ErrorActionPreference = 'Stop'
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Install-PackageProvider -Name NuGet -Force -Confirm:$false
        Install-Module PowerShellGet -Force -Confirm:$false
        # Newly-installed DLLs sometimes carry Mark-of-the-Web from the .nupkg
        # download, which makes Microsoft.PackageManagement.dll fail to load on
        # the next Install-Module call ("Catastrophic failure" / 0x8000FFFF).
        Get-ChildItem -Path 'C:\Program Files\WindowsPowerShell\Modules' -Recurse -ErrorAction SilentlyContinue |
          Unblock-File -ErrorAction SilentlyContinue
      register: powershellget_install
      retries: 3
      delay: 10
      until: powershellget_install is not failed

    - name: Install DSC modules sequentially
      ansible.windows.win_shell: |
        $ProgressPreference = 'SilentlyContinue'
        $ErrorActionPreference = 'Stop'
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

        $name = '{{ item }}'
        if (Get-Module -ListAvailable -Name $name) {
          Write-Output "$name already installed"
          exit 0
        }

        # Unblock any pending downloads from a previous failed attempt before
        # invoking PackageManagement again.
        Get-ChildItem -Path 'C:\Program Files\WindowsPowerShell\Modules' -Recurse -ErrorAction SilentlyContinue |
          Unblock-File -ErrorAction SilentlyContinue

        Install-Module -Name $name -Force -SkipPublisherCheck -AcceptLicense -Confirm:$false -AllowClobber

        if (-not (Get-Module -ListAvailable -Name $name)) {
          throw "Install-Module reported success but $name is not available"
        }
        Write-Output "$name installed"
      loop:
        - ComputerManagementDsc
        - ActiveDirectoryDSC
        - xNetworking
      loop_control:
        label: "Module: {{ item }}"
      register: dsc_module_install
      retries: 5
      delay: 20
      until: dsc_module_install is not failed

- name: Verify DSC LCM is ready
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        $lcm = Get-DscLocalConfigurationManager
        if ($lcm.LCMState -ne 'Idle') {
          throw "LCM not ready, state: $($lcm.LCMState)"
        }
        Write-Output "DSC LCM is ready (state: Idle)"
        $Ansible.Changed = $false
      } catch {
        $Ansible.Failed = $true
        throw $_
      }
  register: dsc_ready
  retries: 5
  delay: 5
  until: dsc_ready is not failed
  changed_when: false

- name: Enable RDP (skip on prebaked AMIs)
  when: not ((goad_prebaked | default({})).rdp_enabled | default(false))
  block:
    - name: Windows | Enable Remote Desktop
      ansible.windows.win_dsc:
        resource_name: RemoteDesktopAdmin
        IsSingleInstance: 'Yes'
        Ensure: present
        UserAuthentication: Secure
      register: rdp_result
      retries: 3
      delay: 10
      until: rdp_result is not failed

    - name: Firewall | Allow RDP through Firewall
      ansible.windows.win_dsc:
        resource_name: xFirewall
        Name: "Administrator access for RDP (TCP-In)"
        Ensure: present
        Enabled: True
        Profile: "Domain"
        Direction: "Inbound"
        Localport: "3389"
        Protocol: "TCP"
        Description: "Opens the listener port for RDP"
      register: firewall_result
      retries: 3
      delay: 10
      until: firewall_result is not failed

- name: Add a network static route
  ansible.windows.win_route:
    destination: "{{ route_network }}"
    gateway: "{{ route_gateway }}"
    metric: 1
    state: present
  when: add_route | bool
