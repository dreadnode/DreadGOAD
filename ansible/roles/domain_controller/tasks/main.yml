---
# DNSCHANGE
# - name: "disable interface {{nat_adapter}} before join domain"
#   win_shell: netsh interface set interface "{{nat_adapter}}" disable
- name: Disable the registration of the {{ nat_adapter }} interface (NAT address) in DNS
  ansible.windows.win_shell:
    Get-NetAdapter -Name "{{ nat_adapter }}" | Set-DNSClient -RegisterThisConnectionsAddress $False
  register: disable_dns_reg
  failed_when: 
    - disable_dns_reg.rc != 0
    - "'Cannot find network adapter' not in disable_dns_reg.stderr"
  when: two_adapters

- name: Ensure that domain exists
  microsoft.ad.domain:
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
  register: check_domain
  failed_when: false

- name: Reboot if domain creation requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: check_domain.reboot_required | default(false) or 
        (check_domain is failed and "needs to be restarted" in check_domain.msg | default(''))

- name: Re-attempt domain creation
  microsoft.ad.domain:
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
    domain_netbios_name: "{{ netbios_name }}"
  register: retry_domain
  when: check_domain is failed  
  failed_when: 
    - retry_domain is failed
    - '"needs to be restarted" not in retry_domain.msg | default("")'
    - '"already exists" not in retry_domain.msg | default("")'

- name: Reboot after retry if needed
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: retry_domain.reboot_required | default(false) or 
        (retry_domain is failed and "needs to be restarted" in retry_domain.msg | default(''))

- name: Wait for domain to fully initialize
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        $domain = Get-ADDomain -ErrorAction Stop
        Write-Output "Domain $($domain.Name) is accessible"
        $Ansible.Changed = $false
      } catch {
        $Ansible.Failed = $true
        Write-Error "Domain not yet accessible: $_"
      }
  register: domain_check
  until: domain_check is not failed
  retries: 10
  delay: 30
  changed_when: false

- name: Ensure the server is a domain controller
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    state: domain_controller
  register: check_domain_controller
  failed_when: 
    - check_domain_controller is failed
    - '"needs to be restarted" not in check_domain_controller.msg | default("")'
    - '"already a domain controller" not in check_domain_controller.msg | default("")'

- name: Reboot if domain controller promotion requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: check_domain_controller.reboot_required | default(false) or 
        (check_domain_controller is failed and "needs to be restarted" in check_domain_controller.msg | default(''))

- name: Re-attempt domain controller promotion if needed
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    state: domain_controller
  register: retry_dc_promotion
  when: check_domain_controller is failed and "needs to be restarted" in check_domain_controller.msg | default('')
  failed_when: 
    - retry_dc_promotion is defined
    - retry_dc_promotion is failed
    - '"needs to be restarted" not in retry_dc_promotion.msg | default("")'
    - '"already a domain controller" not in retry_dc_promotion.msg | default("")'

- name: Reboot after retry if needed
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: retry_dc_promotion.reboot_required | default(false) or 
        (retry_dc_promotion is defined and retry_dc_promotion is failed and "needs to be restarted" in retry_dc_promotion.msg | default(''))

- name: Check domain controller status
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        $dc = Get-ADDomainController
        Write-Output "Domain Controller $($dc.HostName) is functioning properly"
        $Ansible.Changed = $false
      } catch {
        $Ansible.Failed = $true
        Write-Error "Domain Controller verification failed: $_"
      }
  register: dc_verification
  until: dc_verification is not failed
  retries: 10
  delay: 30
  changed_when: false

- name: Ensure DNS feature is installed
  ansible.windows.win_feature:
    name: DNS
    state: present
  register: dns_feature

- name: Reboot if DNS feature installation requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: dns_feature.reboot_required | default(false)

- name: Check if xDnsServer exists
  win_shell: |
    if (Get-Module -ListAvailable -Name xDnsServer) {
      exit 0
    } else {
      exit 1
    }
  register: xdnsserver_check
  failed_when: false
  changed_when: false

- name: Install xDnsServer PowerShell module
  community.windows.win_psmodule:
    name: xDnsServer
    state: present
  when: xdnsserver_check.rc != 0

- name: Configure DNS listener addresses
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        dnscmd . /resetlistenaddresses {{ hostvars[dict_key].ansible_host }}
        Write-Output "DNS listener addresses configured successfully"
      } catch {
        $Ansible.Failed = $true
        Write-Error "Failed to configure DNS listener addresses: $_"
      }
  register: dns_listener
  when: two_adapters

- name: Configure DNS Forwarders
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        Add-DnsServerForwarder -IPAddress "{{ dns_server_forwarder }}" -PassThru
        Set-DnsServerForwarder -UseRootHint $false
        Write-Output "DNS forwarders configured successfully"
      } catch {
        $Ansible.Failed = $true
        Write-Error "Failed to configure DNS forwarders: $_"
      }
  register: dns_forwarders
  when: dns_server_forwarder is defined

- name: Check if ActiveDirectoryDSC exists
  win_shell: |
    if (Get-Module -ListAvailable -Name ActiveDirectoryDSC) {
      exit 0
    } else {
      exit 1
    }
  register: ad_dsc_check
  failed_when: false
  changed_when: false

- name: Install ActiveDirectoryDSC only if needed
  community.windows.win_psmodule:
    name: ActiveDirectoryDSC
    state: present
  register: ad_dsc_module
  when: ad_dsc_check.rc != 0

- name: Ensure admin groups are properly configured
  block:
    - name: Ensure admin user is part of Enterprise Admins
      microsoft.ad.group:
        name: "Enterprise Admins"
        members:
          add:
            - "{{ admin_user }}"
        state: present
        domain_username: "{{ domain_username }}"
        domain_password: "{{ domain_password }}"

    - name: Ensure admin user is part of Domain Admins
      microsoft.ad.group:
        name: "Domain Admins"
        members:
          add:
            - "{{ admin_user }}"
        state: present
        domain_username: "{{ domain_username }}"
        domain_password: "{{ domain_password }}"
  rescue:
    - name: Wait for AD services to become fully operational
      ansible.windows.win_powershell:
        script: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = "Stop"
          $maxAttempts = 30
          $retryInterval = 30
          $ready = $false
          
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Output "Attempt ${attempt}/${maxAttempts}: Checking AD DS services..."
            
            # Check if ADWS service is running
            $adwsService = Get-Service ADWS -ErrorAction SilentlyContinue
            if ($adwsService.Status -ne 'Running') {
                Write-Output "Attempt ${attempt}: ADWS service not running yet, status: $($adwsService.Status)"
                Start-Sleep -Seconds $retryInterval
                continue
            }
            
            # Check if DNS service is running
            $dnsService = Get-Service DNS -ErrorAction SilentlyContinue
            if ($dnsService.Status -ne 'Running') {
                Write-Output "Attempt ${attempt}: DNS service not running yet, status: $($dnsService.Status)"
                Start-Sleep -Seconds $retryInterval
                continue
            }
            
            # Verify AD is operational using cmdlets
            try {
                # Test AD connectivity with lightweight operation
                $domain = Get-ADDomain -ErrorAction Stop
                $dc = Get-ADDomainController -ErrorAction Stop
                Write-Output "Active Directory is fully operational!"
                $ready = $true
                break
            } catch {
                Write-Output "Attempt ${attempt}: Active Directory not fully operational yet. Error: $_"
                Start-Sleep -Seconds $retryInterval
            }
          }

          if (-not $ready) {
              $Ansible.Failed = $true
              throw "Active Directory DS services did not become fully operational after $maxAttempts attempts"
          }
          $Ansible.Changed = $false
      register: ad_services_wait
      
    - name: Retry admin group configuration
      block:
        - name: Ensure admin user is part of Enterprise Admins (retry)
          microsoft.ad.group:
            name: "Enterprise Admins"
            members:
              add:
                - "{{ admin_user }}"
            state: present
            domain_username: "{{ domain_username }}"
            domain_password: "{{ domain_password }}"
    
        - name: Ensure admin user is part of Domain Admins (retry)
          microsoft.ad.group:
            name: "Domain Admins"
            members:
              add:
                - "{{ admin_user }}"
            state: present
            domain_username: "{{ domain_username }}"
            domain_password: "{{ domain_password }}"