# DNSCHANGE
# - name: "disable interface {{nat_adapter}} before join domain"
#   win_shell: netsh interface set interface "{{nat_adapter}}" disable
- name: Disable the registration of the {{ nat_adapter }} interface (NAT address) in DNS
  ansible.windows.win_shell:
    Get-NetAdapter {{ nat_adapter }} | Set-DNSClient -RegisterThisConnectionsAddress $False
  when: two_adapters

- name: Ensure that domain exists
  microsoft.ad.domain:
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
  register: check_domain

- name: Reboot to complete domain creation
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 300
  when: check_domain.changed or (check_domain is failed and "needs to be restarted" in check_domain.msg|default(''))

- name: Wait for connection after reboot
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 300
  when: check_domain.changed or (check_domain is failed and "needs to be restarted" in check_domain.msg|default(''))

- name: Re-attempt domain creation if it failed due to reboot requirement
  microsoft.ad.domain:
    domain_netbios_name: "{{ netbios_name }}"
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
  register: check_domain_retry
  when: check_domain is failed and "needs to be restarted" in check_domain.msg|default('')

- name: Ensure the server is a domain controller
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    state: domain_controller
  register: check_domain_controller

- name: Check domain controller status
  ansible.windows.win_shell: |
    (Get-ADDomainController).HostName
  register: dc_check
  changed_when: false

- name: Reboot to complete domain controller setup
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 100
  when: check_domain_controller.changed

# DNSCHANGE
# - name: "enable interface {{nat_adapter}} after domain joined"
#   win_shell: netsh interface set interface "{{nat_adapter}}" enable
#   register: enable_interface_dc
#   until: "enable_interface_dc is not failed"
#   retries: 3
#   delay: 120

- name: Be sure DNS feature is installed
  ansible.windows.win_feature:
    name: DNS
    state: present

- name: Install xDnsServer PowerShell module
  ansible.windows.win_shell: |
    if (-not (Get-Module -ListAvailable -Name xDnsServer)) {
      Install-Module -Name xDnsServer -Force -AllowClobber -SkipPublisherCheck
    }

- name: Enable the {{ domain_adapter }} interface (local) for DNS client requests
  ansible.windows.win_shell: dnscmd . /resetlistenaddresses {{ hostvars[dict_key].ansible_host }}
  when: two_adapters

- name: Configure DNS Forwarders
  ansible.windows.win_shell: |
    Add-DnsServerForwarder -IPAddress "{{ dns_server_forwarder }}" -PassThru
    Set-DnsServerForwarder -UseRootHint $false
  when: dns_server_forwarder is defined

#- name: install nuget
#  win_shell: install-packageprovider -name nuget -force

- name: Install ActiveDirectoryDSC
  community.windows.win_psmodule:
    name: ActiveDirectoryDSC
    state: present

- name: Ensure admin user is part of Enterprise Admins
  microsoft.ad.group:
    name: "Enterprise Admins"
    members:
      add:
        - "{{ admin_user }}"
    state: present
    domain_username: "{{ domain_username }}"
    domain_password: "{{ domain_password }}"

- name: Ensure admin user is part of Domain Admins
  microsoft.ad.group:
    name: "Domain Admins"
    members:
      add:
        - "{{ admin_user }}"
    state: present
    domain_username: "{{ domain_username }}"
    domain_password: "{{ domain_password }}"