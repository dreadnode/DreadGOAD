---
# DNSCHANGE
# - name: "disable interface {{nat_adapter}} before join domain"
#   win_shell: netsh interface set interface "{{nat_adapter}}" disable
- name: Disable the registration of the NAT interface in DNS
  ansible.windows.win_shell:
    Get-NetAdapter -Name "{{ nat_adapter }}" | Set-DNSClient -RegisterThisConnectionsAddress $False
  register: disable_dns_reg
  failed_when:
    - disable_dns_reg.rc != 0
    - "'Cannot find network adapter' not in disable_dns_reg.stderr"
  when: two_adapters | default(false) | bool

- name: Ensure that domain exists
  microsoft.ad.domain:
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
    domain_netbios_name: "{{ netbios_name }}"
  register: check_domain
  async: 3600
  poll: 60
  failed_when: false

# Async tasks don't reliably return reboot_required - check explicitly
- name: Check if reboot is pending after domain creation
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      # Check multiple reboot indicators
      $pending = $false
      $reason = @()

      # Component Based Servicing
      if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") {
          $pending = $true
          $reason += "CBS"
      }
      # Windows Update
      if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") {
          $pending = $true
          $reason += "WindowsUpdate"
      }
      # Pending File Rename
      $pfro = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager" -Name PendingFileRenameOperations -EA SilentlyContinue
      if ($pfro) {
          $pending = $true
          $reason += "FileRename"
      }
      # DC promo pending (NTDS not running but AD DS installed)
      $adFeature = Get-WindowsFeature AD-Domain-Services -EA SilentlyContinue
      $ntds = Get-Service NTDS -EA SilentlyContinue
      if ($adFeature.InstallState -eq 'Installed' -and $ntds.Status -ne 'Running') {
          $pending = $true
          $reason += "DCPromo"
      }

      $Ansible.Result = @{
          pending = $pending
          reasons = $reason -join ","
      }
  register: reboot_check
  when: check_domain is changed
  changed_when: false

- name: Reboot if domain creation requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
    test_command: powershell.exe -Command "((Get-Service -Name Netlogon -EA SilentlyContinue).Status -eq 'Running') -and ((Get-Service -Name ADWS -EA SilentlyContinue).Status -eq 'Running')"
  when: >-
    check_domain.reboot_required | default(false) or
    (check_domain is failed and "needs to be restarted" in check_domain.msg | default('')) or
    (check_domain is changed) or
    (reboot_check.result.pending | default(false))

- name: Re-attempt domain creation
  microsoft.ad.domain:
    dns_domain_name: "{{ domain }}"
    safe_mode_password: "{{ domain_password }}"
    domain_netbios_name: "{{ netbios_name }}"
  register: retry_domain
  async: 3600
  poll: 60
  when: check_domain is failed
  failed_when:
    - retry_domain is failed
    - '"needs to be restarted" not in retry_domain.msg | default("")'
    - '"already exists" not in retry_domain.msg | default("")'

- name: Reboot after retry if needed
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
    test_command: powershell.exe -Command "((Get-Service -Name Netlogon -EA SilentlyContinue).Status -eq 'Running') -and ((Get-Service -Name ADWS -EA SilentlyContinue).Status -eq 'Running')"
  when: >-
    retry_domain.reboot_required | default(false) or
    (retry_domain is failed and "needs to be restarted" in retry_domain.msg | default('')) or
    (retry_domain is changed)

- name: Wait for domain to fully initialize
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        $domain = Get-ADDomain -ErrorAction Stop
        Write-Output "Domain $($domain.Name) is accessible"
        $Ansible.Changed = $false
      } catch {
        $Ansible.Failed = $true
        Write-Error "Domain not yet accessible: $_"
      }
  register: domain_check
  until: domain_check is not failed
  retries: 10
  delay: 30
  changed_when: false

- name: Ensure the server is a domain controller
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    state: domain_controller
  register: check_domain_controller
  async: 3600
  poll: 60
  failed_when:
    - check_domain_controller is failed
    - '"needs to be restarted" not in check_domain_controller.msg | default("")'
    - '"already a domain controller" not in check_domain_controller.msg | default("")'

- name: Reboot if domain controller promotion requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
    test_command: powershell.exe -Command "((Get-Service -Name Netlogon -EA SilentlyContinue).Status -eq 'Running') -and ((Get-Service -Name ADWS -EA SilentlyContinue).Status -eq 'Running')"
  when: >-
    check_domain_controller.reboot_required | default(false) or
    (check_domain_controller is failed and "needs to be restarted" in check_domain_controller.msg | default('')) or
    (check_domain_controller is changed)

- name: Re-attempt domain controller promotion if needed
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ domain }}"
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    safe_mode_password: "{{ domain_password }}"
    state: domain_controller
  register: retry_dc_promotion
  async: 3600
  poll: 60
  when: check_domain_controller is failed and "needs to be restarted" in check_domain_controller.msg | default('')
  failed_when:
    - retry_dc_promotion is defined
    - retry_dc_promotion is failed
    - '"needs to be restarted" not in retry_dc_promotion.msg | default("")'
    - '"already a domain controller" not in retry_dc_promotion.msg | default("")'

- name: Reboot after DC promotion retry if needed
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
    test_command: powershell.exe -Command "((Get-Service -Name Netlogon -EA SilentlyContinue).Status -eq 'Running') -and ((Get-Service -Name ADWS -EA SilentlyContinue).Status -eq 'Running')"
  when: >-
    retry_dc_promotion.reboot_required | default(false) or
    (retry_dc_promotion is defined and retry_dc_promotion is failed and "needs to be restarted" in retry_dc_promotion.msg | default('')) or
    (retry_dc_promotion is defined and retry_dc_promotion is changed)

- name: Check domain controller status
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        $dc = Get-ADDomainController
        Write-Output "Domain Controller $($dc.HostName) is functioning properly"
        $Ansible.Changed = $false
      } catch {
        $Ansible.Failed = $true
        Write-Error "Domain Controller verification failed: $_"
      }
  register: dc_verification
  until: dc_verification is not failed
  retries: 10
  delay: 30
  changed_when: false

- name: Ensure DNS feature is installed
  ansible.windows.win_feature:
    name: DNS
    state: present
  register: dns_feature

- name: Reboot if DNS feature installation requires it
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
    test_command: powershell.exe -Command "(Get-Service -Name DNS -ErrorAction SilentlyContinue).Status -eq 'Running'"
  when: dns_feature.reboot_required | default(false)

- name: Check if xDnsServer exists
  ansible.windows.win_shell: |
    if (Get-Module -ListAvailable -Name xDnsServer) {
      exit 0
    } else {
      exit 1
    }
  register: xdnsserver_check
  failed_when: false
  changed_when: false

- name: Install xDnsServer PowerShell module
  community.windows.win_psmodule:
    name: xDnsServer
    state: present
  when: xdnsserver_check.rc != 0

- name: Configure DNS listener addresses
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        dnscmd . /resetlistenaddresses {{ host_ipv4 | default(instance_to_ip[hostvars[dict_key]['ansible_host']] if hostvars[dict_key]['ansible_host'] in instance_to_ip else hostvars[dict_key].ansible_host) }}
        Write-Output "DNS listener addresses configured successfully"
      } catch {
        $Ansible.Failed = $true
        Write-Error "Failed to configure DNS listener addresses: $_"
      }
  register: dns_listener
  when: two_adapters | default(false) | bool

- name: Configure DNS Forwarders
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $ErrorActionPreference = "Stop"
      try {
        {% if vpc_dns_resolver | default('') != '' %}
        $desired = @("{{ vpc_dns_resolver }}", "{{ dns_server_forwarder }}")
        {% else %}
        $desired = @("{{ dns_server_forwarder }}")
        {% endif %}
        $current = (Get-DnsServerForwarder).IPAddress.IPAddressToString
        $currentRoot = (Get-DnsServerForwarder).UseRootHint
        if ((@(Compare-Object -ReferenceObject $desired -DifferenceObject @($current) -SyncWindow 0).Count -eq 0) -and (-not $currentRoot)) {
          $Ansible.Changed = $false
          Write-Output "DNS forwarders already configured"
        } else {
          # VPC DNS resolver must be first so VPC endpoint private DNS names
          # resolve correctly instead of racing with the external forwarder.
          Set-DnsServerForwarder -IPAddress $desired -UseRootHint $false
          Write-Output "DNS forwarders configured successfully"
        }
      } catch {
        $Ansible.Failed = $true
        Write-Error "Failed to configure DNS forwarders: $_"
      }
  register: dns_forwarders
  when: dns_server_forwarder is defined

- name: Check if ActiveDirectoryDSC exists
  ansible.windows.win_shell: |
    if (Get-Module -ListAvailable -Name ActiveDirectoryDSC) {
      exit 0
    } else {
      exit 1
    }
  register: ad_dsc_check
  failed_when: false
  changed_when: false

- name: Install ActiveDirectoryDSC only if needed
  community.windows.win_psmodule:
    name: ActiveDirectoryDSC
    state: present
  register: ad_dsc_module
  when: ad_dsc_check.rc != 0

- name: Enable the Active Directory Web Services
  ansible.windows.win_service:
    name: adws
    start_mode: auto
    state: started

- name: Ensure admin groups are properly configured
  block:
    - name: Ensure admin user is part of Enterprise Admins
      microsoft.ad.group:
        name: "Enterprise Admins"
        members:
          add:
            - "{{ admin_user }}"
        state: present
        domain_username: "{{ domain_username }}"
        domain_password: "{{ domain_password }}"

    - name: Ensure admin user is part of Domain Admins
      microsoft.ad.group:
        name: "Domain Admins"
        members:
          add:
            - "{{ admin_user }}"
        state: present
        domain_username: "{{ domain_username }}"
        domain_password: "{{ domain_password }}"
  rescue:
    - name: Wait for AD services to become fully operational
      ansible.windows.win_powershell:
        script: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = "Stop"
          $maxAttempts = 30
          $retryInterval = 30
          $ready = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Output "Attempt ${attempt}/${maxAttempts}: Checking AD DS services..."

            # Check if ADWS service is running
            $adwsService = Get-Service ADWS -ErrorAction SilentlyContinue
            if ($adwsService.Status -ne 'Running') {
                Write-Output "Attempt ${attempt}: ADWS service not running yet, status: $($adwsService.Status)"
                Start-Sleep -Seconds $retryInterval
                continue
            }

            # Check if DNS service is running
            $dnsService = Get-Service DNS -ErrorAction SilentlyContinue
            if ($dnsService.Status -ne 'Running') {
                Write-Output "Attempt ${attempt}: DNS service not running yet, status: $($dnsService.Status)"
                Start-Sleep -Seconds $retryInterval
                continue
            }

            # Verify AD is operational using cmdlets
            try {
                # Test AD connectivity with lightweight operation
                $domain = Get-ADDomain -ErrorAction Stop
                $dc = Get-ADDomainController -ErrorAction Stop
                Write-Output "Active Directory is fully operational!"
                $ready = $true
                break
            } catch {
                Write-Output "Attempt ${attempt}: Active Directory not fully operational yet. Error: $_"
                Start-Sleep -Seconds $retryInterval
            }
          }

          if (-not $ready) {
              $Ansible.Failed = $true
              throw "Active Directory DS services did not become fully operational after $maxAttempts attempts"
          }
          $Ansible.Changed = $false
      register: ad_services_wait

    - name: Retry admin group configuration
      block:
        - name: Ensure admin user is part of Enterprise Admins (retry)
          microsoft.ad.group:
            name: "Enterprise Admins"
            members:
              add:
                - "{{ admin_user }}"
            state: present
            domain_username: "{{ domain_username }}"
            domain_password: "{{ domain_password }}"

        - name: Ensure admin user is part of Domain Admins (retry)
          microsoft.ad.group:
            name: "Domain Admins"
            members:
              add:
                - "{{ admin_user }}"
            state: present
            domain_username: "{{ domain_username }}"
            domain_password: "{{ domain_password }}"
