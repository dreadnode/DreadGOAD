---
# $gMSA_Name = 'gmsaWWW'
# $gMSA_FQDN = 'gmsaWWW.contoso.com'
# $gMSA_SPNs = 'http/www', 'http/www.contoso.com'
# $gMSA_HostNames = 'webServer01', 'webServer02', 'webServer03'

- name: Create GMSA Account
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $gMSA_Name,

          [String]
          $gMSA_FQDN,

          [String[]]
          $gMSA_SPNs,

          [String[]]
          $gMSA_HostNames
      )
      try {
          Import-Module ActiveDirectory
          Set-Location AD:

          # Ensure KDS root key exists and is effective
          $kdsKey = Get-KdsRootKey -ErrorAction SilentlyContinue
          if (-not $kdsKey) {
              Add-KDSRootKey -EffectiveTime (Get-Date).AddHours(-10)
              Start-Sleep -Seconds 5
              Write-Output "Created KDS root key"
          }

          $existing = Get-ADServiceAccount -Identity $gMSA_Name -ErrorAction SilentlyContinue
          if ($existing) {
              $gMSA_HostsGroup = $gMSA_HostNames | ForEach-Object { Get-ADComputer -Identity $_ }
              Set-ADServiceAccount -Identity $gMSA_Name -DNSHostName $gMSA_FQDN -ServicePrincipalNames @{Replace=$gMSA_SPNs} -PrincipalsAllowedToRetrieveManagedPassword $gMSA_HostsGroup
              $Ansible.Changed = $false
              Write-Output "GMSA account $gMSA_Name already exists, updated configuration"
              return
          }

          $gMSA_HostsGroup = $gMSA_HostNames | ForEach-Object { Get-ADComputer -Identity $_ }
          New-ADServiceAccount -Name $gMSA_Name -DNSHostName $gMSA_FQDN -PrincipalsAllowedToRetrieveManagedPassword $gMSA_HostsGroup -ServicePrincipalNames $gMSA_SPNs

          # Verify the account was actually created in AD
          Start-Sleep -Seconds 3
          $verify = Get-ADServiceAccount -Identity $gMSA_Name -ErrorAction SilentlyContinue
          if (-not $verify) {
              # Retry once after waiting for AD replication
              Write-Output "GMSA not found after creation, waiting for AD replication..."
              Start-Sleep -Seconds 10
              $verify = Get-ADServiceAccount -Identity $gMSA_Name -ErrorAction SilentlyContinue
              if (-not $verify) {
                  throw "GMSA account $gMSA_Name was not found after creation - possible KDS root key or replication issue"
              }
          }

          $Ansible.Changed = $true
          Write-Output "Created and verified GMSA account $gMSA_Name"
      }
      catch {
          Write-Error "Failed to create GMSA account: $_"
          $Ansible.Changed = $false
          exit 1
      }
    parameters:
      gMSA_Name: "{{ item.value.gMSA_Name }}"
      gMSA_FQDN: "{{ item.value.gMSA_FQDN }}"
      gMSA_SPNs: "{{ item.value.gMSA_SPNs }}"
      gMSA_HostNames: "{{ item.value.gMSA_HostNames }}"
    error_action: stop
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
  with_dict: "{{ ad_gmsa }}"
  register: gmsa_result
  failed_when: gmsa_result.host_err is defined and gmsa_result.host_err != '' or gmsa_result.stderr is defined and gmsa_result.stderr != ''
