---
# Syntax-check only: ELK role requires specific apt repositories and infrastructure.
# This converge playbook is used for `molecule syntax` validation.
- name: Converge
  hosts: all
  gather_facts: false
  vars:
    elk_ip: "127.0.0.1"
    elasticsearch_port: 9200
    kibana_port: 5601
  tasks:
    - name: Include role under test
      ansible.builtin.include_role:
        name: dreadnode.goad.elk
