- name: Create boundary
  dreadnode.goad.sccm_boundary:
    name: "ADSiteBoundary01"
    type: "ADSite"
    value: "Default-First-Site-Name"
    site_code: "{{ site_code }}"
    server: "{{ sccm_server }}.{{ domain }}"
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
    ansible_become_flags: logon_flags=

- name: Create boundary group
  dreadnode.goad.sccm_boundary_group:
    name: "BoundaryGroup01"
    server: "{{ sccm_server }}.{{ domain }}"
    site_code: "{{ site_code }}"
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
    ansible_become_flags: logon_flags=

- name: Add boundary to boundary group
  dreadnode.goad.sccm_boundary_to_boundarygroup:
    boundary_name: "ADSiteBoundary01"
    boundary_group: "BoundaryGroup01"
    site_code: "{{ site_code }}"
    server: "{{ sccm_server }}.{{ domain }}"
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
    ansible_become_flags: logon_flags=
