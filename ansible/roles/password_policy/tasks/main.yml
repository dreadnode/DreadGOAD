---
- name: Set password policy
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]
          $LockoutThreshold,

          [String]
          $MinPasswordLength,

          [String]
          $LockoutDuration,

          [String]
          $LockoutObservationWindow,

          [Boolean]
          $ComplexityEnabled
      )

      try {
          # Check if server is a domain controller and has AD Web Services running
          $isDC = (Get-WmiObject -Class Win32_ComputerSystem).DomainRole -ge 4

          if (-not $isDC) {
              Write-Output "This server is not a domain controller, skipping password policy."
              exit 0
          }

          # Get the domain name from the computer system
          $Domain = (Get-WmiObject -Class WIN32_ComputerSystem).Domain

          # Test if Active Directory Web Services is available
          try {
              Get-ADDomain -Identity $Domain -ErrorAction Stop | Out-Null

              # Set password policy
              Set-ADDefaultDomainPasswordPolicy -Identity $Domain `
                  -AuthType Negotiate `
                  -LockoutDuration $LockoutDuration `
                  -LockoutObservationWindow $LockoutObservationWindow `
                  -LockoutThreshold $LockoutThreshold `
                  -ComplexityEnabled $ComplexityEnabled `
                  -ReversibleEncryptionEnabled $False `
                  -MinPasswordLength $MinPasswordLength `
                  -MaxPasswordAge "10675199.00:00:00"

              Write-Output "Password policy updated successfully."
          } catch {
              Write-Error "Active Directory Web Services not available: $_"
              exit 1
          }
      } catch {
          Write-Error "Error setting password policy: $_"
          exit 1
      }
    error_action: stop
    parameters:
      LockoutThreshold: "{{ try_before_lock }}"
      MinPasswordLength: "{{ pass_length }}"
      LockoutDuration: "{{ lock_duration }}"
      LockoutObservationWindow: "{{ lock_observation }}"
      ComplexityEnabled: "{{ complexity }}"
