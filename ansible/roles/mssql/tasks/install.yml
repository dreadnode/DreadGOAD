---
# MSSQL Installation Tasks
# These tasks handle the installation of SQL Server Express
# They should only run if MSSQL is not already installed

- name: Check if reboot is pending before install
  ansible.windows.win_shell: |
    $PendingReboot = $false

    # Check CBS RebootPending
    if (Get-ChildItem "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending" -ErrorAction SilentlyContinue) {
        $PendingReboot = $true
    }

    # Check Windows Update RebootRequired
    if (Get-Item "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired" -ErrorAction SilentlyContinue) {
        $PendingReboot = $true
    }

    # Check PendingFileRenameOperations
    $PendingFileRenameOperations = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager" -Name PendingFileRenameOperations -ErrorAction SilentlyContinue
    if ($PendingFileRenameOperations) {
        $PendingReboot = $true
    }

    if ($PendingReboot) {
        Write-Output "REBOOT_REQUIRED"
        exit 1
    } else {
        Write-Output "NO_REBOOT_REQUIRED"
        exit 0
    }
  register: reboot_check
  failed_when: false
  changed_when: false

- name: Reboot before install if pending (long timeout in case of update)
  ansible.windows.win_reboot:
    reboot_timeout: 1200
  when: reboot_check.rc == 1

- name: Create SQL Server installation directories
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - c:\setup\mssql\media
    - c:\setup\mssql\extraction

- name: Create and load user profile
  ansible.windows.win_shell: |
    $env:USERPROFILE
    $env:HOMEPATH
    if (!(Test-Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer')) {
      New-Item -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer' -Force | Out-Null
    }
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_admin }}"
    ansible_become_password: "{{ domain_admin_password }}"
    ansible_become_flags: logon_type=interactive

- name: Create SQL Server configuration file
  ansible.windows.win_template:
    src: files/sql_conf.ini.{{ sql_version }}.j2
    dest: c:\setup\mssql\sql_conf.ini

- name: Check if installation media already exists
  ansible.windows.win_stat:
    path: c:\setup\mssql\sql_installer.exe
  register: installer_file

- name: Download SQL Server installation media
  ansible.windows.win_get_url:
    url: "{{ download_url }}"
    dest: c:\setup\mssql\sql_installer.exe
  when: not installer_file.stat.exists

- name: Add service account to Log on as a service
  ansible.windows.win_user_right:
    name: SeServiceLogonRight
    users:
      - "{{ SQLSVCACCOUNT }}"
    action: add
  when: not SQLSVCACCOUNT == "NT AUTHORITY\\NETWORK SERVICE"

- name: Check if SQL Express media file exists
  ansible.windows.win_stat:
    path: C:\setup\mssql\media\SQLEXPR_x64_ENU.exe
  register: sqlexpr_file

- name: Run the installer to download SQL Express installation files
  ansible.windows.win_command: C:\setup\mssql\sql_installer.exe /ACTION=Download /MEDIAPATH=C:\setup\mssql\media /Q
  when: not sqlexpr_file.stat.exists

- name: Check if MSSQL is installed via registry
  ansible.windows.win_reg_stat:
    path: "HKLM:\\SOFTWARE\\Microsoft\\Microsoft SQL Server\\{{ mssql_version_key }}.{{ sql_instance_name }}"
  register: mssql_installed
  failed_when: false

- name: Extract SQL Server installation files
  ansible.windows.win_command: C:\setup\mssql\media\SQLEXPR_x64_ENU.exe /x:C:\setup\mssql\extraction /q
  args:
    creates: C:\setup\mssql\extraction\SETUP.EXE
  when: not mssql_installed.exists

- name: Check for lingering SQL Server setup processes
  ansible.windows.win_powershell:
    script: |
      $ProgressPreference = 'SilentlyContinue'
      $setupProcs = Get-Process -Name "setup" -ErrorAction SilentlyContinue
      if ($setupProcs) {
        $setupProcs | Stop-Process -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 3
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  when: not mssql_installed.exists

- name: Install SQL Server
  ansible.windows.win_command: c:\setup\mssql\extraction\SETUP.EXE /configurationfile=c:\setup\mssql\sql_conf.ini
  args:
    chdir: C:\setup\mssql
  vars:
    ansible_become: true
    ansible_become_method: ansible.builtin.runas
    ansible_become_user: "{{ domain_admin }}"
    ansible_become_password: "{{ domain_admin_password }}"
    ansible_become_flags: logon_type=interactive
  register: mssql_install
  failed_when:
    - mssql_install.rc != 0
    - >
      (('No features were installed during the setup execution' not in (mssql_install.stdout | default(''))) and
       ('No features were installed during the setup execution' not in (mssql_install.host_out | default(''))))
  when: not mssql_installed.exists

# sql server 2022
- name: Add or update registry for ip port (2022)
  ansible.windows.win_regedit:
    path: 'HKLM:\Software\Microsoft\Microsoft SQL Server\MSSQL16.{{ sql_instance_name }}\MSSQLServer\SuperSocketNetLib\Tcp\IPAll'
    name: TcpPort
    data: 1433
  register: win_reg
  when: sql_version == "MSSQL_2022"

# sql server 2019
- name: Add or update registry for ip port (2019)
  ansible.windows.win_regedit:
    path: 'HKLM:\Software\Microsoft\Microsoft SQL Server\MSSQL15.{{ sql_instance_name }}\MSSQLServer\SuperSocketNetLib\Tcp\IPAll'
    name: TcpPort
    data: 1433
  register: win_reg
  when: sql_version == "MSSQL_2019"

- name: Reboot if registry was changed
  ansible.windows.win_reboot:
  when: win_reg.changed

- name: Firewall | Allow MSSQL through Firewall
  ansible.windows.win_dsc:
    resource_name: xFirewall
    Name: "Access for MSSQL (TCP-In)"
    Ensure: present
    Enabled: True
    Profile: "Domain"
    Direction: "Inbound"
    Localport: "1433"
    Protocol: "TCP"
    Description: "Opens the listener port for MSSQL"

- name: Firewall | Allow MSSQL discover through Firewall
  ansible.windows.win_dsc:
    resource_name: xFirewall
    Name: "Access for MSSQL (UDP-In)"
    Ensure: present
    Enabled: True
    Profile: "Domain"
    Direction: "Inbound"
    Localport: "1434"
    Protocol: "UDP"
    Description: "Opens the discover port for MSSQL"

- name: Be sure service is started
  ansible.windows.win_service:
    name: "{{ mssql_service_name }}"
    force_dependent_services: true
    state: started

- name: Wait for port 1433 to become open on the host, start checking every 5 seconds
  ansible.windows.win_wait_for:
    port: 1433
    delay: 5
