---
- name: Reboot before install (long timeout in case of update)
  win_reboot:
    reboot_timeout: 1200

- name: Set variables
  ansible.builtin.set_fact:
    download_url: "{{ download_url_2022 if sql_version == 'MSSQL_2022' else download_url_2019 }}"
    connection_type: "{{ connection_type_2022 if sql_version == 'MSSQL_2022' else connection_type_2019 }}"
    mssql_service_instance: "MSSQL${{ sql_instance_name }}"
    mssql_service_name: "{{ 'MSSQL$' + sql_instance_name if sql_instance_name != 'MSSQLSERVER' else 'MSSQLSERVER' }}"
    sql_reg_path: "HKLM:\\Software\\Microsoft\\Microsoft SQL Server\\{{ 'MSSQL16.' if sql_version == 'MSSQL_2022' else 'MSSQL15.' }}{{ sql_instance_name }}\\MSSQLServer\\SuperSocketNetLib\\Tcp\\IPAll"

- name: Create required directories
  ansible.windows.win_file: 
    path: "{{ item }}"
    state: directory
  loop:
    - c:\setup
    - c:\setup\mssql
    - c:\setup\mssql\media
    - c:\setup\mssql\logs

- name: Create SQL Server configuration file
  win_template: 
    src: files/sql_conf.ini.{{ sql_version }}.j2
    dest: c:\setup\mssql\sql_conf.ini

- name: Check downloaded file exists
  win_stat:
    path: c:\setup\mssql\sql_installer.exe
  register: installer_file

- name: Get the installer
  win_get_url:
      url: "{{ download_url }}"
      dest: 'c:\setup\mssql\sql_installer.exe'
      timeout: 600
      force: true
  when: not installer_file.stat.exists

- name: Verify installer was downloaded successfully
  win_stat:
    path: c:\setup\mssql\sql_installer.exe
  register: installer_check
  failed_when: not installer_check.stat.exists or installer_check.stat.size < 100000

- name: Add service account to Log on as a service
  win_user_right:
    name: SeServiceLogonRight
    users:
    - '{{ SQLSVCACCOUNT }}'
    action: add
  when: not SQLSVCACCOUNT == "NT AUTHORITY\\NETWORK SERVICE"

