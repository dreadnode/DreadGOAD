# Set-ADUser -Identity "{{ SQLSVCACCOUNT }}" -ServicePrincipalNames @{Add='MSSQLSvc/castelblack.north.sevenkingdoms.local'}
# Get-ADUser -Identity "{{ SQLSVCACCOUNT }}" | Set-ADAccountControl -TrustedToAuthForDelegation $true
