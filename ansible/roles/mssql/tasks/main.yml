---
# MSSQL Role - Main Entry Point
# Split into install.yml (conditional) and config.yml (always runs)

- name: Set variables
  ansible.builtin.set_fact:
    download_url: "{{ download_url_2022 if sql_version == 'MSSQL_2022' else download_url_2019 }}"
    connection_type: "{{ connection_type_2022 if sql_version == 'MSSQL_2022' else connection_type_2019 }}"
    mssql_service_instance: "MSSQL${{ sql_instance_name }}"
    mssql_version_key: "{{ 'MSSQL16' if sql_version == 'MSSQL_2022' else 'MSSQL15' }}"

- name: Set service name
  ansible.builtin.set_fact:
    mssql_service_name: "{{ mssql_service_instance if sql_instance_name != 'MSSQLSERVER' else 'MSSQLSERVER' }}"

- name: Display mssql variables in use
  ansible.builtin.debug:
    msg:
    - "MSSQL version        : {{ sql_version }}"
    - "MSSQL service name   : {{ mssql_service_name }}"
    - "MSSQL download url   : {{ download_url }}"
    - "MSSQL instance       : {{ sql_instance_name }}"
    - "MSSQL connection use : {{ connection_type }}"

# Check if MSSQL is already installed and running
- name: Check if SQL Server service exists
  ansible.windows.win_service:
    name: "{{ mssql_service_name }}"
  register: mssql_service_check
  ignore_errors: true

# Installation tasks - only run if MSSQL is not installed
- name: Run MSSQL installation tasks
  ansible.builtin.include_tasks: install.yml
  when: mssql_service_check.exists is not defined or not mssql_service_check.exists

# Ensure service is running before configuration
- name: Ensure MSSQL service is started
  ansible.windows.win_service:
    name: "{{ mssql_service_name }}"
    force_dependent_services: true
    state: started
  when: mssql_service_check.exists is defined and mssql_service_check.exists

- name: Wait for port 1433 to become open
  ansible.windows.win_wait_for:
    port: 1433
    delay: 5
    timeout: 120

# Configuration tasks - ALWAYS run to ensure proper setup
# This fixes the bug where config was skipped on pre-installed MSSQL
- name: Run MSSQL configuration tasks
  ansible.builtin.include_tasks: config.yml
