---
- name: Get IPv4 address for child domain controller
  ansible.windows.win_powershell:
    script: |
      try {
        $ipAddress = (Get-NetIPAddress -AddressFamily IPv4 | 
          Where-Object {$_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.254\.'} | 
          Select-Object -First 1).IPAddress
        
        if($ipAddress) {
          Write-Output $ipAddress
          $Ansible.Changed = $false
        } else {
          throw "No valid IPv4 address found"
        }
      } catch {
        Write-Error "Error getting IPv4 address: $_"
        $Ansible.Changed = $false
      }
  delegate_to: "{{ child_dc }}"
  vars:
    child_dc: "{{ lab.domains[item].dc }}"
  register: child_ipv4_result
  loop: "{{ domains }}"
  when: item.endswith('.' + domain)
  
- name: Extract IP addresses for child domains
  ansible.builtin.set_fact:
    child_ip_addresses: "{{ child_ip_addresses | default({}) | combine({item.item: item.output[0]}) }}"
  with_items: "{{ child_ipv4_result.results | default([]) }}"
  when: >
    item.skipped is not defined and
    item.output is defined and 
    item.output | length > 0
  
- name: Add dns delegation to child domains
  ansible.windows.win_powershell:
    script: |
      try {
        $parentDomain = "{{ parent_domain }}"
        $childZone = "{{ zone }}"
        $nameServer = "{{ name_server }}"
        $nameServerIP = "{{ name_server_ip }}"
        
        Write-Output "Configuring delegation: Parent=$parentDomain, Child=$childZone, NS=$nameServer, IP=$nameServerIP"
        
        # Check if delegation already exists
        $delegation = Get-DnsServerZoneDelegation -Name $parentDomain -ChildZone $childZone -ErrorAction SilentlyContinue
        
        if($delegation) {
          # Update existing delegation
          $delegate = $delegation | Where-Object { $_.NameServer -eq $nameServer }
          if(!$delegate -or $delegate.IPAddress.IPAddressToString -ne $nameServerIP) {
            Remove-DnsServerZoneDelegation -Name $parentDomain -ChildZone $childZone -NameServer $nameServer -Force -ErrorAction SilentlyContinue
            Add-DnsServerZoneDelegation -Name $parentDomain -ChildZone $childZone -NameServer $nameServer -IPAddress $nameServerIP
            Write-Output "Updated delegation for zone $childZone"
            $Ansible.Changed = $true
          } else {
            Write-Output "Delegation already exists and is correct"
            $Ansible.Changed = $false
          }
        } else {
          # Create new delegation
          Add-DnsServerZoneDelegation -Name $parentDomain -ChildZone $childZone -NameServer $nameServer -IPAddress $nameServerIP
          Write-Output "Created new delegation for zone $childZone"
          $Ansible.Changed = $true
        }
      } catch {
        Write-Error "Failed to configure DNS delegation: $_"
        $Ansible.Changed = $false
      }
  vars:
    parent_domain: "{{ domain }}"
    child_domain: "{{ item_key }}"
    child_dc: "{{ lab.domains[item_key].dc }}"
    name_server: "{{ lab.hosts[child_dc].hostname }}.{{ item_key }}"
    name_server_ip: "{{ item_value }}"
    zone: "{{ item_key.split('.')[0] }}"
    item_key: "{{ item.key }}"
    item_value: "{{ item.value }}"
  loop: "{{ child_ip_addresses | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: child_ip_addresses is defined
  
- name: Create conditional forwarder to child domains
  ansible.windows.win_powershell:
    script: |
      try {
        $zoneName = "{{ child_zone }}"
        $serverIP = "{{ server_ip }}"
        
        Write-Output "Configuring conditional forwarder: Zone=$zoneName, ForwarderIP=$serverIP"
        
        # Check if zone already exists
        $existingZone = Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue
        
        if($existingZone) {
          # Update the forwarders if zone exists
          Set-DnsServerZoneForwarder -Name $zoneName -MasterServers $serverIP
          Write-Output "Updated forwarder for existing zone $zoneName"
          $Ansible.Changed = $true
        } else {
          # Create new forwarder zone
          Add-DnsServerConditionalForwarderZone -Name $zoneName -MasterServers $serverIP -ReplicationScope "Forest"
          Write-Output "Created new conditional forwarder zone $zoneName"
          $Ansible.Changed = $true
        }
      } catch {
        Write-Error "Failed to configure DNS zone: $_"
        $Ansible.Changed = $false
      }
  vars:
    child_zone: "{{ item_key }}"
    server_ip: "{{ item_value }}"
    item_key: "{{ item.key }}"
    item_value: "{{ item.value }}"
  loop: "{{ child_ip_addresses | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: child_ip_addresses is defined