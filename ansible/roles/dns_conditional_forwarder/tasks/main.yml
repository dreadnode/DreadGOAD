---
- name: Get IPv4 address for remote domain controller
  ansible.windows.win_powershell:
    script: |
      try {
        $ipAddress = (Get-NetIPAddress -AddressFamily IPv4 | 
          Where-Object {$_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.254\.'} | 
          Select-Object -First 1).IPAddress
        
        if($ipAddress) {
          Write-Output $ipAddress
          $Ansible.Changed = $false
        } else {
          throw "No valid IPv4 address found"
        }
      } catch {
        Write-Error "Error getting IPv4 address: $_"
        $Ansible.Changed = $false
      }
  delegate_to: "{{ remote_dc }}"
  register: remote_ipv4_result

- name: Debug remote IP address
  ansible.builtin.debug:
    var: remote_ipv4_result

- name: Add dns server zone using PowerShell (fallback)
  ansible.windows.win_powershell:
    script: |
      try {
        $zoneName = "{{ zone_name }}"
        $serverIP = "{{ remote_ipv4_result.output[0] | default(remote_ipv4_result.stdout) | trim }}"
        
        # Check if zone already exists
        $existingZone = Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue
        
        if($existingZone) {
          # Update the forwarders if zone exists
          Set-DnsServerZoneForwarder -Name $zoneName -MasterServers $serverIP
          Write-Output "Updated forwarder for existing zone $zoneName"
          $Ansible.Changed = $true
        } else {
          # Create new forwarder zone
          Add-DnsServerConditionalForwarderZone -Name $zoneName -MasterServers $serverIP -ReplicationScope "{{ replication }}"
          Write-Output "Created new conditional forwarder zone $zoneName"
          $Ansible.Changed = $true
        }
      } catch {
        Write-Error "Failed to configure DNS zone: $_"
        $Ansible.Changed = $false
      }
  when: remote_ipv4_result is defined and (remote_ipv4_result.output is defined or remote_ipv4_result.stdout is defined)

- name: Verify DNS zone is set up correctly
  ansible.windows.win_powershell:
    script: |
      try {
        $zoneName = "{{ zone_name }}"
        $serverIP = "{{ remote_ipv4_result.host_out | default(remote_ipv4_result.stdout) | trim }}"
        
        $zone = Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue
        
        if(-not $zone) {
          Write-Output "Zone $zoneName doesn't exist, configuring it again"
          Add-DnsServerConditionalForwarderZone -Name $zoneName -MasterServers $serverIP -ReplicationScope "{{ replication }}"
          $Ansible.Changed = $true
        } else {
          $currentForwarders = Get-DnsServerZoneForwarder -Name $zoneName | 
              Select-Object -ExpandProperty MasterServers | 
              ForEach-Object { $_.IPAddressToString }
          
          if($currentForwarders -notcontains $serverIP) {
            Write-Output "Updating forwarders for zone $zoneName"
            Set-DnsServerZoneForwarder -Name $zoneName -MasterServers $serverIP
            $Ansible.Changed = $true
          } else {
            Write-Output "Zone $zoneName is correctly configured"
            $Ansible.Changed = $false
          }
        }
      } catch {
        Write-Error "Error verifying DNS zone: $_"
        $Ansible.Changed = $false
      }
  when: remote_ipv4_result is defined and (remote_ipv4_result.host_out is defined or remote_ipv4_result.stdout is defined)