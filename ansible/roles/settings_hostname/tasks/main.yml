---
# -- Pre-flight: detect domain state so we can clean up before renaming ------
- name: Check current hostname and domain state
  ansible.windows.win_powershell:
    script: |
      $cs = Get-WmiObject Win32_ComputerSystem
      $Ansible.Result = @{
        current_hostname = $env:COMPUTERNAME
        is_domain_joined = [bool]$cs.PartOfDomain
        is_dc            = ($cs.DomainRole -ge 4)
        domain           = $cs.Domain
      }
      $Ansible.Changed = $false
  register: host_state

# -- ADCS removal: Certificate Services block DC demotion -------------------
- name: Remove ADCS features before DC demotion
  ansible.windows.win_feature:
    name: AD-Certificate
    state: absent
    include_sub_features: true
    include_management_tools: true
  when:
    - host_state.result.is_dc
    - host_state.result.current_hostname | upper != hostname | upper
  register: adcs_removal

- name: Reboot after ADCS removal (required before demotion)
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: adcs_removal is changed

# -- DC demotion: a promoted DC cannot be safely renamed in-place ------------
- name: Demote domain controller before hostname change
  microsoft.ad.domain_controller:
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
    local_admin_password: "{{ local_admin_password }}"
    state: member_server
  register: dc_demote
  async: 3600
  poll: 60
  when:
    - host_state.result.is_dc
    - host_state.result.current_hostname | upper != hostname | upper

- name: Reboot after DC demotion
  ansible.windows.win_reboot:
    reboot_timeout: 900
    post_reboot_delay: 120
  when: dc_demote is changed or (dc_demote.reboot_required | default(false))

# -- Domain unjoin: domain-joined servers cannot be renamed by a local user --
- name: Unjoin from domain before hostname change
  microsoft.ad.membership:
    state: workgroup
    workgroup_name: WORKGROUP
    domain_admin_user: "{{ domain_username }}"
    domain_admin_password: "{{ domain_password }}"
  register: domain_unjoin
  when:
    - host_state.result.is_domain_joined
    - not host_state.result.is_dc
    - host_state.result.current_hostname | upper != hostname | upper

- name: Reboot after domain unjoin
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: domain_unjoin is changed or (domain_unjoin.reboot_required | default(false))

# -- SSM user persistence ----------------------------------------------------
- name: Create scheduled task to keep ssm-user enabled (survives GPO refresh)
  ansible.windows.win_powershell:
    script: |
      $taskName = "KeepSSMUserEnabled"
      $existingTask = Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue
      if ($existingTask) {
        Write-Output "Scheduled task already exists"
        $Ansible.Changed = $false
      } else {
        $action = New-ScheduledTaskAction -Execute "PowerShell.exe" -Argument "-NoProfile -WindowStyle Hidden -Command Enable-LocalUser -Name ssm-user -ErrorAction SilentlyContinue; net localgroup Administrators ssm-user /add 2>`$null"
        $trigger = New-ScheduledTaskTrigger -Once -At (Get-Date) -RepetitionInterval (New-TimeSpan -Minutes 1)
        $principal = New-ScheduledTaskPrincipal -UserId SYSTEM -LogonType ServiceAccount -RunLevel Highest
        Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Force | Out-Null
        Write-Output "Scheduled task created to keep ssm-user enabled every 5 minutes"
        $Ansible.Changed = $true
      }
  failed_when: false

# -- Hostname change ----------------------------------------------------------
- name: Change the hostname
  ansible.windows.win_hostname:
    name: "{{ hostname }}"
  register: win_hostname

- name: Reboot if needed
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 30
  when: win_hostname.reboot_required

- name: Ensure ssm-user is enabled after reboot (prevents connection failures)
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = "SilentlyContinue"
      $user = Get-LocalUser -Name ssm-user
      if ($user -and -not $user.Enabled) {
        try {
          # Try using net user command as fallback if Enable-LocalUser fails
          net user ssm-user /active:yes
          Write-Output "ssm-user enabled via net user"
          $Ansible.Changed = $true
        } catch {
          Write-Output "Could not enable ssm-user: $_"
          $Ansible.Changed = $false
        }
      } elseif ($user) {
        Write-Output "ssm-user already enabled"
        $Ansible.Changed = $false
      } else {
        Write-Output "ssm-user does not exist yet"
        $Ansible.Changed = $false
      }
  when: win_hostname.reboot_required
  failed_when: false
