---
- name: Create scheduled task to keep ssm-user enabled (survives GPO refresh)
  ansible.windows.win_powershell:
    script: |
      $taskName = "KeepSSMUserEnabled"
      $existingTask = Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue
      if ($existingTask) {
        Write-Output "Scheduled task already exists"
        $Ansible.Changed = $false
      } else {
        $action = New-ScheduledTaskAction -Execute "PowerShell.exe" -Argument "-NoProfile -WindowStyle Hidden -Command Enable-LocalUser -Name ssm-user -ErrorAction SilentlyContinue; net localgroup Administrators ssm-user /add 2>`$null"
        $trigger = New-ScheduledTaskTrigger -Once -At (Get-Date) -RepetitionInterval (New-TimeSpan -Minutes 1)
        $principal = New-ScheduledTaskPrincipal -UserId SYSTEM -LogonType ServiceAccount -RunLevel Highest
        Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Force | Out-Null
        Write-Output "Scheduled task created to keep ssm-user enabled every 5 minutes"
        $Ansible.Changed = $true
      }
  failed_when: false

- name: Change the hostname
  ansible.windows.win_hostname:
    name: "{{ hostname }}"
  register: win_hostname

- name: Reboot if needed
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 30
  when: win_hostname.reboot_required

- name: Ensure ssm-user is enabled after reboot (prevents connection failures)
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = "SilentlyContinue"
      $user = Get-LocalUser -Name ssm-user
      if ($user -and -not $user.Enabled) {
        try {
          # Try using net user command as fallback if Enable-LocalUser fails
          net user ssm-user /active:yes
          Write-Output "ssm-user enabled via net user"
          $Ansible.Changed = $true
        } catch {
          Write-Output "Could not enable ssm-user: $_"
          $Ansible.Changed = $false
        }
      } elseif ($user) {
        Write-Output "ssm-user already enabled"
        $Ansible.Changed = $false
      } else {
        Write-Output "ssm-user does not exist yet"
        $Ansible.Changed = $false
      }
  when: win_hostname.reboot_required
  failed_when: false
