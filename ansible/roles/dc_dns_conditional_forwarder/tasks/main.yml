---
- name: Add dns server zone using PowerShell
  ansible.windows.win_powershell:
    script: |
      try {
        $domain = "{{ domain }}"
        $domains = @({{ domains | to_json }})
        $trust = "{{ trust }}"
        $parentDomain = "{{ parent_domain }}"
        
        Write-Output "Processing domain: $domain"
        Write-Output "Available domains: $($domains -join ', ')"
        
        foreach ($targetZone in $domains) {
          # Skip if it's the current domain, parent/child domain, or already a direct trusted domain
          if ($targetZone -eq $domain -or 
              $targetZone -eq $trust -or 
              $targetZone -eq $parentDomain -or 
              $(if ($parentDomain) { $targetZone.EndsWith($domain) } else { $false })) {
            Write-Output "Skipping zone $targetZone (own domain, trust, or parent/child)"
            continue
          }
          
          # Get IP of the remote DC
          $remoteDC = "{{ lab.domains[item].dc | default('unknown') }}"
          $remoteIPAddress = "{{ hostvars[lab.domains[item].dc].ansible_host | default('') }}"
          
          if ([string]::IsNullOrEmpty($remoteIPAddress)) {
            Write-Output "No IP address found for zone $targetZone, skipping"
            continue
          }
          
          Write-Output "Setting up conditional forwarder for $targetZone using DC $remoteDC with IP $remoteIPAddress"
          
          # Check if zone already exists
          $existingZone = Get-DnsServerZone -Name $targetZone -ErrorAction SilentlyContinue
          
          if ($existingZone) {
            # Update existing zone
            Set-DnsServerZoneForwarder -Name $targetZone -MasterServers $remoteIPAddress
            Write-Output "Updated existing conditional forwarder for $targetZone"
          } else {
            # Create new zone
            Add-DnsServerConditionalForwarderZone -Name $targetZone -MasterServers $remoteIPAddress -ReplicationScope "{{ replication }}"
            Write-Output "Created new conditional forwarder for $targetZone"
          }
        }
        
        $Ansible.Changed = $true
      } catch {
        Write-Error "Error setting up conditional forwarder: $_"
        $Ansible.Changed = $false
      }
  loop: "{{ domains }}"
  loop_control:
    loop_var: item
  when: >
    item != domain and 
    item != trust and 
    item != parent_domain and 
    (parent_domain == '' or not item.endswith(domain))