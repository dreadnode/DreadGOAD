---
- name: Refresh
  ansible.windows.win_command: gpupdate /force

- name: Install ADCSTemplate Module
  ansible.windows.win_copy:
    src: files/ADCSTemplate
    dest: "C:\\Program Files\\WindowsPowerShell\\Modules"

- name: Create a template directory
  ansible.windows.win_file: 
    path: c:\setup
    state: directory

- name: Copy templates json
  ansible.windows.win_copy:
    src: "files/{{ item }}.json"
    dest: "C:\\setup\\{{ item }}.json"
  with_items:
    - ESC1
    - ESC2
    - ESC3
    - ESC3-CRA
    - ESC4

- name: Clean JSON files to remove BOM or special characters
  ansible.windows.win_shell: |
    $files = @('ESC1.json', 'ESC2.json', 'ESC3.json', 'ESC3-CRA.json', 'ESC4.json')
    foreach ($file in $files) {
      $path = "c:\setup\$file"
      $content = Get-Content -Path $path -Raw
      # Replace any special characters at the beginning
      $content = $content -replace '^\xEF\xBB\xBF', '' -replace '^ˇ˛', ''
      # Ensure valid JSON formatting
      $content = $content.Trim()
      Set-Content -Path $path -Value $content -Encoding UTF8 -NoNewline
      Write-Output "Cleaned $file"
    }

- name: Install templates
  ansible.windows.win_powershell:
    script: |
      Import-Module ADCSTemplate -Force
      
      $templateName = "{{item}}"
      $templatePath = "c:\setup\$templateName.json"
      
      try {
        # Verify the JSON file is readable
        $jsonContent = Get-Content -Path $templatePath -Raw -ErrorAction Stop
        Write-Output "JSON content length: $($jsonContent.Length) characters"
        
        # Check if template already exists
        $existingTemplate = Get-ADCSTemplate -DisplayName $templateName -ErrorAction SilentlyContinue
        
        if (-not $existingTemplate) {
          # Create the template
          Write-Output "Creating template $templateName"
          New-ADCSTemplate -DisplayName $templateName -JSON $jsonContent -Identity "{{domain_name}}\Domain Users" -Publish
          Write-Output "Successfully created template $templateName"
        } else {
          Write-Output "Template $templateName already exists"
        }
      } catch {
        Write-Error "Error processing template $templateName. Error: $($_.Exception.Message)"
        exit 1
      }
    error_action: continue
  vars:
    ansible_become: true
    ansible_become_method: runas
    domain_name: "{{domain}}"
    ansible_become_user: "{{domain_username}}"
    ansible_become_password: "{{domain_password}}"
  register: template_result
  failed_when: template_result.rc != 0
  with_items:
    - ESC1
    - ESC2
    - ESC3
    - ESC3-CRA
    - ESC4

- name: Get CA information from Active Directory
  ansible.windows.win_powershell:
    script: |
      try {
        # Try to get CA information directly from AD
        Import-Module ActiveDirectory
        
        $configNC = (Get-ADRootDSE).configurationNamingContext
        $CAsPath = "CN=Enrollment Services,CN=Public Key Services,CN=Services,$configNC"
        
        $CAObjects = Get-ADObject -SearchBase $CAsPath -Filter * -Properties dNSHostName, displayName, name
        
        $CAInfo = @()
        if ($CAObjects) {
          foreach ($ca in $CAObjects) {
            if ($ca.dNSHostName -and $ca.displayName) {
              $CAInfo += [PSCustomObject]@{
                Server = $ca.dNSHostName
                CAName = $ca.displayName
              }
            }
          }
        }
        
        # Return the full list plus the best match for the requested CA host
        $requested = "{{ca_host}}"
        $bestMatch = $CAInfo | Where-Object { $_.Server -like "*$requested*" } | Select-Object -First 1
        
        if ($bestMatch) {
          $result = @{
            AllCAs = $CAInfo
            BestMatch = $bestMatch
          }
        } else {
          # No match found, create a manual entry
          $manualInfo = [PSCustomObject]@{
            Server = "{{ca_host}}"
            CAName = "{{ca_common_name}}"
          }
          
          $result = @{
            AllCAs = @($manualInfo)
            BestMatch = $manualInfo
            IsManual = $true
          }
        }
        
        # Return as a string, not JSON
        $Ansible.Changed = $false
        $Ansible.Result = @{
          ca_info = $result
        }
      } catch {
        # Create a manual best guess using the provided ca_host and ca_common_name
        $manualInfo = [PSCustomObject]@{
          Server = "{{ca_host}}"
          CAName = "{{ca_common_name}}"
        }
        
        $Ansible.Changed = $false
        $Ansible.Result = @{
          ca_info = @{
            AllCAs = @($manualInfo)
            BestMatch = $manualInfo
            IsManual = $true
            Error = $_.Exception.Message
          }
        }
      }
  register: ca_info

- name: Configure ATTRIBUTESUBJECTALTNAME2 on CA - ESC6
  ansible.windows.win_shell: |
    $configString = "{{ ca_host }}\{{ ca_common_name }}"
    Write-Output "Attempting to configure using $configString"
    
    # Try with explicit configuration
    try {
      $result = certutil -config "$configString" -setreg policy\Editflags +EDITF_ATTRIBUTESUBJECTALTNAME2
      if ($LASTEXITCODE -eq 0) {
        Write-Output "Successfully configured using $configString"
        exit 0
      }
    } catch {
      Write-Output "Failed with initial configuration: $_"
    }
    
    # Try local CA as fallback
    Write-Output "Attempting to configure local CA"
    $result = certutil -setreg policy\Editflags +EDITF_ATTRIBUTESUBJECTALTNAME2
    if ($LASTEXITCODE -eq 0) {
      Write-Output "Successfully configured local CA"
      exit 0
    }
    
    # If we get here, all attempts failed
    Write-Error "Could not configure any Certificate Authority"
    exit 1
  args:
    executable: powershell.exe
  register: ca_config
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ domain_username }}"
    ansible_become_password: "{{ domain_password }}"
  failed_when: ca_config.rc != 0

- name: Refresh
  ansible.windows.win_command: gpupdate /force