---
- name: Prepare to trust flush and renew dns
  ansible.windows.win_shell: |
    ipconfig /flushdns
    ipconfig /renew

# Use System.DirectoryServices.ActiveDirectory with an explicit DirectoryContext
# for BOTH forests. The earlier getCurrentForest() path crashed with
# STATUS_ACCESS_VIOLATION on Ludus Server 2019 because the WinRM thread had no
# domain forest context; passing creds via DirectoryContext bypasses that path
# entirely and avoids the netdom argv-escaping issue with passwords starting in "-".
- name: Configure forest trust to remote domain
  ansible.windows.win_powershell:
    error_action: stop
    parameters:
      LocalForest: "{{ domain }}"
      LocalAdmin: "{{ admin_user }}"
      LocalAdminPassword: "{{ domain_password }}"
      RemoteForest: "{{ remote_forest }}"
      RemoteAdmin: "{{ admin_user }}"
      RemoteAdminPassword: "{{ remote_admin_password }}"
    script: |
      [CmdletBinding()]
      param (
        [Parameter(Mandatory)][string]$LocalForest,
        [Parameter(Mandatory)][string]$LocalAdmin,
        [Parameter(Mandatory)][string]$LocalAdminPassword,
        [Parameter(Mandatory)][string]$RemoteForest,
        [Parameter(Mandatory)][string]$RemoteAdmin,
        [Parameter(Mandatory)][string]$RemoteAdminPassword
      )

      $localCtx = New-Object System.DirectoryServices.ActiveDirectory.DirectoryContext(
        'Forest', $LocalForest, $LocalAdmin, $LocalAdminPassword)
      $localForestObj = [System.DirectoryServices.ActiveDirectory.Forest]::GetForest($localCtx)

      try {
        $null = $localForestObj.GetTrustRelationship($RemoteForest)
        $Ansible.Changed = $false
        $Ansible.Result = @{ status = 'exists' }
      } catch [System.DirectoryServices.ActiveDirectory.ActiveDirectoryObjectNotFoundException] {
        $remoteCtx = New-Object System.DirectoryServices.ActiveDirectory.DirectoryContext(
          'Forest', $RemoteForest, $RemoteAdmin, $RemoteAdminPassword)
        $remoteForestObj = [System.DirectoryServices.ActiveDirectory.Forest]::GetForest($remoteCtx)
        $localForestObj.CreateTrustRelationship(
          $remoteForestObj,
          [System.DirectoryServices.ActiveDirectory.TrustDirection]::Bidirectional)
        $Ansible.Changed = $true
        $Ansible.Result = @{ status = 'created' }
      }
  register: trust_result

- name: Reboot and wait for the AD system to restart
  ansible.windows.win_reboot:
    test_command: "Get-ADUser -Identity {{ admin_user }} -Properties *"
  when: trust_result.changed
