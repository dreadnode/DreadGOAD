- name: Test network connectivity to remote DC
  ansible.windows.win_powershell:
    script: |
      Test-NetConnection -ComputerName {{ hostvars[remote_dc].ansible_host }} -Port 389
      Test-NetConnection -ComputerName {{ hostvars[remote_dc].ansible_host }} -Port 445
    error_action: continue
  register: network_test
  
- name: Display network test results
  debug:
    var: network_test

- name: Check forest functional level
  ansible.windows.win_powershell:
    script: |
      Get-ADForest | Select-Object ForestMode
    error_action: continue
  register: forest_level
  
- name: Display forest level
  debug:
    var: forest_level

- name: Show trust result
  ansible.windows.win_powershell:
    script: |
      # Suppress progress output
      $ProgressPreference = 'SilentlyContinue'

      # Get trust status using CIM
      $obj = Get-CimInstance -Class Microsoft_DomainTrustStatus -Namespace root\microsoftactivedirectory

      # Convert to JSON and return (handle CLIXML issue)
      $result = $obj | Select-Object FlatName, SID, TrustAttributes, TrustDirection, TrustedDCName, TrustedDomain, TrustIsOk, TrustStatus, TrustStatusString, TrustType
      ConvertTo-Json -InputObject $result -Depth 3
  register: trust_status_details
  ignore_errors: true