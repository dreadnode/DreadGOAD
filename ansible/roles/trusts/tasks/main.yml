---
- name: Prepare to trust flush and renew dns
  ansible.windows.win_shell: |
    ipconfig /flushdns
    ipconfig /renew

# Use netdom.exe (CLI) instead of System.DirectoryServices.ActiveDirectory .NET API.
# The .NET API requires the calling process to have a valid domain security context;
# under Ansible's WinRM (connected as a local user) the API path crashes with
# STATUS_ACCESS_VIOLATION on Ludus Server 2019 images. netdom accepts credentials
# directly via /UserO and /UserD so no become/runas hop is needed.
# Quote every value: domain passwords can begin with `-`, which netdom would
# otherwise parse as a switch and reject the whole command line.
- name: Check if trust to remote forest already exists
  ansible.windows.win_shell: >
    netdom trust "{{ domain }}"
    "/Domain:{{ remote_forest }}"
    "/UserO:{{ admin_user }}"
    "/PasswordO:{{ domain_password }}"
    /verify
  register: trust_check
  changed_when: false
  failed_when: false

- name: Add trusts between domain
  ansible.windows.win_shell: >
    netdom trust "{{ domain }}"
    "/Domain:{{ remote_forest }}"
    /Add /Twoway
    "/UserO:{{ admin_user }}"
    "/PasswordO:{{ domain_password }}"
    "/UserD:{{ admin_user }}"
    "/PasswordD:{{ remote_admin_password }}"
  when: trust_check.rc != 0
  register: trust_result

- name: Reboot and wait for the AD system to restart
  ansible.windows.win_reboot:
    test_command: "Get-ADUser -Identity {{ admin_user }} -Properties *"
  when: trust_result.changed
