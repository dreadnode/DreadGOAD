---
# Network discovery — run once before provisioning playbooks.
# The lab config (the `lab` variable) is loaded automatically by the
# dreadnode.goad.lab_config vars plugin. This playbook only handles
# runtime network detection that requires connecting to Windows hosts.

- name: Discover network configuration
  hosts: domain:extensions
  gather_facts: true
  serial: 5
  roles:
    - { role: 'dreadnode.goad.network_discovery', tags: 'network_discovery' }

- name: Create global network mappings
  hosts: all
  gather_facts: false
  serial: 10
  tasks:
    # instance_to_ip is set by network_discovery's aws_mapping.yml on SSM hosts.
    # For non-SSM connections (where ansible_host is already an IP/hostname),
    # rebuild it from per-host host_ipv4 facts.
    - name: Build instance_to_ip fallback for non-SSM connections
      ansible.builtin.set_fact:
        instance_to_ip: >-
          {%- set mapping = {} -%}
          {%- for host in groups['all'] -%}
            {%- if hostvars[host]['host_ipv4'] is defined and hostvars[host]['ansible_host'] is defined and hostvars[host]['host_ipv4'] != '' -%}
              {%- set _ = mapping.update({hostvars[host]['ansible_host']: hostvars[host]['host_ipv4']}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ mapping }}
        cacheable: true
      run_once: true
      delegate_facts: true
      delegate_to: "{{ item }}"
      loop: "{{ groups['all'] }}"
      throttle: 5
      when: ansible_connection is not search('aws_ssm')

    - name: Build and distribute dc_hostname_to_ip mapping
      ansible.builtin.include_role:
        name: dreadnode.goad.network_discovery
        tasks_from: dc_hostname_mapping.yml

    - name: Debug the mappings
      ansible.builtin.debug:
        msg:
          - "DC Hostname to IP mapping: {{ dc_hostname_to_ip | default({}) }}"
          - "Instance to IP mapping: {{ instance_to_ip | default({}) }}"
        verbosity: 2
      run_once: true
