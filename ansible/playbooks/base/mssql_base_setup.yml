---
- name: Provision GOAD MSSQL Server Base Image - System Setup
  hosts: all
  gather_facts: true

  tasks:
    - name: Install PowerShellGet and NuGet provider
      ansible.windows.win_shell: |
        $ProgressPreference = 'SilentlyContinue'
        $ErrorActionPreference = 'Stop'
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Install-PackageProvider -Name NuGet -Force -Confirm:$false
        Install-Module PowerShellGet -Force -Confirm:$false
      register: powershellget_install
      retries: 3
      delay: 10
      until: powershellget_install is not failed

    - name: Install required DSC modules
      community.windows.win_psmodule:
        name: "{{ item }}"
        state: present
        accept_license: true
        skip_publisher_check: true
      loop:
        - ComputerManagementDsc
        - ActiveDirectoryDsc
        - xNetworking
        - NetworkingDsc
      environment:
        LOCALAPPDATA: 'C:\Windows\system32\config\systemprofile\AppData\Local'
      register: dsc_install
      retries: 3
      delay: 10
      until: dsc_install is not failed

    - name: Verify DSC LCM is ready
      ansible.windows.win_powershell:
        script: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = "Stop"
          try {
            $lcm = Get-DscLocalConfigurationManager
            if ($lcm.LCMState -ne 'Idle') {
              throw "LCM not ready, state: $($lcm.LCMState)"
            }
            Write-Output "DSC LCM is ready (state: Idle)"
            $Ansible.Changed = $false
          } catch {
            $Ansible.Failed = $true
            throw $_
          }
      register: dsc_ready
      retries: 5
      delay: 5
      until: dsc_ready is not failed
      changed_when: false

    - name: Install IIS Web Server
      ansible.windows.win_feature:
        name:
          - Web-Server
          - Web-WebServer
          - Web-Common-Http
          - Web-Default-Doc
          - Web-Dir-Browsing
          - Web-Http-Errors
          - Web-Static-Content
          - Web-Health
          - Web-Http-Logging
          - Web-Performance
          - Web-Stat-Compression
          - Web-Security
          - Web-Filtering
          - Web-Mgmt-Tools
          - Web-Mgmt-Console
        state: present
        include_management_tools: true
      register: iis_install

    - name: Install WebDAV Publishing
      ansible.windows.win_feature:
        name: Web-DAV-Publishing
        state: present
      register: webdav_install

    - name: Reboot if IIS installation requires it
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 60
      when: iis_install.reboot_required or webdav_install.reboot_required

    - name: Enable Remote Desktop
      ansible.windows.win_dsc:
        resource_name: RemoteDesktopAdmin
        IsSingleInstance: 'Yes'
        Ensure: present
        UserAuthentication: Secure
      register: rdp_result
      retries: 3
      delay: 10
      until: rdp_result is not failed

    - name: Allow RDP through Windows Firewall
      ansible.windows.win_dsc:
        resource_name: xFirewall
        Name: "Administrator access for RDP (TCP-In)"
        Ensure: present
        Enabled: true
        Profile: "Domain"
        Direction: "Inbound"
        Localport: "3389"
        Protocol: "TCP"
        Description: "Opens the listener port for RDP"
      register: firewall_result
      retries: 3
      delay: 10
      until: firewall_result is not failed

    - name: Create prebaked manifest directory
      ansible.windows.win_file:
        path: 'C:\ProgramData\goad'
        state: directory

    - name: Write prebaked AMI manifest
      ansible.windows.win_copy:
        dest: 'C:\ProgramData\goad\prebaked.json'
        content: >-
          {{ _manifest | to_nice_json }}
      vars:
        _manifest:
          version: 1
          role: mssql
          dsc_modules: true
          rdp_enabled: true
          windows_updated: false
