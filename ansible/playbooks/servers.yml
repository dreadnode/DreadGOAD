---

- name: Install IIS
  hosts: iis
  roles:
    - { role: 'dreadnode.goad.iis', tags: 'iis'}

- name: Install MSSQL Express
  hosts: mssql
  # serial: 1  # Removed for parallel execution - saves ~15-20 minutes
  pre_tasks:
    - name: Debug all MSSQL installation variables
      ansible.builtin.debug:
        msg: |
          MSSQL Express Installation Variables:
          ===================================
          dict_key: {{ dict_key }}
          domain: {{ domain }}
          SQLSVCACCOUNT: {{ SQLSVCACCOUNT }}
          SQLSVCPASSWORD: {{ SQLSVCPASSWORD }}
          SQLSYSADMIN: {{ SQLSYSADMIN }}
          domain_admin: {{ domain_admin }}
          domain_admin_password: {{ domain_admin_password }}
          sql_sysadmins: {{ sql_sysadmins }}
          executeaslogin: {{ executeaslogin }}
          executeasuser: {{ executeasuser }}
          sa_password: {{ sa_password }}
          linked_servers: {{ linked_servers }}
      tags: always

  roles:
    # mssql role now handles install/config split internally
    # Installation is skipped if already installed, but config ALWAYS runs
    - { role: 'dreadnode.goad.mssql', tags: 'mssql' }
    - { role: 'dreadnode.goad.mssql_link', tags: 'mssql, mssql_link'}
  vars:
    domain: "{{ lab.hosts[dict_key].domain }}"
    SQLSVCACCOUNT: "NT AUTHORITY\\NETWORK SERVICE"
    SQLSVCPASSWORD: ""
    SQLSYSADMIN: "{{ lab.hosts[dict_key].mssql.sysadmin | default('NT AUTHORITY\\NETWORK SERVICE') }}"
    domain_admin: "{{ domain }}\\{{ admin_user }}"
    domain_admin_password: "{{ lab.domains[domain].domain_password }}"
    sql_sysadmins: "{{ lab.hosts[dict_key].mssql.sysadmins | default([]) }}"
    executeaslogin: "{{ lab.hosts[dict_key].mssql.executeaslogin  | default({}) }}"
    executeasuser:  "{{ lab.hosts[dict_key].mssql.executeasuser | default({}) }}"
    sa_password: "{{ lab.hosts[dict_key].mssql.sa_password }}"
    linked_servers: "{{ lab.hosts[dict_key].mssql.linked_servers | default({}) }}"

- name: Install SQL Server Management Studio
  hosts: mssql_ssms
  roles:
    - { role: 'dreadnode.goad.mssql_ssms', tags: 'mssql_ssms'}

- name: Install SQL Server reporting
  hosts: mssql_reporting
  roles:
    - { role: 'dreadnode.goad.mssql_reporting', tags: 'mssql_reporting'}
  vars:
    domain: "{{ lab.hosts[dict_key].domain }}"
    domain_admin: "{{ domain }}\\{{ admin_user }}"
    domain_admin_password: "{{ lab.domains[domain].domain_password }}"

- name: Install Webdav
  hosts: webdav
  roles:
    - { role: 'dreadnode.goad.webdav', tags: 'webdav'}
