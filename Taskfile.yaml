  update-inventory:
    desc: Synchronize Ansible inventory with AWS instance IDs of running EC2 instances and update environment value
    summary: |
      Retrieves instance IDs from AWS and updates the environment-specific 
      Ansible inventory file (default: dev) with the latest instance mappings.
      Also updates the "env=" field in the inventory to match the specified ENV parameter.
      
      Options:
        ENV=<env>            Environment to target (default: dev)
        INVENTORY=<path>     Path to inventory file (default: ./<env>-inventory)
        OUTPUT=<path>        Output file path (default: overwrite inventory file)
        BACKUP=<bool>        Create backup before modifying (default: false)
        JSON=<path>          Path to JSON file with instances data
      
      Examples:
        task update-inventory                     # Update dev inventory with current AWS instances
        task update-inventory ENV=prod            # Update prod inventory and set env=prod in the file
        task update-inventory BACKUP=true         # Create backup before updating
        task update-inventory OUTPUT=new-inventory # Write to new file instead of updating original
    vars:
      ENV: '{{.ENV | default "dev"}}'
      INVENTORY: '{{.INVENTORY | default (print "./" .ENV "-inventory")}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
      BACKUP: '{{.BACKUP | default "false"}}'
      JSON: '{{.JSON | default ""}}'
      BACKUP_FILE: '{{.INVENTORY}}.bak.{{now | date "20060102150405"}}'
    run: always
    cmds:
      - |
        # Validate inventory file exists
        if [ ! -f "{{.INVENTORY}}" ]; then
          echo "Error: Inventory file not found: {{.INVENTORY}}"
          exit 1
        fi
        
        # Create backup if requested
        if [ "{{.BACKUP}}" = "true" ]; then
          cp "{{.INVENTORY}}" "{{.BACKUP_FILE}}"
          echo "Created backup: {{.BACKUP_FILE}}"
        fi
        
        # Set output file to inventory file if not specified
        OUTPUT_FILE="{{if .OUTPUT}}{{.OUTPUT}}{{else}}{{.INVENTORY}}{{end}}"
        
        # Update the env= field in the inventory file to match the ENV parameter
        echo "Updating environment in inventory to: {{.ENV}}"
        sed -i.tmp -E "s/^(\s*env=).*/\1{{.ENV}}/" "{{.INVENTORY}}"
        rm -f "{{.INVENTORY}}.tmp"
        
        # Function to update inventory file
        function update_inventory {
          local instances_data="$1"
          local inventory_file="$2"
          local output_file="$3"
          local temp_file
          temp_file=$(mktemp)
          local updates_count=0
          
          # Parse JSON and extract instance information
          # Use jq if available, otherwise try with grep and awk
          if command -v jq &> /dev/null; then
            # Extract instance name and ID pairs with jq
            instance_pairs=$(echo "$instances_data" | jq -r '.[] | 
              if type=="array" then .[0] else . end | 
              select(.Name != null and .InstanceId != null) | 
              select(.Name | contains("dreadgoad-")) | 
              (.Name | split("dreadgoad-") | .[1] | ascii_downcase) + " " + .InstanceId')
          else
            echo "Warning: jq not found, using limited fallback parser"
            # Crude parsing with grep/sed/awk - less reliable
            instance_pairs=$(echo "$instances_data" | grep -o '"Name":\s*"[^"]*dreadgoad-[^"]*"' | 
              sed 's/"Name":\s*"[^"]*dreadgoad-\([^"]*\)"/\1/' | 
              tr '[:upper:]' '[:lower:]' | 
              while read -r name; do
                id=$(echo "$instances_data" | grep -o -B5 -A5 "dreadgoad-${name}" | 
                    grep -o '"InstanceId":\s*"[^"]*"' | 
                    sed 's/"InstanceId":\s*"\([^"]*\)"/\1/' | head -1)
                if [ -n "$id" ]; then
                  echo "${name} ${id}"
                fi
              done)
          fi
          
          if [ -z "$instance_pairs" ]; then
            echo "No matching instances found in the AWS data"
            rm -f "$temp_file"
            return 1
          fi
          
          # Create a temporary file to track updates
          echo "0" > "$temp_file"
          
          # Process each instance pair (without pipe to avoid subshell)
          while read -r server_name instance_id; do
            if [ -z "$server_name" ] || [ -z "$instance_id" ]; then
              continue
            fi
            
            # Case insensitive search for server name at the start of the line
            server_line=$(grep -i "^${server_name}[[:space:]]" "$inventory_file")
            
            if [ -n "$server_line" ]; then
              # Extract current instance ID (assumes ansible_host= format)
              current_id=$(echo "$server_line" | sed -E "s/^${server_name}[[:space:]]+ansible_host=([^[:space:]]+)(.*)/\1/")
              
              if [ "$current_id" != "$instance_id" ]; then
                # Update the instance ID
                sed -i.tmp -E "s/^(${server_name}[[:space:]]+ansible_host=)[^[:space:]]+(.*)$/\1${instance_id}\2/i" "$inventory_file"
                rm -f "${inventory_file}.tmp"
                echo "Updated ${server_name} with instance ID: ${instance_id}"
                
                # Increment counter (avoid subshell issues)
                current_count=$(cat "$temp_file")
                echo $((current_count + 1)) > "$temp_file"
              fi
            fi
          done <<< "$instance_pairs"
          
          # Get final update count
          updates_count=$(cat "$temp_file")
          
          if [ "$updates_count" -eq 0 ]; then
            echo "No instance ID updates were made. All instance IDs are already up to date."
          else  
            echo "Successfully updated ${updates_count} instance IDs in ${inventory_file}"
          fi
          
          # If output file is different from inventory, copy the updated file
          if [ "$output_file" != "$inventory_file" ]; then
            cp "$inventory_file" "$output_file"
            echo "Copied updated inventory to: ${output_file}"
          fi
          
          rm -f "$temp_file"
          return 0
        }
        
        # Get instance data from JSON file or stdin
        if [ -n "{{.JSON}}" ]; then
          if [ ! -f "{{.JSON}}" ]; then
            echo "Error: JSON file not found: {{.JSON}}"
            exit 1
          fi
          instances_data=$(cat "{{.JSON}}")
        elif [ -t 0 ]; then
          # No piped input, try to get instance data
          echo "No piped input detected. Trying to get instance data..."
          
          if command -v task &> /dev/null; then
            echo "Using task aws:list-running-instances to get instance data..."
            instances_data=$(task aws:list-running-instances)
            if [ $? -ne 0 ]; then
              echo "Failed to run task aws:list-running-instances"
              exit 1
            fi
          elif command -v list_running_instances &> /dev/null; then
            echo "Using list_running_instances function..."
            instances_data=$(list_running_instances)
          else
            echo "Error: No piped input and no method to get instance data"
            echo "Please pipe AWS instance data to this task or ensure aws:list-running-instances task is available"
            exit 1
          fi
        else
          # Read from stdin (piped input)
          instances_data=$(cat)
        fi
        
        # Check if we have instance data
        if [ -z "$instances_data" ]; then
          echo "Error: No AWS instance data provided"
          exit 1
        fi
        
        # Update inventory (explicitly handle the exit code)
        update_inventory "$instances_data" "{{.INVENTORY}}" "$OUTPUT_FILE"
        exit $?  # Use the function's return code as the task's exit code
    sources:
      - '{{.INVENTORY}}'
    generates:
      - '{{if .OUTPUT}}{{.OUTPUT}}{{else}}{{.INVENTORY}}{{end}}'
