---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

includes:
  aws:
    taskfile: https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/aws/Taskfile.yaml

vars:
  ENV: '{{.ENV | default "dev"}}'
  # List of all available playbooks in order of execution
  GOAD_PLAYBOOKS: 'build.yml ad-servers.yml ad-parent_domain.yml ad-child_domain.yml ad-members.yml ad-trusts.yml ad-data.yml ad-gmsa.yml laps.yml ad-relations.yml adcs.yml ad-acl.yml servers.yml security.yml vulnerabilities.yml'
  INVENTORY_FILE: './{{.ENV}}-inventory'
  LOG_DATE: '{{now | date "20060102_150405"}}'
  LOG_DIR: '$HOME/.ansible/logs/goad'
  LOG_FILE: '$HOME/.ansible/logs/goad/{{.ENV}}-dreadgoad-{{.LOG_DATE}}.log'
  MAX_RETRIES: '{{.MAX_RETRIES | default "3"}}'
  RETRY_DELAY: '{{.RETRY_DELAY | default "30"}}'
  # Playbooks that may trigger reboots (tracked for logging purposes only)
  REBOOT_PLAYBOOKS: 'ad-parent_domain.yml ad-child_domain.yml ad-members.yml ad-trusts.yml'
  DEBUG: '{{.DEBUG | default "false"}}'
  VERBOSE_FLAG: '{{if eq .DEBUG "true"}}-vvv{{else}}{{end}}'

env:
  ANSIBLE_CONFIG: './ansible/ansible.cfg'
  ANSIBLE_CACHE_PLUGIN_CONNECTION: '$HOME/.ansible/cache/{{.ENV}}_dreadgoad_facts'
  ANSIBLE_HOST_KEY_CHECKING: 'False'
  ANSIBLE_RETRY_FILES_ENABLED: 'True'
  ANSIBLE_GATHER_TIMEOUT: '60'

set:
  - pipefail

tasks:
  default:
    desc: Show available tasks and help information
    cmds:
      - task --list
    silent: true

  list-plays:
    desc: Show all available playbooks that can be executed
    cmds:
      - |
        echo "Available playbooks:"
        for playbook in {{.GOAD_PLAYBOOKS}}; do
          echo "  - $playbook"
        done
        echo ""
        echo "Usage examples:"
        echo "  Run all playbooks: task provision"
        echo "  Run specific playbooks: task provision PLAYS=\"build.yml ad-servers.yml\""
        echo "  Run a single playbook: task provision PLAYS=ad-data.yml"
    silent: true

  provision:
    desc: Run the DreadGOAD provisioning process with error handling and retries
    summary: |
      Runs the complete AD provisioning process with DreadGOAD Ansible playbooks
      using AWS Systems Manager (SSM).

      Options:
        ENV=<env>          Environment to target (default: dev)
        DEBUG=true         Enable verbose Ansible output (-vvv)
        MAX_RETRIES=<n>    Maximum retry attempts (default: 3)
        RETRY_DELAY=<s>    Delay between retries in seconds (default: 30)
        PLAYS="play1.yml play2.yml"  Specific playbooks to run (default: all playbooks)
        LIMIT=<hosts>      Limit execution to specific hosts (e.g., srv03, dc01)

      Examples:
        task provision ENV=prod DEBUG=true
        task provision ENV=staging PLAYS="build.yml ad-servers.yml"
        task provision ENV=dev PLAYS=ad-data.yml
        task provision PLAYS=laps.yml LIMIT=srv03
        task provision LIMIT="dc01,srv03" PLAYS="ad-members.yml laps.yml"

      To see all available playbooks:
        task list-plays
    vars:
      PLAYS: '{{.PLAYS | default .GOAD_PLAYBOOKS}}'
      LIMIT: '{{.LIMIT | default ""}}'
      # Generate log file name once for this provision run
      PROVISION_LOG_FILE: '$HOME/.ansible/logs/goad/{{.ENV}}-dreadgoad-{{now | date "20060102_150405"}}.log'
    deps:
      - ensure-log-dir
      - generate-mapping
    cmds:
      - task: log-provision-header
        vars:
          PLAYS: '{{.PLAYS}}'
          LIMIT: '{{.LIMIT}}'
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'
      - for: {var: PLAYS, split: ' '}
        task: run-playbook-with-retry
        vars:
          PLAYBOOK: '{{.ITEM}}'
          LIMIT: '{{.LIMIT}}'
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'
      - task: log-provision-success
        vars:
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'

  ad-users:
    desc: Ensure Active Directory users exist using the ad-data.yml playbook
    summary: |
      Runs the ad-data.yml Ansible playbook to create users in Active Directory.

      Options:
        ENV=<env>          Environment to target (default: dev)
        DEBUG=true         Enable verbose Ansible output (-vvv)
        MAX_RETRIES=<n>    Maximum retry attempts (default: 3)
        RETRY_DELAY=<s>    Delay between retries in seconds (default: 30)
        LIMIT=<hosts>      Limit execution to specific hosts (e.g., dc01, dc02)

      Examples:
        task ad-users
        task ad-users ENV=prod
        task ad-users DEBUG=true
        task ad-users LIMIT=dc01
    cmds:
      - task: provision
        vars:
          PLAYS: 'ad-data.yml'

  ensure-log-dir:
    internal: true
    cmds:
      - mkdir -p {{.LOG_DIR}}
    status:
      - test -d {{.LOG_DIR}}

  log-provision-header:
    internal: true
    requires:
      vars: [PLAYS]
    cmds:
      - |
        {
          echo "==============================================="
          echo "DreadGOAD provisioning process started at $(date)"
          echo "Environment: {{.ENV}}"
          echo "Max Retries: {{.MAX_RETRIES}}"
          {{if .LIMIT}}echo "Limited to hosts: {{.LIMIT}}"{{end}}
          echo "==============================================="
          echo ""
          echo "Playbooks to be executed:"
          for playbook in {{.PLAYS}}; do
            echo "  - ansible/$playbook"
          done
          echo "-----------------------------------------------"
        } | tee "{{.LOG_FILE}}"

  log-provision-success:
    internal: true
    cmds:
      - |
        {
          echo "==============================================="
          echo "All selected playbooks completed successfully at $(date)"
          echo "Full log available at: {{.LOG_FILE}}"
          echo "==============================================="
        } | tee -a "{{.LOG_FILE}}"

  run-playbook-with-retry:
    internal: true
    requires:
      vars: [PLAYBOOK]
    cmds:
      - PLAYBOOK={{.PLAYBOOK}} ENV={{.ENV}} LOG_FILE={{.LOG_FILE}} MAX_RETRIES={{.MAX_RETRIES}} RETRY_DELAY={{.RETRY_DELAY}} VERBOSE_FLAG={{.VERBOSE_FLAG}} LIMIT={{.LIMIT}} ./scripts/run-playbook-with-retry.sh

  get-files:
    desc: Display content of files related to specific playbooks
    summary: |
      Displays the content of files related to a specific Ansible playbook

      Options:
        ENV=<env>            Environment to target (default: dev)
        PLAYBOOK=<playbook>  Playbook to get files for

      Example: task get-files PLAYBOOK=security
    cmds:
      - PLAYBOOK={{.PLAYBOOK}} ENV={{.ENV}} ./scripts/get-playbook-files.sh

  generate-mapping:
    desc: Generate AWS instance-to-IP mapping file for Ansible optimization
    summary: |
      Queries AWS EC2 for instance private IPs and creates a mapping file
      that Ansible uses to skip network detection, speeding up playbook execution.

      Options:
        ENV=<env>            Environment to target (default: dev)
        INVENTORY=<path>     Path to inventory file (default: ./<env>-inventory)
        OUTPUT=<path>        Output file path (default: /tmp/aws_instance_mapping_<env>.json)

      Examples:
        task generate-mapping                     # Generate mapping for dev environment
        task generate-mapping ENV=prod            # Generate mapping for prod environment
        task generate-mapping OUTPUT=/tmp/my-mapping.json  # Use custom output path
    vars:
      INVENTORY: '{{.INVENTORY | default (print "./" .ENV "-inventory")}}'
      OUTPUT: '{{.OUTPUT | default (print "/tmp/aws_instance_mapping_" .ENV ".json")}}'
    run: always
    cmds:
      - ./scripts/generate-instance-mapping.sh "{{.INVENTORY}}" "{{.OUTPUT}}"

  update-inventory:
    desc: Synchronize Ansible inventory with AWS instance IDs of running EC2 instances and update environment value
    summary: |
      Retrieves instance IDs from AWS and updates the environment-specific
      Ansible inventory file (default: dev) with the latest instance mappings.
      Also updates the "env=" field in the inventory to match the specified ENV parameter.

      Options:
        ENV=<env>            Environment to target (default: dev)
        INVENTORY=<path>     Path to inventory file (default: ./<env>-inventory)
        OUTPUT=<path>        Output file path (default: overwrite inventory file)
        BACKUP=<bool>        Create backup before modifying (default: false)
        JSON=<path>          Path to JSON file with instances data

      Examples:
        task update-inventory                     # Update dev inventory with current AWS instances
        task update-inventory ENV=prod            # Update prod inventory and set env=prod in the file
        task update-inventory BACKUP=true         # Create backup before updating
        task update-inventory OUTPUT=new-inventory # Write to new file instead of updating original
    vars:
      INVENTORY: '{{.INVENTORY | default (print "./" .ENV "-inventory")}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
      BACKUP: '{{.BACKUP | default "false"}}'
      JSON: '{{.JSON | default ""}}'
      BACKUP_FILE: '{{.INVENTORY}}.bak.{{now | date "20060102150405"}}'
    run: always
    cmds:
      - ENV={{.ENV}} INVENTORY={{.INVENTORY}} OUTPUT={{.OUTPUT}} BACKUP={{.BACKUP}} BACKUP_FILE={{.BACKUP_FILE}} JSON={{.JSON}} ./scripts/update-inventory.sh

  validate-vulns:
    desc: Validate GOAD vulnerability configurations against documented specifications
    summary: |
      Validates that all GOAD vulnerabilities documented in docs/GOAD-vulnerabilities-comprehensive.md
      are properly configured in the AWS deployment. This includes checking:

      - Credential discovery vulnerabilities (passwords in descriptions, etc.)
      - Kerberos attack vectors (AS-REP roasting, Kerberoasting)
      - Network misconfigurations (SMB signing, LLMNR/NBT-NS)
      - Delegation configurations (unconstrained, constrained, RBCD)
      - MSSQL configurations and impersonation
      - ADCS misconfigurations (ESC1-15)
      - ACL permission chains
      - Domain trust relationships
      - Service configurations (IIS, Print Spooler, etc.)

      Options:
        ENV=<env>            Environment to target (default: dev)
        VERBOSE=true         Enable verbose output with debug information
        OUTPUT=<path>        Custom output file path for JSON results
        REGION=<region>      AWS region (default: us-west-1)
        FAIL_ON_ERROR=false  Don't exit with error on failed checks (useful for initial validation)

      Examples:
        task validate-vulns                                    # Validate dev environment
        task validate-vulns ENV=staging                        # Validate staging environment
        task validate-vulns VERBOSE=true                       # Enable verbose output
        task validate-vulns OUTPUT=/tmp/results.json           # Custom output path
        task validate-vulns ENV=staging FAIL_ON_ERROR=false    # Initial validation, don't fail on errors
        task validate-vulns ENV=prod VERBOSE=true              # Validate prod with verbose output

      Output:
        - Console output with color-coded results (✓/✗/⚠)
        - JSON report file with detailed findings
        - Exit code 0 if all checks pass, 1 if any fail

      For details on expected vulnerabilities, see:
        docs/GOAD-vulnerabilities-comprehensive.md
    vars:
      VERBOSE: '{{.VERBOSE | default "false"}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
      REGION: '{{.REGION | default "us-west-1"}}'
      FAIL_ON_ERROR: '{{.FAIL_ON_ERROR | default "true"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        export ENV={{.ENV}}
        export REGION={{.REGION}}
        export INVENTORY_FILE={{.INVENTORY_FILE}}
        export VERBOSE={{.VERBOSE}}
        export FAIL_ON_ERROR={{.FAIL_ON_ERROR}}
        {{if .OUTPUT}}export OUTPUT_FILE={{.OUTPUT}}{{end}}
        ./scripts/validate-goad-vulns.sh

  validate-vulns-quick:
    desc: Quick validation of critical GOAD vulnerabilities (subset of full validation)
    summary: |
      Performs a quick validation of the most critical GOAD vulnerabilities:
      - User accounts exist in all domains
      - Key services are running (MSSQL, IIS, ADCS)
      - SMB signing configuration
      - Domain trusts

      This is a faster alternative to 'validate-vulns' for quick sanity checks.

      Options:
        ENV=<env>            Environment to target (default: dev)
        VERBOSE=true         Enable verbose output

      Example:
        task validate-vulns-quick
        task validate-vulns-quick ENV=staging
    vars:
      VERBOSE: '{{.VERBOSE | default "false"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        export ENV={{.ENV}}
        export INVENTORY_FILE={{.INVENTORY_FILE}}
        export VERBOSE={{.VERBOSE}}
        export QUICK_MODE=true
        ./scripts/validate-goad-vulns.sh
