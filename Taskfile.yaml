---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

includes:
  aws:
    taskfile: https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/aws/Taskfile.yaml

# Global variables used across multiple tasks
vars:
  ENV: '{{.ENV | default "dev"}}'
  # Define all available playbooks
  GOAD_PLAYBOOKS: 'build.yml ad-servers.yml ad-parent_domain.yml ad-child_domain.yml ad-members.yml ad-trusts.yml ad-data.yml ad-gmsa.yml laps.yml ad-relations.yml adcs.yml ad-acl.yml servers.yml security.yml vulnerabilities.yml'
  INVENTORY_FILE: './{{.ENV}}-inventory'
  LOG_DATE: '{{now | date "20060102_150405"}}'
  LOG_FILE: 'ad_deployment_{{.LOG_DATE}}.log'
  MAX_RETRIES: '{{.MAX_RETRIES | default "3"}}'
  RETRY_DELAY: '{{.RETRY_DELAY | default "30"}}'
  VERBOSE: '{{.VERBOSE | default "false"}}'
  VERBOSE_FLAG: '{{if eq .VERBOSE "true"}}-vvv{{else}}{{end}}'

# Main tasks
tasks:
  default:
    desc: Show available tasks and help information
    cmds:
      - task --list
    silent: true

  list-plays:
    desc: Show all available playbooks that can be executed
    cmds:
      - |
        echo "Available playbooks:"
        for playbook in {{.GOAD_PLAYBOOKS}}; do
          echo "  - $playbook"
        done
        echo ""
        echo "Usage examples:"
        echo "  Run all playbooks: task provision"
        echo "  Run specific playbooks: task provision PLAYS=\"build.yml ad-servers.yml\""
        echo "  Run a single playbook: task provision PLAYS=ad-data.yml"
    silent: true

  provision:
    desc: Run the DreadGOAD provisioning process with error handling and retries
    summary: |
      Runs the complete AD provisioning process with DreadGOAD Ansible playbooks
      using AWS Systems Manager (SSM).
      
      Options:
        ENV=<env>          Environment to target (default: dev)
        VERBOSE=true       Enable verbose Ansible output
        MAX_RETRIES=<n>    Maximum retry attempts (default: 3)
        RETRY_DELAY=<s>    Delay between retries in seconds (default: 30)
        PLAYS="play1.yml play2.yml"  Specific playbooks to run (default: all playbooks)
      
      Examples: 
        task provision ENV=prod VERBOSE=true
        task provision PLAYS="build.yml ad-servers.yml"
        task provision PLAYS=ad-data.yml ENV=test
        
      To see all available playbooks:
        task list-plays
    vars:
      PLAYS: '{{.PLAYS | default .GOAD_PLAYBOOKS}}'
    cmds:
      - |
        # Start the log file with basic information
        {
          echo "==============================================="
          echo "DreadGOAD provisioning process started at $(date)"
          echo "Environment: {{.ENV}}"
          echo "Max Retries: {{.MAX_RETRIES}}"
          echo "==============================================="
          
          echo "Playbooks to be executed:"
          for playbook in {{.PLAYS}}; do
            echo "  - ansible/$playbook"
          done
          echo "-----------------------------------------------"
        } | tee "{{.LOG_FILE}}"
      - mkdir -p $(dirname "{{.LOG_FILE}}")
      - |
        # Function to run a playbook with retry
        run_playbook_with_retry() {
          local playbook=$1
          local retry_count=0
          local success=false
          local error_type=""
          local temp_log="/tmp/ansible_temp_$(date +%s)_$RANDOM.log"
          
          while [ $retry_count -lt {{.MAX_RETRIES}} ] && [ "$success" = "false" ]; do
            if [ $retry_count -gt 0 ]; then
              echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retry attempt $retry_count for ansible/$playbook..."
              echo "Waiting {{.RETRY_DELAY}} seconds before retrying..."
              sleep {{.RETRY_DELAY}}
            fi
            
            echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Starting ansible/$playbook..."
            true > "$temp_log"
            
            # Run Ansible playbook and capture output to temp file first
            ANSIBLE_HOST_KEY_CHECKING=False ANSIBLE_RETRY_FILES_ENABLED=True \
            ANSIBLE_GATHER_TIMEOUT=60 ANSIBLE_ANY_ERRORS_FATAL=True \
            ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
            -e "ansible_facts_gathering_timeout=60" \
            "ansible/$playbook" > "$temp_log" 2>&1
            result=$?
            
            # Display the output and append to log
            cat "$temp_log" | tee -a "{{.LOG_FILE}}"
            
            # Enhanced error detection in PLAY RECAP even if exit code is 0
            if [ $result -eq 0 ] && (grep -q "failed=[1-9]" "$temp_log" || grep -q "unreachable=[1-9]" "$temp_log"); then
              echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected failures in PLAY RECAP despite zero exit code" | tee -a "{{.LOG_FILE}}"
              result=1
            fi
            
            # Enhanced detection for task failure even if PLAY RECAP doesn't show it
            if [ $result -eq 0 ] && (grep -q "fatal:" "$temp_log" || grep -q "FAILED!" "$temp_log"); then
              echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected task failures despite zero exit code" | tee -a "{{.LOG_FILE}}"
              result=1
            fi
            
            if [ $result -eq 0 ]; then
              success=true
              echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Completed ansible/$playbook successfully." | tee -a "{{.LOG_FILE}}"
            else
              # Enhanced error pattern detection with more specific patterns
              # Use -l option with grep to include line numbers for debugging
              if grep -l -E "FAILED! => .* setup|MODULE FAILURE|Invalid control character|failed to execute setup|UNREACHABLE! => .*setup" "$temp_log"; then
                error_type="fact_gathering"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected fact gathering issues." | tee -a "{{.LOG_FILE}}"
              elif grep -l -E "No MSFT_NetAdapter objects found|network adapter|Ethernet" "$temp_log"; then
                error_type="network_adapter"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected network adapter configuration issues." | tee -a "{{.LOG_FILE}}"
              elif grep -l -E "failed to transfer file|403|Connection refused|timeout|UNREACHABLE!" "$temp_log"; then
                error_type="connection_error"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected connection/transfer errors." | tee -a "{{.LOG_FILE}}"
              elif grep -l -E "Windows PowerShell is in NonInteractive mode|cannot be loaded because running scripts is disabled" "$temp_log"; then
                error_type="powershell_interactive"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected PowerShell interactive mode error." | tee -a "{{.LOG_FILE}}"
              elif grep -l -E "Invalid IP address.*i-[0-9a-f]|Unable to resolve host|SSM|aws:runPowerShellScript" "$temp_log"; then
                error_type="ssm_ip_error"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected SSM IP address error." | tee -a "{{.LOG_FILE}}"
              elif grep -l -E "JSON|json|Invalid character|parsing error" "$temp_log"; then
                error_type="json_parsing"
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected JSON parsing error." | tee -a "{{.LOG_FILE}}"
              else
                # If no specific pattern matched, check for common error words
                if grep -l -E "error|failed|fatal|unreachable" "$temp_log"; then
                  error_type="general_error"
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected general error." | tee -a "{{.LOG_FILE}}"
                else
                  error_type="unknown"
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Unknown error occurred." | tee -a "{{.LOG_FILE}}"
                fi
              fi
              
              echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Error type detected: $error_type. Applying specific fix..." | tee -a "{{.LOG_FILE}}"
              
              # Apply error-specific fixes
              case "$error_type" in
                fact_gathering)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with modified fact gathering settings..." | tee -a "{{.LOG_FILE}}"
                  ANSIBLE_GATHERING=explicit ANSIBLE_HOST_KEY_CHECKING=False \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  --forks=1 \
                  -e "ansible_facts_gathering_timeout=120" \
                  -e "gather_timeout=120" \
                  -e "ansible_python_interpreter=/usr/bin/python3" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                network_adapter)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with network adapter fix..." | tee -a "{{.LOG_FILE}}"
                  ANSIBLE_HOST_KEY_CHECKING=False \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  -e "skip_network_adapter_config=true" \
                  -e "bypass_ethernet3_check=true" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                connection_error)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with increased connection timeout..." | tee -a "{{.LOG_FILE}}"
                  # Wait longer for SSM to establish connections
                  sleep 90
                  ANSIBLE_HOST_KEY_CHECKING=False ANSIBLE_TIMEOUT=300 \
                  ANSIBLE_CONNECTION_TIMEOUT=300 ANSIBLE_CONNECT_RETRY_TIMEOUT=60 \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  -e "ansible_connection_timeout=300" \
                  -e "ansible_timeout=300" \
                  -e "ansible_ssh_retries=10" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                powershell_interactive)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with PowerShell interactive mode fix..." | tee -a "{{.LOG_FILE}}"
                  ANSIBLE_HOST_KEY_CHECKING=False \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  -e "ansible_shell_type=powershell" \
                  -e "force_ps_module=true" \
                  -e "ansible_ps_version=5.1" \
                  -e "ansible_shell_allow_executable=true" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                ssm_ip_error)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with SSM IP fix..." | tee -a "{{.LOG_FILE}}"
                  # Give SSM more time to resolve IPs
                  sleep 120
                  ANSIBLE_HOST_KEY_CHECKING=False \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  -e "wait_for_ssm_ready=true" \
                  -e "ansible_host_name_check=true" \
                  -e "use_instance_ids=true" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                json_parsing)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with JSON parsing fixes..." | tee -a "{{.LOG_FILE}}"
                  ANSIBLE_INVALID_CHARACTERS_REPLACE_WITH="_" \
                  ANSIBLE_GATHERING=smart \
                  ANSIBLE_GATHER_SUBSET=min \
                  ANSIBLE_HOST_KEY_CHECKING=False \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  -e "ansible_facts_gathering_timeout=120" \
                  -e "gather_subset=min" \
                  -e "handle_special_chars=true" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
                general_error|unknown)
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Retrying with general robust settings..." | tee -a "{{.LOG_FILE}}"
                  # Wait a bit longer for potential transient issues
                  sleep 60
                  ANSIBLE_HOST_KEY_CHECKING=False ANSIBLE_RETRY_FILES_ENABLED=True \
                  ANSIBLE_SSH_RETRIES=10 ANSIBLE_TIMEOUT=180 \
                  ANSIBLE_GATHERING=smart ANSIBLE_GATHER_SUBSET=min \
                  ANSIBLE_ANY_ERRORS_FATAL=True \
                  ansible-playbook {{.VERBOSE_FLAG}} -i {{.ENV}}-inventory \
                  --forks=1 \
                  -e "ansible_connection_timeout=180" \
                  -e "retry_on_error=true" \
                  "ansible/$playbook" > "$temp_log" 2>&1
                  ;;
              esac
              
              # Display the retry output and append to log
              cat "$temp_log" | tee -a "{{.LOG_FILE}}"
              retry_result=$?
              
              # Enhanced detection for post-retry failures
              if [ $retry_result -eq 0 ] && (grep -q "failed=[1-9]" "$temp_log" || grep -q "unreachable=[1-9]" "$temp_log"); then
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected failures in PLAY RECAP despite zero exit code after retry" | tee -a "{{.LOG_FILE}}"
                retry_result=1
              fi
              
              # Check for task failures even if PLAY RECAP is clean
              if [ $retry_result -eq 0 ] && (grep -q "fatal:" "$temp_log" || grep -q "FAILED!" "$temp_log"); then
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Detected task failures despite zero exit code after retry" | tee -a "{{.LOG_FILE}}"
                retry_result=1
              fi
              
              if [ $retry_result -eq 0 ]; then
                success=true
                echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Completed ansible/$playbook successfully after error-specific retry." | tee -a "{{.LOG_FILE}}"
              else
                retry_count=$((retry_count + 1))
                if [ $retry_count -lt {{.MAX_RETRIES}} ]; then
                  echo "[$(date +%Y-%m-%d\ %H:%M:%S)] WARNING: ansible/$playbook failed with exit code $retry_result. Retrying ($retry_count/{{.MAX_RETRIES}})..." | tee -a "{{.LOG_FILE}}"
                else
                  # Try one last approach with most aggressive settings if all other retries failed
                  if [ $retry_count -eq {{.MAX_RETRIES}} ]; then
                    echo "[$(date +%Y-%m-%d\ %H:%M:%S)] FINAL ATTEMPT: Using most aggressive retry settings..." | tee -a "{{.LOG_FILE}}"
                    
                    # Generate a list of working hosts from the temp log
                    grep "ok:" "$temp_log" | grep -v "ok: \[localhost\]" | awk '{print $2}' | tr -d '[]' > /tmp/working_hosts.txt
                    
                    if [ -s /tmp/working_hosts.txt ]; then
                      # Create a temporary hosts file with only working hosts
                      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Attempting to run with only working hosts..." | tee -a "{{.LOG_FILE}}"
                      temp_inventory="/tmp/temp_inventory_$(date +%s)"
                      cp {{.ENV}}-inventory "$temp_inventory"
                      
                      # Run only against hosts that were previously successful
                      ANSIBLE_HOST_KEY_CHECKING=False ANSIBLE_RETRY_FILES_ENABLED=True \
                      ANSIBLE_GATHER_TIMEOUT=180 ANSIBLE_GATHERING=explicit \
                      ansible-playbook {{.VERBOSE_FLAG}} -i "$temp_inventory" \
                      --limit @/tmp/working_hosts.txt \
                      -e "ansible_facts_gathering_timeout=180" \
                      -e "skip_unreachable=true" \
                      "ansible/$playbook" > "$temp_log" 2>&1
                      
                      # Display output and append to log
                      cat "$temp_log" | tee -a "{{.LOG_FILE}}"
                      final_result=$?
                      
                      if [ $final_result -eq 0 ]; then
                        echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Partial success: Playbook completed for working hosts only." | tee -a "{{.LOG_FILE}}"
                        success=true
                      else
                        echo "[$(date +%Y-%m-%d\ %H:%M:%S)] ERROR: ansible/$playbook failed even with only working hosts." | tee -a "{{.LOG_FILE}}"
                      fi
                    else
                      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] ERROR: Could not identify any working hosts from previous run." | tee -a "{{.LOG_FILE}}"
                    fi
                    
                    # Delete temporary files
                    rm -f /tmp/working_hosts.txt "$temp_inventory" 2>/dev/null
                    
                    if [ "$success" = "false" ]; then
                      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] ERROR: ansible/$playbook failed with exit code $retry_result after all attempts. Stopping execution." | tee -a "{{.LOG_FILE}}"
                      echo "===============================================" | tee -a "{{.LOG_FILE}}"
                      echo "Playbook execution failed at $(date)" | tee -a "{{.LOG_FILE}}"
                      echo "===============================================" | tee -a "{{.LOG_FILE}}"
                      return 1
                    fi
                  fi
                fi
              fi
            fi
          done
          
          if [ "$success" = "true" ]; then
            return 0
          else
            return 1
          fi
        }
        
        # Execute selected playbooks
        for playbook in {{.PLAYS}}; do
          if ! run_playbook_with_retry "$playbook"; then
            echo "Playbook execution failed after all retry attempts. Exiting." | tee -a "{{.LOG_FILE}}"
            exit 1
          fi
          echo "-----------------------------------------------" | tee -a "{{.LOG_FILE}}"
        done
        
        echo "===============================================" | tee -a "{{.LOG_FILE}}"
        echo "All selected playbooks completed successfully at $(date)" | tee -a "{{.LOG_FILE}}"
        echo "Full log available at: {{.LOG_FILE}}" | tee -a "{{.LOG_FILE}}"
        echo "===============================================" | tee -a "{{.LOG_FILE}}"

  get-files:
    desc: Display content of files related to specific playbooks
    summary: |
      Displays the content of files related to a specific Ansible playbook
      
      Options:
        ENV=<env>            Environment to target (default: dev)
        PLAYBOOK=<playbook>  Playbook to get files for
      
      Example: task get-files PLAYBOOK=security
    cmds:
      - |
        if [ -z "{{.PLAYBOOK}}" ]; then
          echo "Please specify a playbook to get files for."
          echo "Usage: task get-files PLAYBOOK=<playbook>"
          echo ""
          echo "Available playbooks:"
          echo "  build, ad-servers, ad-parent-domain, ad-child-domain,"
          echo "  ad-members, ad-trusts, ad-data, ad-gmsa, laps,"
          echo "  ad-relations, adcs, ad-acl, servers, security, vulnerabilities"
          exit 1
        fi
        
        case "{{.PLAYBOOK}}" in
          build)
            files=( 
              "ansible/build.yml"
              "ansible/roles/common/tasks/main.yml"
              "ansible/roles/settings/keyboard/tasks/main.yml"
              "ansible/roles/settings/no_updates/tasks/main.yml"
              "ansible/roles/settings/updates/tasks/default.yml"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-servers)
            files=(
              "ansible/ad-servers.yml"
              "ansible/roles/settings/admin_password/tasks/main.yml"
              "ansible/roles/settings/hostname/tasks/main.yml"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-parent-domain)
            files=(
              "ansible/ad-parent_domain.yml"
              "ansible/roles/domain_controller/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-child-domain)
            files=(
              "ansible/ad-child_domain.yml"
              "ansible/roles/child_domain/tasks/main.yml"
              "ansible/roles/dns_conditional_forwarder/tasks/main.yml"
              "ansible/roles/parent_child_dns/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-members)
            files=(
              "ansible/ad-members.yml"
              "ansible/roles/member_server/tasks/main.yml"
              "ansible/roles/commonwkstn/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-trusts)
            files=(
              "ansible/ad-trusts.yml"
              "ansible/roles/settings/disable_nat_adapter/tasks/main.yml"
              "ansible/roles/dns_conditional_forwarder/tasks/main.yml"
              "ansible/roles/trusts/tasks/main.yml"
              "ansible/roles/settings/enable_nat_adapter/tasks/main.yml"
              "ansible/roles/dc_dns_conditional_forwarder/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-data)
            files=(
              "ansible/ad-data.yml"
              "ansible/roles/password_policy/tasks/main.yml"
              "ansible/roles/ad/tasks/main.yml"
              "ansible/roles/ad/tasks/users.yml"
              "ansible/roles/ad/tasks/groups.yml"
              "ansible/roles/ad/tasks/ou.yml"
              "ansible/roles/settings/copy_files/tasks/main.yml"
              "ansible/roles/move_to_ou/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-gmsa)
            files=(
              "ansible/ad-gmsa.yml"
              "ansible/roles/gmsa/tasks/main.yml"
              "ansible/roles/gmsa_hosts/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          laps)
            files=(
              "ansible/laps.yml"
              "ansible/roles/laps/dc/tasks/main.yml"
              "ansible/roles/laps/dc/vars/main.yml"
              "ansible/roles/laps/dc/tasks/move_server_to_ou.yml"
              "ansible/roles/laps/dc/tasks/install.yml"
              "ansible/roles/laps/dc/defaults/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-relations)
            files=(
              "ansible/ad-relations.yml"
              "ansible/roles/settings/adjust_rights/tasks/main.yml"
              "ansible/roles/settings/user_rights/tasks/main.yml"
              "ansible/roles/groups_domains/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          adcs)
            files=(
              "ansible/adcs.yml"
              "ansible/roles/adcs/tasks/main.yml"
              "ansible/roles/adcs_templates/tasks/main.yml"
              "ansible/roles/adcs_templates/files/ESC1.json"
              "ansible/roles/adcs_templates/files/ESC2.json"
              "ansible/roles/adcs_templates/files/ESC3-CRA.json"
              "ansible/roles/adcs_templates/files/ESC3.json"
              "ansible/roles/adcs_templates/files/ESC4.json"
              "ansible/roles/adcs_templates/files/ADCSTemplate/ADCSTemplate.psd1"
              "ansible/roles/adcs_templates/files/ADCSTemplate/DSCResources/COMMUNITY_ADCSTemplate/COMMUNITY_ADCSTemplate.psm1"
              "ansible/roles/adcs_templates/files/ADCSTemplate/DSCResources/COMMUNITY_ADCSTemplate/COMMUNITY_ADCSTemplate.schema.mof"
              "ansible/roles/adcs_templates/files/ADCSTemplate/ADCSTemplate.psm1"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          ad-acl)
            files=(
              "ansible/ad-acl.yml"
              "ansible/roles/acl/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          servers)
            files=(
              "ansible/servers.yml"
              "ansible/roles/iis/tasks/main.yml"
              "ansible/roles/iis/files/index.html"
              "ansible/roles/mssql/tasks/main.yml"
              "ansible/roles/mssql/defaults/main.yml"
              "ansible/roles/mssql/files/sql_conf.ini.MSSQL_2019.j2"
              "ansible/roles/mssql/files/sql_conf.ini.MSSQL_2022.j2"
              "ansible/roles/mssql_link/tasks/main.yml"
              "ansible/roles/mssql_link/tasks/logins.yml"
              "ansible/roles/mssql_ssms/tasks/main.yml"
              "ansible/roles/webdav/tasks/main.yml"
              "{{.ENV}}-inventory"
              "ad/GOAD/data/{{.ENV}}-config.json"
              "ansible/data.yml"
            )
            ;;
          security)
            files=(
              "ansible/security.yml"
              "ansible/roles/settings/windows_defender/tasks/main.yml"
              "ansible/roles/security/account_is_sensitive/tasks/main.yml"
