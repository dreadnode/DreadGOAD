---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

includes:
  aws:
    taskfile: https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/aws/Taskfile.yaml

vars:
  ENV: '{{.ENV | default "dev"}}'
  # List of all available playbooks in order of execution
  GOAD_PLAYBOOKS: 'build.yml ad-servers.yml ad-parent_domain.yml ad-child_domain.yml ad-members.yml ad-trusts.yml ad-data.yml ad-gmsa.yml laps.yml ad-relations.yml adcs.yml ad-acl.yml servers.yml security.yml vulnerabilities.yml'
  INVENTORY_FILE: './{{.ENV}}-inventory'
  LOG_DATE: '{{now | date "20060102_150405"}}'
  LOG_DIR: '$HOME/.ansible/logs/goad'
  LOG_FILE: '$HOME/.ansible/logs/goad/{{.ENV}}-dreadgoad-{{.LOG_DATE}}.log'
  MAX_RETRIES: '{{.MAX_RETRIES | default "3"}}'
  RETRY_DELAY: '{{.RETRY_DELAY | default "30"}}'
  # Playbooks that may trigger reboots (tracked for logging purposes only)
  REBOOT_PLAYBOOKS: 'ad-parent_domain.yml ad-child_domain.yml ad-members.yml ad-trusts.yml'
  DEBUG: '{{.DEBUG | default "false"}}'
  VERBOSE_FLAG: '{{if eq .DEBUG "true"}}-vvv{{else}}{{end}}'

env:
  ANSIBLE_CONFIG: './ansible.cfg'
  ANSIBLE_CACHE_PLUGIN_CONNECTION: '$HOME/.ansible/cache/{{.ENV}}_dreadgoad_facts'
  ANSIBLE_HOST_KEY_CHECKING: 'False'
  ANSIBLE_RETRY_FILES_ENABLED: 'True'
  ANSIBLE_GATHER_TIMEOUT: '60'

set:
  - pipefail

tasks:
  default:
    desc: Show available tasks and help information
    cmds:
      - task --list
    silent: true

  list-plays:
    desc: Show all available playbooks that can be executed
    cmds:
      - |
        echo "Available playbooks:"
        for playbook in $(echo '{{.GOAD_PLAYBOOKS}}' | tr '\n' ' '); do
          echo "  - $playbook"
        done
        echo ""
        echo "Usage examples:"
        echo "  Run all playbooks: task provision"
        echo "  Run specific playbooks: task provision PLAYS=\"build.yml ad-servers.yml\""
        echo "  Run a single playbook: task provision PLAYS=ad-data.yml"
    silent: true

  provision:
    desc: Run the DreadGOAD provisioning process with error handling and retries
    summary: |
      Runs the complete AD provisioning process with DreadGOAD Ansible playbooks
      using AWS Systems Manager (SSM).

      Options:
        ENV=<env>          Environment to target (default: dev)
        DEBUG=true         Enable verbose Ansible output (-vvv)
        MAX_RETRIES=<n>    Maximum retry attempts (default: 3)
        RETRY_DELAY=<s>    Delay between retries in seconds (default: 30)
        PLAYS="play1.yml play2.yml"  Specific playbooks to run (default: all playbooks)
        LIMIT=<hosts>      Limit execution to specific hosts (e.g., srv03, dc01)

      Examples:
        task provision ENV=prod DEBUG=true
        task provision ENV=staging PLAYS="build.yml ad-servers.yml"
        task provision ENV=dev PLAYS=ad-data.yml
        task provision PLAYS=laps.yml LIMIT=srv03
        task provision LIMIT="dc01,srv03" PLAYS="ad-members.yml laps.yml"

      To see all available playbooks:
        task list-plays
    vars:
      PLAYS: '{{.PLAYS | default .GOAD_PLAYBOOKS}}'
      LIMIT: '{{.LIMIT | default ""}}'
      # Generate log file name once for this provision run
      PROVISION_LOG_FILE: '$HOME/.ansible/logs/goad/{{.ENV}}-dreadgoad-{{now | date "20060102_150405"}}.log'
    deps:
      - ssm:cleanup
      - ensure-log-dir
      - generate-mapping
      - prepare-adcs-zips
    cmds:
      - task: log-provision-header
        vars:
          PLAYS: '{{.PLAYS}}'
          LIMIT: '{{.LIMIT}}'
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'
      - for: {var: PLAYS, split: ' '}
        task: run-playbook-with-retry
        vars:
          PLAYBOOK: '{{.ITEM}}'
          LIMIT: '{{.LIMIT}}'
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'
      - task: log-provision-success
        vars:
          LOG_FILE: '{{.PROVISION_LOG_FILE}}'

  ad-users:
    desc: Ensure Active Directory users exist using the ad-data.yml playbook
    summary: |
      Runs the ad-data.yml Ansible playbook to create users in Active Directory.

      Options:
        ENV=<env>          Environment to target (default: dev)
        DEBUG=true         Enable verbose Ansible output (-vvv)
        MAX_RETRIES=<n>    Maximum retry attempts (default: 3)
        RETRY_DELAY=<s>    Delay between retries in seconds (default: 30)
        LIMIT=<hosts>      Limit execution to specific hosts (e.g., dc01, dc02)

      Examples:
        task ad-users
        task ad-users ENV=prod
        task ad-users DEBUG=true
        task ad-users LIMIT=dc01
    cmds:
      - task: provision
        vars:
          PLAYS: 'ad-data.yml'

  ensure-log-dir:
    internal: true
    cmds:
      - mkdir -p {{.LOG_DIR}}
    status:
      - test -d {{.LOG_DIR}}

  prepare-adcs-zips:
    desc: Create ADCSTemplate.zip files for ADCS roles
    internal: true
    cmds:
      - cd roles/adcs_templates/files && zip -r ADCSTemplate.zip ADCSTemplate/
      - cd roles/vulns_adcs_templates/files && zip -r ADCSTemplate.zip ADCSTemplate/
    status:
      - test -f roles/adcs_templates/files/ADCSTemplate.zip
      - test -f roles/vulns_adcs_templates/files/ADCSTemplate.zip

  log-provision-header:
    internal: true
    requires:
      vars: [PLAYS]
    cmds:
      - |
        {
          echo "==============================================="
          echo "DreadGOAD provisioning process started at $(date)"
          echo "Environment: {{.ENV}}"
          echo "Max Retries: {{.MAX_RETRIES}}"
          {{if .LIMIT}}echo "Limited to hosts: {{.LIMIT}}"{{end}}
          echo "==============================================="
          echo ""
          echo "Playbooks to be executed:"
          for playbook in $(echo '{{.PLAYS}}' | tr '\n' ' '); do
            echo "  - playbooks/$playbook"
          done
          echo "-----------------------------------------------"
        } | tee "{{.LOG_FILE}}"

  log-provision-success:
    internal: true
    cmds:
      - |
        {
          echo "==============================================="
          echo "All selected playbooks completed successfully at $(date)"
          echo "Full log available at: {{.LOG_FILE}}"
          echo "==============================================="
        } | tee -a "{{.LOG_FILE}}"

  run-playbook-with-retry:
    internal: true
    requires:
      vars: [PLAYBOOK]
    cmds:
      - PLAYBOOK={{.PLAYBOOK}} ENV={{.ENV}} LOG_FILE={{.LOG_FILE}} MAX_RETRIES={{.MAX_RETRIES}} RETRY_DELAY={{.RETRY_DELAY}} VERBOSE_FLAG={{.VERBOSE_FLAG}} LIMIT={{.LIMIT}} ./scripts/run-playbook-with-retry.sh

  get-files:
    desc: Display content of files related to specific playbooks
    summary: |
      Displays the content of files related to a specific Ansible playbook

      Options:
        ENV=<env>            Environment to target (default: dev)
        PLAYBOOK=<playbook>  Playbook to get files for

      Example: task get-files PLAYBOOK=security
    cmds:
      - PLAYBOOK={{.PLAYBOOK}} ENV={{.ENV}} ./scripts/get-playbook-files.sh

  generate-mapping:
    desc: Generate AWS instance-to-IP mapping file for Ansible optimization
    summary: |
      Queries AWS EC2 for instance private IPs and creates a mapping file
      that Ansible uses to skip network detection, speeding up playbook execution.

      Options:
        ENV=<env>            Environment to target (default: dev)
        INVENTORY=<path>     Path to inventory file (default: ./<env>-inventory)
        OUTPUT=<path>        Output file path (default: /tmp/aws_instance_mapping_<env>.json)

      Examples:
        task generate-mapping                     # Generate mapping for dev environment
        task generate-mapping ENV=prod            # Generate mapping for prod environment
        task generate-mapping OUTPUT=/tmp/my-mapping.json  # Use custom output path
    deps:
      - update-inventory
    vars:
      INVENTORY: '{{.INVENTORY | default (print "./" .ENV "-inventory")}}'
      OUTPUT: '{{.OUTPUT | default (print "/tmp/aws_instance_mapping_" .ENV ".json")}}'
    run: always
    cmds:
      - ./scripts/generate-instance-mapping.sh "{{.INVENTORY}}" "{{.OUTPUT}}"

  update-inventory:
    desc: Synchronize Ansible inventory with AWS instance IDs of running EC2 instances and update environment value
    summary: |
      Retrieves instance IDs from AWS and updates the environment-specific
      Ansible inventory file (default: dev) with the latest instance mappings.
      Also updates the "env=" field in the inventory to match the specified ENV parameter.

      Options:
        ENV=<env>            Environment to target (default: dev)
        INVENTORY=<path>     Path to inventory file (default: ./<env>-inventory)
        OUTPUT=<path>        Output file path (default: overwrite inventory file)
        BACKUP=<bool>        Create backup before modifying (default: false)
        JSON=<path>          Path to JSON file with instances data

      Examples:
        task update-inventory                     # Update dev inventory with current AWS instances
        task update-inventory ENV=prod            # Update prod inventory and set env=prod in the file
        task update-inventory BACKUP=true         # Create backup before updating
        task update-inventory OUTPUT=new-inventory # Write to new file instead of updating original
    vars:
      INVENTORY: '{{.INVENTORY | default (print "./" .ENV "-inventory")}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
      BACKUP: '{{.BACKUP | default "false"}}'
      JSON: '{{.JSON | default ""}}'
      BACKUP_FILE: '{{.INVENTORY}}.bak.{{now | date "20060102150405"}}'
    run: always
    cmds:
      - ENV={{.ENV}} INVENTORY={{.INVENTORY}} OUTPUT={{.OUTPUT}} BACKUP={{.BACKUP}} BACKUP_FILE={{.BACKUP_FILE}} JSON={{.JSON}} ./scripts/update-inventory.sh

  validate-vulns:
    desc: Validate GOAD vulnerability configurations against documented specifications
    summary: |
      Validates that all GOAD vulnerabilities documented in docs/GOAD-vulnerabilities-comprehensive.md
      are properly configured in the AWS deployment. This includes checking:

      - Credential discovery vulnerabilities (passwords in descriptions, etc.)
      - Kerberos attack vectors (AS-REP roasting, Kerberoasting)
      - Network misconfigurations (SMB signing, LLMNR/NBT-NS)
      - Delegation configurations (unconstrained, constrained, RBCD)
      - MSSQL configurations and impersonation
      - ADCS misconfigurations (ESC1-15)
      - ACL permission chains
      - Domain trust relationships
      - Service configurations (IIS, Print Spooler, etc.)

      Options:
        ENV=<env>            Environment to target (default: dev)
        VERBOSE=true         Enable verbose output with debug information
        OUTPUT=<path>        Custom output file path for JSON results
        REGION=<region>      AWS region (default: us-west-1)
        FAIL_ON_ERROR=false  Don't exit with error on failed checks (useful for initial validation)

      Examples:
        task validate-vulns                                    # Validate dev environment
        task validate-vulns ENV=staging                        # Validate staging environment
        task validate-vulns VERBOSE=true                       # Enable verbose output
        task validate-vulns OUTPUT=/tmp/results.json           # Custom output path
        task validate-vulns ENV=staging FAIL_ON_ERROR=false    # Initial validation, don't fail on errors
        task validate-vulns ENV=prod VERBOSE=true              # Validate prod with verbose output

      Output:
        - Console output with color-coded results (✓/✗/⚠)
        - JSON report file with detailed findings
        - Exit code 0 if all checks pass, 1 if any fail

      For details on expected vulnerabilities, see:
        docs/GOAD-vulnerabilities-comprehensive.md
    vars:
      VERBOSE: '{{.VERBOSE | default "false"}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
      REGION: '{{.REGION | default "us-west-1"}}'
      FAIL_ON_ERROR: '{{.FAIL_ON_ERROR | default "true"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        export ENV={{.ENV}}
        export REGION={{.REGION}}
        export INVENTORY_FILE={{.INVENTORY_FILE}}
        export VERBOSE={{.VERBOSE}}
        export FAIL_ON_ERROR={{.FAIL_ON_ERROR}}
        {{if .OUTPUT}}export OUTPUT_FILE={{.OUTPUT}}{{end}}
        ./scripts/validate-goad-vulns.sh

  ssm:cleanup:
    desc: Clean up stale SSM sessions to prevent connection saturation
    summary: |
      Terminates stale SSM sessions that may be blocking new connections.
      AWS SSM has concurrent session limits per instance, and orphaned sessions
      from hung/killed playbook runs can cause new connections to hang.

      Options:
        ENV=<env>            Environment to target (default: dev)
        MAX_AGE=<minutes>    Sessions older than this are considered stale (default: 30)
        DRY_RUN=true         Show what would be terminated without doing it

      Examples:
        task ssm:cleanup                    # Clean stale sessions for dev
        task ssm:cleanup ENV=prod           # Clean stale sessions for prod
        task ssm:cleanup MAX_AGE=15         # More aggressive cleanup (15 min)
        task ssm:cleanup DRY_RUN=true       # Preview what would be cleaned
    vars:
      MAX_AGE: '{{.MAX_AGE | default "30"}}'
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      REGION: '{{.REGION | default "us-west-2"}}'
    run: always
    silent: true
    cmds:
      - |
        set -e
        INVENTORY="./{{.ENV}}-inventory"

        # Extract instance IDs from inventory
        INSTANCE_IDS=$(grep -E 'ansible_host=i-[a-z0-9]+' "$INVENTORY" | sed -E 's/.*ansible_host=(i-[a-z0-9]+).*/\1/' | sort -u)

        if [ -z "$INSTANCE_IDS" ]; then
          echo "No instance IDs found in $INVENTORY"
          exit 0
        fi

        echo "Checking for stale SSM sessions (older than {{.MAX_AGE}} minutes)..."
        echo "Instances: $(echo $INSTANCE_IDS | tr '\n' ' ')"
        echo ""

        TOTAL_TERMINATED=0
        CUTOFF_TIME=$(date -u -v-{{.MAX_AGE}}M +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -d "{{.MAX_AGE}} minutes ago" +%Y-%m-%dT%H:%M:%S)

        for INSTANCE_ID in $INSTANCE_IDS; do
          # Get active sessions for this instance
          SESSIONS=$(aws ssm describe-sessions \
            --state Active \
            --region {{.REGION}} \
            --filters "key=Target,value=$INSTANCE_ID" \
            --query "Sessions[?StartDate<\`$CUTOFF_TIME\`].[SessionId,StartDate]" \
            --output text 2>/dev/null || true)

          if [ -n "$SESSIONS" ]; then
            echo "=== $INSTANCE_ID ==="
            while IFS=$'\t' read -r SESSION_ID START_DATE; do
              if [ -n "$SESSION_ID" ]; then
                if [ "{{.DRY_RUN}}" = "true" ]; then
                  echo "  [DRY RUN] Would terminate: $SESSION_ID (started: $START_DATE)"
                else
                  aws ssm terminate-session --session-id "$SESSION_ID" --region {{.REGION}} > /dev/null 2>&1 && \
                    echo "  Terminated: $SESSION_ID (started: $START_DATE)" && \
                    TOTAL_TERMINATED=$((TOTAL_TERMINATED + 1))
                fi
              fi
            done <<< "$SESSIONS"
          fi
        done

        echo ""
        if [ "{{.DRY_RUN}}" = "true" ]; then
          echo "Dry run complete. Use DRY_RUN=false to actually terminate sessions."
        else
          echo "Cleanup complete. Terminated $TOTAL_TERMINATED stale session(s)."
        fi

  ssm:status:
    desc: Show active SSM sessions for environment instances
    summary: |
      Displays all active SSM sessions for instances in the current environment.
      Useful for debugging connection issues or checking session state.

      Options:
        ENV=<env>            Environment to target (default: dev)

      Example:
        task ssm:status
        task ssm:status ENV=prod
    vars:
      REGION: '{{.REGION | default "us-west-2"}}'
    run: always
    silent: true
    cmds:
      - |
        set -e
        INVENTORY="./{{.ENV}}-inventory"

        # Extract instance IDs from inventory
        INSTANCE_IDS=$(grep -E 'ansible_host=i-[a-z0-9]+' "$INVENTORY" | sed -E 's/.*ansible_host=(i-[a-z0-9]+).*/\1/' | sort -u)

        echo "Active SSM sessions for {{.ENV}} environment:"
        echo ""

        for INSTANCE_ID in $INSTANCE_IDS; do
          HOST=$(grep "$INSTANCE_ID" "$INVENTORY" | awk '{print $1}' | head -1)
          SESSIONS=$(aws ssm describe-sessions \
            --state Active \
            --region {{.REGION}} \
            --filters "key=Target,value=$INSTANCE_ID" \
            --query 'Sessions[*].[SessionId,StartDate,Status]' \
            --output text 2>/dev/null || true)

          SESSION_COUNT=$(echo "$SESSIONS" | grep -c . 2>/dev/null || echo "0")
          if [ "$SESSION_COUNT" = "0" ] || [ -z "$SESSIONS" ]; then
            echo "[$HOST] $INSTANCE_ID: No active sessions"
          else
            echo "[$HOST] $INSTANCE_ID: $SESSION_COUNT active session(s)"
            echo "$SESSIONS" | while IFS=$'\t' read -r SID SDATE STATUS; do
              [ -n "$SID" ] && echo "  - $SID ($STATUS, started: $SDATE)"
            done
          fi
        done

  health-check:
    desc: Verify all GOAD instances are healthy (AD replication, trusts, DNS, services)
    summary: |
      Runs health checks across all GOAD instances via SSM to verify:
      - Domain controllers are responding
      - AD replication is working with no failures
      - Domain trusts are established
      - DNS resolution across domains
      - Member servers can reach their DCs
      - Critical services (IIS, MSSQL) are running

      Options:
        ENV=<env>            Environment to target (default: dev)
        REGION=<region>      AWS region (default: us-west-1)

      Examples:
        task health-check
        task health-check ENV=staging
        task health-check ENV=prod REGION=us-west-1
    vars:
      REGION: '{{.REGION | default "us-west-1"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        set -e
        echo "=== GOAD Health Check ({{.ENV}}) ==="
        echo ""

        # Get instance IDs with names
        INSTANCES=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=*{{.ENV}}*dreadgoad*" "Name=instance-state-name,Values=running" \
          --query 'Reservations[*].Instances[*].[InstanceId,Tags[?Key==`Name`].Value|[0]]' \
          --output text --region {{.REGION}})

        if [ -z "$INSTANCES" ]; then
          echo "ERROR: No running GOAD instances found for ENV={{.ENV}}"
          exit 1
        fi

        echo "Found instances:"
        echo "$INSTANCES" | while read -r ID NAME; do
          echo "  - $NAME ($ID)"
        done
        echo ""

        # Get DC instance IDs
        DC01_ID=$(echo "$INSTANCES" | grep -i dc01 | awk '{print $1}')
        DC02_ID=$(echo "$INSTANCES" | grep -i dc02 | awk '{print $1}')
        DC03_ID=$(echo "$INSTANCES" | grep -i dc03 | awk '{print $1}')
        SRV02_ID=$(echo "$INSTANCES" | grep -i srv02 | awk '{print $1}')
        SRV03_ID=$(echo "$INSTANCES" | grep -i srv03 | awk '{print $1}')

        # Check DC01 - Primary DC, replication, trusts
        echo "--- DC01 (kingslanding - sevenkingdoms.local) ---"
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$DC01_ID" \
          --document-name "AWS-RunPowerShellScript" \
          --parameters 'commands=["Get-ADDomainController -Filter * | Format-Table Name, Domain, IPv4Address, IsGlobalCatalog -AutoSize","Write-Host \"Trusts:\"; Get-ADTrust -Filter * | Format-Table Name, Direction, TrustType -AutoSize","Write-Host \"Replication:\"; repadmin /replsummary"]' \
          --region {{.REGION}} --query 'Command.CommandId' --output text)
        sleep 6
        aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$DC01_ID" --region {{.REGION}} \
          --query 'StandardOutputContent' --output text
        echo ""

        # Check DC02 - Child domain, DNS
        echo "--- DC02 (winterfell - north.sevenkingdoms.local) ---"
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$DC02_ID" \
          --document-name "AWS-RunPowerShellScript" \
          --parameters 'commands=["Get-ADDomainController -Filter * | Format-Table Name, Domain, IPv4Address -AutoSize","Write-Host \"DNS Test:\"; Resolve-DnsName kingslanding.sevenkingdoms.local -ErrorAction SilentlyContinue | Select Name, IPAddress","Resolve-DnsName meereen.essos.local -ErrorAction SilentlyContinue | Select Name, IPAddress"]' \
          --region {{.REGION}} --query 'Command.CommandId' --output text)
        sleep 6
        aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$DC02_ID" --region {{.REGION}} \
          --query 'StandardOutputContent' --output text
        echo ""

        # Check DC03 - Separate forest, forest trust
        echo "--- DC03 (meereen - essos.local) ---"
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$DC03_ID" \
          --document-name "AWS-RunPowerShellScript" \
          --parameters 'commands=["Get-ADDomainController -Filter * | Format-Table Name, Domain, IPv4Address -AutoSize","Write-Host \"Forest Trust:\"; Get-ADTrust -Filter * | Format-Table Name, Direction, TrustType, ForestTransitive -AutoSize"]' \
          --region {{.REGION}} --query 'Command.CommandId' --output text)
        sleep 6
        aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$DC03_ID" --region {{.REGION}} \
          --query 'StandardOutputContent' --output text
        echo ""

        # Check member servers
        echo "--- Member Servers (SRV02, SRV03) ---"
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$SRV02_ID" "$SRV03_ID" \
          --document-name "AWS-RunPowerShellScript" \
          --parameters 'commands=["Write-Host \"=== $env:COMPUTERNAME ===\"","Write-Host \"Domain: $(Get-WmiObject Win32_ComputerSystem | Select -Expand Domain)\"","nltest /dsgetdc: 2>&1 | Select-String -Pattern \"DC:|Address:\"","Get-Service -Name W3SVC,MSSQLSERVER -ErrorAction SilentlyContinue | Format-Table Name, Status -AutoSize"]' \
          --region {{.REGION}} --query 'Command.CommandId' --output text)
        sleep 8
        for SRV_ID in $SRV02_ID $SRV03_ID; do
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$SRV_ID" --region {{.REGION}} \
            --query 'StandardOutputContent' --output text 2>/dev/null || echo "Waiting for $SRV_ID..."
        done
        echo ""
        echo "=== Health Check Complete ==="

  ssm:run:
    desc: Run arbitrary PowerShell commands across GOAD instances via SSM
    summary: |
      Execute PowerShell commands on one or more GOAD instances using AWS SSM.

      Options:
        ENV=<env>            Environment to target (default: dev)
        REGION=<region>      AWS region (default: us-west-1)
        HOSTS=<hosts>        Comma-separated host names (dc01,dc02,srv02) or 'all' (default: all)
        CMD=<command>        PowerShell command to execute (required)

      Examples:
        task ssm:run CMD="Get-ADUser -Filter *"
        task ssm:run HOSTS=dc01 CMD="Get-ADDomainController -Filter *"
        task ssm:run HOSTS=dc01,dc02 CMD="Get-Service ADWS"
        task ssm:run HOSTS=srv02,srv03 CMD="Get-Service MSSQLSERVER"
        task ssm:run ENV=staging HOSTS=all CMD="whoami"
    vars:
      REGION: '{{.REGION | default "us-west-1"}}'
      HOSTS: '{{.HOSTS | default "all"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    requires:
      vars: [CMD]
    run: always
    cmds:
      - |
        set -e

        # Get all GOAD instances
        INSTANCES=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=*{{.ENV}}*dreadgoad*" "Name=instance-state-name,Values=running" \
          --query 'Reservations[*].Instances[*].[InstanceId,Tags[?Key==`Name`].Value|[0]]' \
          --output text --region {{.REGION}})

        if [ -z "$INSTANCES" ]; then
          echo "ERROR: No running GOAD instances found for ENV={{.ENV}}"
          exit 1
        fi

        # Filter instances based on HOSTS parameter
        if [ "{{.HOSTS}}" = "all" ]; then
          TARGET_IDS=$(echo "$INSTANCES" | awk '{print $1}' | tr '\n' ' ')
        else
          TARGET_IDS=""
          for HOST in $(echo "{{.HOSTS}}" | tr ',' ' '); do
            ID=$(echo "$INSTANCES" | grep -i "$HOST" | awk '{print $1}')
            if [ -n "$ID" ]; then
              TARGET_IDS="$TARGET_IDS $ID"
            else
              echo "WARNING: Host '$HOST' not found"
            fi
          done
        fi

        if [ -z "$TARGET_IDS" ]; then
          echo "ERROR: No matching instances found"
          exit 1
        fi

        echo "Running command on: {{.HOSTS}}"
        echo "Command: {{.CMD}}"
        echo ""

        # Send command to all target instances
        CMD_ID=$(aws ssm send-command \
          --instance-ids $TARGET_IDS \
          --document-name "AWS-RunPowerShellScript" \
          --parameters "commands=[\"{{.CMD}}\"]" \
          --region {{.REGION}} --query 'Command.CommandId' --output text)

        echo "Command ID: $CMD_ID"
        echo "Waiting for results..."
        sleep 6

        # Get results from each instance
        for ID in $TARGET_IDS; do
          NAME=$(echo "$INSTANCES" | grep "$ID" | awk '{print $2}')
          echo ""
          echo "=== $NAME ($ID) ==="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$ID" --region {{.REGION}} \
            --query '[Status, StandardOutputContent, StandardErrorContent]' --output text 2>/dev/null || echo "Pending..."
        done

  verify-trusts:
    desc: Verify domain trust relationships between all GOAD domains
    summary: |
      Validates that all domain trusts are properly configured:
      - sevenkingdoms.local <-> north.sevenkingdoms.local (parent-child)
      - sevenkingdoms.local <-> essos.local (forest trust)

      Also tests cross-domain authentication by querying users across trusts.

      Options:
        ENV=<env>            Environment to target (default: dev)
        REGION=<region>      AWS region (default: us-west-1)

      Examples:
        task verify-trusts
        task verify-trusts ENV=staging
    vars:
      REGION: '{{.REGION | default "us-west-1"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        set -e
        echo "=== GOAD Trust Verification ({{.ENV}}) ==="
        echo ""

        # Get DC01 instance ID
        DC01_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=*{{.ENV}}*dreadgoad*DC01*" "Name=instance-state-name,Values=running" \
          --query 'Reservations[*].Instances[*].InstanceId' \
          --output text --region {{.REGION}})

        if [ -z "$DC01_ID" ]; then
          echo "ERROR: DC01 not found for ENV={{.ENV}}"
          exit 1
        fi

        echo "Using DC01 ($DC01_ID) as trust verification source..."
        echo ""

        # Run comprehensive trust check from DC01
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$DC01_ID" \
          --document-name "AWS-RunPowerShellScript" \
          --parameters 'commands=["Write-Host \"=== Domain Trusts from sevenkingdoms.local ===\"","Get-ADTrust -Filter * | Format-Table Name, Direction, TrustType, ForestTransitive, TrustAttributes -AutoSize","Write-Host \"\"","Write-Host \"=== Trust Validation ===\"","nltest /domain_trusts /all_trusts","Write-Host \"\"","Write-Host \"=== Cross-Domain Query Test ===\"","Write-Host \"Querying north.sevenkingdoms.local:\"","Get-ADUser -Filter * -Server winterfell.north.sevenkingdoms.local | Select -First 3 Name | Format-Table -AutoSize","Write-Host \"Querying essos.local:\"","Get-ADUser -Filter * -Server meereen.essos.local | Select -First 3 Name | Format-Table -AutoSize","Write-Host \"\"","Write-Host \"=== Trust Status ===\"","$trusts = Get-ADTrust -Filter *; foreach ($t in $trusts) { Write-Host \"$($t.Name): $(if (Test-ComputerSecureChannel -Server $t.Name -ErrorAction SilentlyContinue) { \"HEALTHY\" } else { \"Check manually\" })\" }"]' \
          --region {{.REGION}} --query 'Command.CommandId' --output text)

        echo "Waiting for trust verification..."
        sleep 10

        RESULT=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$DC01_ID" --region {{.REGION}} \
          --query '[Status, StandardOutputContent, StandardErrorContent]' --output text)

        STATUS=$(echo "$RESULT" | head -1)
        echo "Status: $STATUS"
        echo ""
        echo "$RESULT" | tail -n +2

        if [ "$STATUS" = "Success" ]; then
          echo ""
          echo "=== Trust Verification Complete ==="
        else
          echo ""
          echo "WARNING: Trust verification may have issues. Check output above."
          exit 1
        fi

  validate-vulns-quick:
    desc: Quick validation of critical GOAD vulnerabilities (subset of full validation)
    summary: |
      Performs a quick validation of the most critical GOAD vulnerabilities:
      - User accounts exist in all domains
      - Key services are running (MSSQL, IIS, ADCS)
      - SMB signing configuration
      - Domain trusts

      This is a faster alternative to 'validate-vulns' for quick sanity checks.

      Options:
        ENV=<env>            Environment to target (default: dev)
        VERBOSE=true         Enable verbose output

      Example:
        task validate-vulns-quick
        task validate-vulns-quick ENV=staging
    vars:
      VERBOSE: '{{.VERBOSE | default "false"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    env:
      AWS_REGION: '{{.REGION}}'
      AWS_DEFAULT_REGION: '{{.REGION}}'
    run: always
    cmds:
      - |
        export ENV={{.ENV}}
        export INVENTORY_FILE={{.INVENTORY_FILE}}
        export VERBOSE={{.VERBOSE}}
        export QUICK_MODE=true
        ./scripts/validate-goad-vulns.sh
